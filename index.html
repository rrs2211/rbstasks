// ═══════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════
function dashPage(){
  const role=currentUser.role;
  const myDepts=role==='superadmin'?DEPTS:DEPTS.filter(function(d){
    const depts=Array.isArray(currentUser.deptIds)?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);
    return depts.includes(d.id);
  });
  const tabs=(role==='superadmin'||role==='manager')?['All','Due Today','My Tasks','No Due Date',...myDepts.map(function(d){return d.name.split(' ')[0];})] : ['All','Due Today','No Due Date',...myDepts.map(function(d){return d.name.split(' ')[0];})];
  const tabHtml=tabs.map(function(t,i){
    return '<div class="tab'+(curTab===i?' active':'')+'" data-tab="'+i+'">'+t+'</div>';
  }).join('');

  if(curTab===0){
    return'<div class="page-title mb-4">Dashboard</div><div class="tabs">'+tabHtml+'</div>'+overviewDash();
  }
  if(curTab===1){
    return'<div class="page-title mb-4">Dashboard</div><div class="tabs">'+tabHtml+'</div>'+dueTodayDash();
  }
  if((role==='superadmin'||role==='manager')&&curTab===2){
    // My Tasks tab - tasks assigned to me + reminders + private
    var myAssigned=TASKS.filter(function(t){return !isTaskTerminal(t)&&taskAssignees(t).some(function(a){return a.id===currentUser.id;});});
    var myOverdue=myAssigned.filter(function(t){return dueStatus(t.dueDate,t.startDate)==='overdue';});
    var todayStr=today();
    // Sort helper
    function sortByDue(arr){return arr.slice().sort(function(a,b){if(!a.dueDate&&!b.dueDate)return 0;if(!a.dueDate)return 1;if(!b.dueDate)return -1;return a.dueDate.localeCompare(b.dueDate);}); }
    // Due today = dueDate is today OR today falls between startDate and dueDate (range task)
    var myDueToday2=myAssigned.filter(function(t){
      if(isTaskTerminal(t))return false;
      if(t.dueDate===todayStr)return true;
      if(t.startDate&&t.dueDate&&todayStr>=t.startDate&&todayStr<=t.dueDate)return true;
      return false;
    });
    var myUpcoming=myAssigned.filter(function(t){return t.dueDate&&t.dueDate>todayStr&&!isTaskTerminal(t)&&!(t.startDate&&todayStr>=t.startDate&&todayStr<=t.dueDate);});
    var myNoDate=myAssigned.filter(function(t){return !t.dueDate;});
    var myRems=REMINDERS.filter(function(r){return r.userId===currentUser.id&&!r.done&&(r.date||'9999')>=today();}).slice(0,10);
    var myPriv=TASKS.filter(function(t){return t.private&&!isTaskTerminal(t)&&taskAssignees(t).some(function(a){return a.id===currentUser.id;});});
    var html='<div class="page-title mb-4">Dashboard</div><div class="tabs">'+tabHtml+'</div>';
    html+='<div class="g3 mb-14">';
    html+='<div class="stat-card"><div class="sc-label">Assigned To Me</div><div class="sc-val">'+myAssigned.length+'</div></div>';
    html+='<div class="stat-card" style="'+(myOverdue.length?'border-color:var(--red)':'')+'"><div class="sc-label">Overdue</div><div class="sc-val" style="color:'+(myOverdue.length?'var(--red)':'var(--text2)')+'">'+myOverdue.length+'</div></div>';
    html+='<div class="stat-card"><div class="sc-label">Due Today</div><div class="sc-val" style="color:var(--amber)">'+myDueToday2.length+'</div></div>';
    html+='</div>';
    if(myOverdue.length){html+='<div class="section-label" style="color:var(--red)">⚠ Overdue</div>'+myOverdue.map(taskCard).join('');}
    if(myDueToday2.length){html+='<div class="section-label">Due Today</div>'+sortByDue(myDueToday2).map(taskCard).join('');}
    if(myUpcoming.length){html+='<div class="section-label">Upcoming</div>'+sortByDue(myUpcoming).map(taskCard).join('');}
    if(myNoDate.length){html+='<div class="section-label">No Due Date</div>'+myNoDate.map(taskCard).join('');}
    if(myRems.length){html+='<div class="section-label">My Reminders</div>'+myRems.map(function(r){var rd=r.date?fmtDate(r.date)+(r.remindTime?' at '+r.remindTime:''):'No date';return '<div class="card mb-6" style="border-left:3px solid var(--teal);padding:8px 12px"><div style="font-size:12px;font-weight:500">'+r.title+'</div><div style="font-size:10px;color:var(--text3)">'+rd+'</div></div>';}).join('');}
    if(myPriv.length){html+='<div class="section-label">Private Tasks</div>'+myPriv.map(taskCard).join('');}
    if(!myAssigned.length&&!myRems.length&&!myPriv.length){html+='<div style="text-align:center;padding:2rem;color:var(--text3)">No tasks assigned to you directly</div>';}
    return html;
  }
  // Dept-specific tab (offset by 2 for Due Today + My Tasks for admin/manager, 1 for others)
  var deptOffset=(role==='superadmin'||role==='manager')?4:3;
  // No Due Date tab
  var noDueDateTab=(role==='superadmin'||role==='manager')?3:2;
  if(curTab===noDueDateTab){
    var noDueTasks=myTasks().filter(function(t){return !t.dueDate&&!isTaskTerminal(t);});
    var html2='<div class="page-title mb-4">Dashboard</div><div class="tabs">'+tabHtml+'</div>';
    html2+='<div class="section-label">Tasks without due dates ('+noDueTasks.length+')</div>';
    html2+=noDueTasks.length?noDueTasks.map(taskCard).join(''):'<div style="text-align:center;padding:3rem;color:var(--text3)">No tasks without due dates ✓</div>';
    return html2;
  }
  var dept=myDepts[curTab-deptOffset];
  if(!dept)return'';
  var deptTasks=myTasks().filter(function(t){return t.deptId===dept.id&&!t.private;});
  var active=deptTasks.filter(function(t){return !isTaskTerminal(t)&&t.status!=='Rejected';});
  var overdue=active.filter(function(t){return dueStatus(t.dueDate,t.startDate)==='overdue';});
  var pending=deptTasks.filter(function(t){return t.approvalStatus==='pending';});

  return '<div class="page-title mb-4">Dashboard</div><div class="tabs">'+tabHtml+'</div>'
    +'<div class="g3 mb-12">'
    +'<div class="stat-card"><div class="sc-label">Active</div><div class="sc-val">'+active.length+'</div></div>'
    +'<div class="stat-card"><div class="sc-label" style="color:var(--red)">Overdue</div><div class="sc-val" style="color:var(--red)">'+overdue.length+'</div></div>'
    +'<div class="stat-card"><div class="sc-label" style="color:var(--amber)">Pending</div><div class="sc-val" style="color:var(--amber)">'+pending.length+'</div></div>'
    +'</div>'
    +(overdue.length?'<div class="section-label" style="color:var(--red)">⚠ Overdue</div>'+overdue.map(function(t){return taskCard(t);}).join(''):'')
    +(pending.length?'<div class="section-label" style="color:var(--amber)">⏳ Pending Approval</div>'+pending.map(function(t){return taskCard(t);}).join(''):'')
    +(active.filter(function(t){return dueStatus(t.dueDate,t.startDate)!=='overdue'&&t.approvalStatus!=='pending';}).length
      ?'<div class="section-label">Active Tasks</div>'+active.filter(function(t){return dueStatus(t.dueDate,t.startDate)!=='overdue'&&t.approvalStatus!=='pending';}).map(function(t){return taskCard(t);}).join('')
      :'');
}
function overviewDash(){
  const role=currentUser.role,tasks=myTasks();
  const totalS=totalSec(tasks),done=tasks.filter(t=>isTaskTerminal(t));
  const overdue=tasks.filter(t=>dueStatus(t.dueDate,t.startDate)==='overdue'&&!isTaskTerminal(t));
  const pending=tasks.filter(t=>t.approvalStatus==='pending');
  // Billing count uses full task scope (not myTasks which hides approved)
  const _allMyTasks=TASKS.filter(function(t){
    if(currentUser.role==='superadmin') return true;
    if(currentUser.role==='manager'){
      const _d=Array.isArray(currentUser.deptIds)&&currentUser.deptIds.length?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);
      return _d.includes(t.deptId)||isAssignedTo(t,currentUser.id);
    }
    return isAssignedTo(t,currentUser.id);
  });
  const billingReady=_allMyTasks.filter(t=>isBillingReady(t)&&t.billingStatus!=='invoiced');
  const runSec=activeTimer?liveSec(activeTimer):0,runTask=activeTimer?TASKS.find(t=>t.id===activeTimer.taskId):null;
  const udinPending=CERTIFICATES.filter(c=>{
    const canSee=currentUser.role==='superadmin'||(currentUser.role==='manager'&&tasks.some(t=>t.id===c.taskId))||c.createdByUserId===currentUser.id||c.taskAssigneeId===currentUser.id;
    return canSee&&(!c.udin||!validateUDIN(c.udin));
  });
  return`
    ${runTask?`<div class="card mb-16" style="border-color:var(--accent)"><div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);margin-bottom:8px"><div class="running-dot"></div>${runTask.title}</div>
    <div class="btv" style="font-family:var(--mono);font-size:32px;font-weight:600;color:var(--accent);text-align:center;padding:10px 0">${fmtTimer(runSec)}</div>
    <button class="btn btn-danger btn-sm w-full" onclick="stopTimer()">⏹ Stop</button></div>`:''}
    <div class="g4 mb-16">
      <div class="stat-card" style="cursor:pointer" onclick="navigate('billing')"><div class="sc-label">To Bill</div><div class="sc-val" style="color:var(--gold)">${billingReady.length}</div><div class="sc-dot" style="background:var(--gold)"></div></div>
      <div class="stat-card" style="cursor:pointer;${overdue.length?'border-color:var(--red)':''}" onclick="navigate('calendar')"><div class="sc-label">Overdue</div><div class="sc-val" style="color:var(--red)">${overdue.length}</div><div class="sc-dot" style="background:var(--red)"></div></div>
      ${role!=='employee'?`<div class="stat-card" style="cursor:pointer;${pending.length?'border-color:var(--amber)':''}" onclick="navigate('tasks',2)"><div class="sc-label">Approvals</div><div class="sc-val" style="color:var(--amber)">${pending.length}</div><div class="sc-dot" style="background:var(--amber)"></div></div>`:
      `<div class="stat-card"><div class="sc-label">Done</div><div class="sc-val" style="color:var(--accent)">${done.length}</div></div>`}
    </div>

  ${tasks.slice(0,4).map(t=>taskCard(t)).join('')}`;

  if(taskFilter.priorities&&taskFilter.priorities.length)tasks=tasks.filter(t=>taskFilter.priorities.includes(t.priority));
  if(taskFilter.statuses&&taskFilter.statuses.length)tasks=tasks.filter(t=>taskFilter.statuses.includes(t.status));
  if(taskFilter.subdepts&&taskFilter.subdepts.length)tasks=tasks.filter(t=>taskFilter.subdepts.includes(t.subDeptId));
  if(taskFilter.assignees&&taskFilter.assignees.length)tasks=tasks.filter(t=>taskFilter.assignees.some(a=>isAssignedTo(t,a)));
  if(taskFilter.firm&&taskFilter.firm!=='all')tasks=tasks.filter(t=>t.firmId===taskFilter.firm);

  if(taskFilter.due==='nodue')tasks=tasks.filter(t=>!t.dueDate&&!isTaskTerminal(t));
  if(taskFilter.search&&taskFilter.search.trim()){const sq=taskFilter.search.toLowerCase().trim();tasks=tasks.filter(t=>(t.title||'').toLowerCase().includes(sq)||(getClient(t.clientId)?.name||'').toLowerCase().includes(sq)||(t.notes||'').toLowerCase().includes(sq)||(getDept(t.deptId)?.name||'').toLowerCase().includes(sq)||(getSD(t.subDeptId)?.name||'').toLowerCase().includes(sq)||taskAssignees(t).some(u=>(u.name||'').toLowerCase().includes(sq)));}

  <div class="filter-bar" style="flex-wrap:wrap;gap:6px;align-items:center;padding:8px 0">
    ${(()=>{
      const visibleDepts=DEPTS.filter(d=>role==='superadmin'||d.id===currentUser.deptId||(Array.isArray(currentUser.deptIds)&&currentUser.deptIds.includes(d.id)));

      const clientOpts=CLIENTS.map(c=>({value:c.id,label:c.name}));
      const statusOpts=Object.values(STATUSES).flat().filter((s,i,a)=>a.indexOf(s)===i).map(s=>({value:s,label:s}));
      const priorityOpts=[{value:'high',label:'🔴 High'},{value:'medium',label:'🟡 Medium'},{value:'low',label:'🟢 Low'}];
      return (role!=='employee'?
        msFilterHTML('depts','Dept',deptOpts,taskFilter.depts||[])
        +msFilterHTML('subdepts','Sub-Dept',sdOpts,taskFilter.subdepts||[])

        :''
      )
      +msFilterHTML('clients','Client',clientOpts,taskFilter.clients||[])
      +msFilterHTML('statuses','Status',statusOpts,taskFilter.statuses||[])
      +msFilterHTML('priorities','Priority',priorityOpts,taskFilter.priorities||[])
      +`<select class="form-select" style="width:auto;font-size:12px;padding:4px 8px" onchange="taskFilter.due=this.value;curTab=0;render()">
          <option value="all">Any Date</option>
          <option value="overdue"${taskFilter.due==='overdue'?' selected':''}>⚠ Overdue</option>
          <option value="week"${taskFilter.due==='week'?' selected':''}>📅 This Week</option>
          <option value="nodue"${taskFilter.due==='nodue'?' selected':''}>⭕ No Due Date</option>
        </select>`
      +(hasFilter?`<button class="btn btn-danger btn-sm" onclick="taskFilter={depts:[],subdepts:[],priorities:[],statuses:[],clients:[],assignees:[],due:'all',firm:'all'};curTab=0;render()">✕ Clear</button>`:'');
    })()}
  </div>
  <div class="tabs">${['All','Active','Approvals','UDIN','Certs','Done','Rejected','🔒 Private'].map((l,i)=>{
    const rejCnt=tasks.filter(t=>t.status==='Rejected'||t.approvalStatus==='rejected').length;
    const privCnt=tasks.filter(t=>t.private&&t.ownerId===currentUser.id).length;
    const cnt=[tasks.length,tasks.filter(t=>!isTaskTerminal(t)&&t.status!=='Not Started').length,pendingAppr.length,udinNeeded.length,certTasks.length,tasks.filter(t=>isTaskTerminal(t)).length,rejCnt,privCnt][i];
    const col=i===2?'color:var(--amber)':i===3?'color:var(--purple)':i===4?'color:var(--blue)':i===6?'color:var(--red)':i===7?'color:var(--teal)':'';
    return`<div class="tab${curTab===i?' active':''}" data-tab="${i}" style="${col}">${l} <span style="color:var(--text3)">${cnt}</span></div>`;}).join('')}</div>
  ${sortBarHTML()}
  ${taskFilter.search?`<div style="background:var(--blue-bg);border:1px solid rgba(74,158,255,.2);border-radius:var(--r);padding:6px 12px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--blue)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span style="color:var(--blue)">Search: <strong>${taskFilter.search}</strong></span><button style="background:none;border:none;cursor:pointer;color:var(--blue);margin-left:auto;font-size:11px" onclick="taskFilter.search='';render()">✕ Clear search</button></div>`:''}
  ${(()=>{
    const privateT=tasks.filter(t=>t.private&&t.ownerId===currentUser.id);
    const pubTasks=tasks.filter(t=>!t.private);
    const rejectedT=pubTasks.filter(t=>t.status==='Rejected'||t.approvalStatus==='rejected');
    const tabMap=[pubTasks,pubTasks.filter(t=>!isTaskTerminal(t)&&t.status!=='Not Started'),pendingAppr,udinNeeded,certTasks,pubTasks.filter(t=>isTaskTerminal(t)&&showClosedBilled),rejectedT,privateT];
    // Approval tab uses custom card
    if(curTab===2&&(role==='superadmin'||role==='manager'))return`<div class="page-title mb-8">Approvals <span style="font-size:12px;color:var(--text3);font-weight:400">${pendingAppr.length} pending</span></div>${pendingAppr.length?pendingAppr.map(approvalCard).join(''):"<div style='text-align:center;padding:3rem;color:var(--text3)'>No pending approvals ✓</div>"}`;
    const ft=tabMap[curTab]||pubTasks;
    const sorted=applyTaskSort(ft);
    const grouped=groupTasks(sorted);
    // KANBAN VIEW
    if(taskView==='kanban'){
      return kanbanHTML(sorted);
    }
    const out=grouped.map(function(g){
      if(!g.label) return g.tasks.map(function(t){return taskCard(t)}).join('');
      const dept=taskGroup==='dept'?DEPTS.find(function(d){return d.name===g.label}):null;
      const dotCol=dept?dept.color:'var(--text3)';
      const gKey=encodeURIComponent(g.label);
      const isCollapsed=collapsedGroups.has(g.label);
      const chevron=isCollapsed
        ?'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>'
        :'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>';
      const hdr='<div class="group-hdr" style="border-left-color:'+dotCol+';cursor:pointer" data-gkey="'+gKey+'">'
        +'<span style="display:flex;align-items:center;gap:6px;color:var(--text3)">'+chevron+'</span>'
        +'<span style="font-size:12px;font-weight:600;color:var(--text2)">'+g.label+'</span>'
        +'<span style="font-size:11px;color:var(--text3);margin-left:auto">'+g.tasks.length+' task'+(g.tasks.length===1?'':'s')+'</span>'

      return hdr+body;
    }).join('');
    return '<div class="task-list-wrap">'+(out||'<div style="text-align:center;padding:2.5rem;color:var(--text3);font-size:13px">No tasks</div>')+'</div>';

function taskCard(t){
  const dept=getDept(t.deptId),client=getClient(t.clientId);
  const assignees=taskAssignees(t);
  const isRunning=activeTimer?.taskId===t.id,isBill=isBillingReady(t)&&t.billingStatus!=='invoiced';
  const isOverdue=dueStatus(t.dueDate,t.startDate)==='overdue'&&!isTaskTerminal(t);
  const isPendingAppr=t.approvalStatus==='pending';
  const needsUDIN=requiresUDIN(t)&&isTaskTerminal(t)&&!hasValidUDIN(t);
  const sec=isRunning?liveSec(activeTimer):(t.seconds||0);
  const taskComments=COMMENTS[t.id]?Object.values(COMMENTS[t.id]):[];
  const udinVal=Array.isArray(t.udins)&&t.udins[0]?.udin?t.udins[0].udin:null;
  const checklist=Array.isArray(t.checklist)?t.checklist:[];
  const clDone=checklist.filter(c=>c.done).length;
  const onLeaveAssignees=t.dueDate?assignees.filter(u=>LEAVES.find(l=>l.userId===u.id&&l.date===t.dueDate&&l.status==='approved')):[];
  const isSel=bulkMode&&selectedTasks.has(t.id);
  const isPrivate=t.private&&t.ownerId===currentUser.id;
  // Build row class
  var isAdminOrMgr=(currentUser.role==='superadmin'||currentUser.role==='manager');
  var rowCls='task-row';
  if(isRunning)rowCls+=' timer-active';
  else if(needsUDIN)rowCls+=' udin-required';
  else if(isBill)rowCls+=' billing-ready';
  else if(isOverdue)rowCls+=' overdue';
  else if(isPendingAppr)rowCls+=' pending-approval';
  if(isPrivate)rowCls+=' task-private';
  if(isSel)rowCls+=' task-selected';

  // Bulk select checkbox
  var bulkCb='';
  if(bulkMode){
    bulkCb='<div style="width:18px;height:18px;border-radius:4px;border:2px solid '+(isSel?'var(--blue)':'var(--border2)')+';background:'+(isSel?'var(--blue)':'transparent')+';display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:6px" onclick="toggleBulkSelect(\''+t.id+'\')">'+(isSel?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>':'')+'</div>';
  }

  // Row 1: Title — Client | Status badge
  var titleHtml=(isPrivate?'🔒 ':'')+t.title+(t.recurringId?'<span class="recur-chip">↻</span>':'');
  if(client)titleHtml+=' <span class="tc-client">— '+client.name+'</span>';
  var badgesHtml=(needsUDIN?'<span class="udin-chip">UDIN</span>':'')+(isBill?'<span style="font-size:9px;background:var(--gold-bg);color:var(--gold);padding:2px 6px;border-radius:99px;font-weight:600">BILL</span>':'');
  badgesHtml+='<span style="background:'+statusColor(t.status)+'22;color:'+statusColor(t.status)+';font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600">'+t.status+'</span>';
  var row1='<div class="tc-row1"><div class="tc-title">'+titleHtml+'</div><div class="tc-badges">'+badgesHtml+'</div></div>';

  // Row 2: Dept — SubDept + dates | Assignee avatars
  var metaHtml='';
  if(dept)metaHtml+='<span style="color:'+dept.color+';font-size:11px">'+dept.name.split(' ')[0]+'</span>';
  var sd=getSD(t.subDeptId);
  if(sd)metaHtml+='<span style="color:var(--text3);font-size:11px"> — '+sd.name+'</span>';
  if(t.startDate)metaHtml+='<span style="font-size:10px;color:var(--text3);margin-left:4px">From '+fmtDate(t.startDate)+'</span>';
  if(t.dueDate)metaHtml+=dueBadge(t.dueDate,t.startDate);
  // Leave indicator: check if any assignee has leave on due date
  if(t.dueDate){
    const asgns=Array.isArray(t.assignees)?t.assignees:(t.assigneeId?[t.assigneeId]:[]);
    const hasLeave=asgns.some(uid=>LEAVES.some(l=>l.userId===uid&&l.date===t.dueDate&&l.status==='approved'));
    if(hasLeave) metaHtml+='<span style="font-size:9px;background:var(--amber-bg);color:var(--amber);padding:1px 5px;border-radius:99px;margin-left:4px">🌴 Leave</span>';
  }
  metaHtml+=approvalBadge(t);
  metaHtml+='<span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;background:'+priorityBg(t.priority)+';color:'+priorityColor(t.priority)+'">'+t.priority+'</span>';
  if(checklist.length)metaHtml+='<span class="cl-progress">☑ '+clDone+'/'+checklist.length+'</span>';
  var avHtml=onLeaveAssignees.length?'<span class="leave-on-duty">⚠ on leave</span>':'';
  // Show full names instead of just avatars
  if(assignees.length){
    avHtml+='<span style="font-size:11px;color:var(--text2);font-weight:500">'
      +assignees.map(function(u){return u.name.split(' ')[0];}).join(', ')
      +'</span>';
  }
  if(taskComments.length)avHtml+='<span style="font-size:10px;color:var(--text3);margin-left:4px">💬'+taskComments.length+'</span>';
  var row2='<div class="tc-row2"><div class="tc-meta">'+metaHtml+'</div><div class="tc-assignees">'+avHtml+'</div></div>';

  // Row 3: Timer + actions (hidden in bulk mode)
  var row3='';
  if(!bulkMode&&showTaskTime){
    var timerBtn=isRunning
      ?'<button class="btn-icon" style="color:var(--amber)" onclick="event.stopPropagation();stopTimer()"><svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>'
      :'<button class="btn-icon" style="color:var(--accent)" onclick="event.stopPropagation();startTimer(\''+t.id+'\')"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>';
    var detailBtn='<button class="btn-icon" onclick="event.stopPropagation();openModal(\'taskDetail\',{id:\''+t.id+'\'})"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>';
    row3='<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">'
      +'<div style="display:flex;align-items:center;gap:6px">'+(isRunning?'<div class="running-dot"></div>':'')
      +'<span style="font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500" data-td="'+t.id+'">'+fmtSec(sec)+'</span></div>'
      +'<div style="display:flex;gap:5px">'+timerBtn+detailBtn+'</div></div>';
  }

  var clickAttr=bulkMode?'onclick="toggleBulkSelect(\''+t.id+'\')" style="cursor:default"':'';
  return '<div class="'+rowCls+'" data-tid="'+t.id+'" '+clickAttr+'>'+bulkCb+row1+row2+row3+'</div>';
}

function drillPage(){
  var role=currentUser.role;
  var visibleDepts=DEPTS.filter(function(d){if(role==='superadmin')return true;var depts=Array.isArray(currentUser.deptIds)?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);return depts.includes(d.id)||d.id===currentUser.deptId;});
  var allT=myTasks().filter(function(t){return !t.private});

  if(!drillState.dept){
    var html='<div class="page-header"><div class="page-title">Work Explorer</div></div>';

      html+='<div style="display:flex;align-items:center;gap:10px"><div style="width:10px;height:10px;border-radius:50%;background:'+dept.color+'"></div>';
      html+='<div style="font-size:15px;font-weight:600;flex:1">'+dept.name+'</div>';
      html+='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>';
      html+='<div class="g4 mt-10">';
      html+='<div style="text-align:center"><div style="font-size:18px;font-weight:700;font-family:var(--mono)">'+dt.length+'</div><div style="font-size:10px;color:var(--text3)">Tasks</div></div>';
      html+='<div style="text-align:center"><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent)">'+done+'</div><div style="font-size:10px;color:var(--text3)">Done</div></div>';
      html+='<div style="text-align:center"><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:'+(overdue?'var(--red)':'var(--text2)')+'">'+overdue+'</div><div style="font-size:10px;color:var(--text3)">Overdue</div></div>';
      html+='<div style="text-align:center"><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:var(--blue)">'+totalH+'h</div><div style="font-size:10px;color:var(--text3)">Logged</div></div>';
      html+='</div>';
      html+='<div class="progress-bar mt-8"><div class="progress-fill" style="width:'+pct2+'%;background:'+dept.color+'"></div></div>';
      html+='</div>';
    });
    return html;
  }

  var dept=getDept(drillState.dept);
  var sds=SUBDEPTS.filter(function(s){return s.deptId===drillState.dept});
  var deptTasks=allT.filter(function(t){return t.deptId===drillState.dept});

  if(!drillState.subdept){
    var html='<div class="page-header"><div style="display:flex;align-items:center;gap:8px">';
    html+='<button class="btn btn-ghost btn-sm" onclick="drillState.dept=null;render()">← Depts</button>';
    html+='<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:50%;background:'+dept.color+'"></div><div class="page-title">'+dept.name+'</div></div></div></div>';
    sds.forEach(function(sd){
      var sdt=deptTasks.filter(function(t){return t.subDeptId===sd.id});
      var done=sdt.filter(function(t){return isTaskTerminal(t)}).length;
      var statuses=sdt.map(function(t){return t.status}).filter(function(v,i,a){return a.indexOf(v)===i});
      html+='<div class="drill-card" data-drill-sd="'+sd.id+'" style="cursor:pointer">';
      html+='<div class="flex-between mb-8"><div style="font-size:14px;font-weight:600">'+sd.name+'</div>';
      html+='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>';
      html+='<div style="font-size:12px;color:var(--text2);margin-bottom:8px">'+sdt.length+' tasks · '+done+' done · '+fmtSec(teSec(sdt))+'</div>';
      html+='<div style="display:flex;flex-wrap:wrap;gap:4px">';
      statuses.slice(0,5).forEach(function(s){
        html+='<span style="font-size:10px;background:'+statusColor(s)+'22;color:'+statusColor(s)+';padding:2px 7px;border-radius:99px;font-weight:600">'+s+': '+sdt.filter(function(t){return t.status===s}).length+'</span>';
      });
      html+='</div>';
      if(sdt.length){var p=Math.min(100,Math.round(done/sdt.length*100));html+='<div class="progress-bar mt-8"><div class="progress-fill" style="width:'+p+'%;background:'+dept.color+'"></div></div>';}
      html+='</div>';
    });
    return html;
  }

  var sd=getSD(drillState.subdept);
  var sdTasks=deptTasks.filter(function(t){return t.subDeptId===drillState.subdept;});

  // ── Explorer grouping state ──
  if(!window._drillGroup) window._drillGroup='status';
  if(!window._drillSelected) window._drillSelected={};
  var dg=window._drillGroup;
  var ds=window._drillSelected;

  // Build breadcrumb
  var html='<div class="page-header"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  html+='<button class="btn btn-ghost btn-sm" onclick="drillState.dept=null;window._drillSelected={};render()">← Depts</button>';
  html+='<button class="btn btn-ghost btn-sm" onclick="drillState.subdept=null;window._drillSelected={};render()">← '+dept.name+'</button>';
  html+='<div style="display:flex;align-items:center;gap:6px"><div style="width:7px;height:7px;border-radius:50%;background:'+dept.color+'"></div><div class="page-title">'+sd.name+'</div></div>';
  html+='</div>';
  html+='<button class="btn btn-primary btn-sm" onclick="openModal(\'newTask\',{prefill:{deptId:\''+dept.id+'\',subDeptId:\''+sd.id+'\'}})">+ Task</button>';
  html+='</div>';

  // Stats row
  var done=sdTasks.filter(function(t){return isTaskTerminal(t);}).length;
  var overdue=sdTasks.filter(function(t){return dueStatus(t.dueDate,t.startDate)==='overdue'&&!isTaskTerminal(t);}).length;
  var sdTotalSec=sdTasks.reduce(function(a,t){return a+(t.seconds||0);},0);
  html+='<div class="g4 mb-14">';
  html+='<div class="stat-card"><div class="sc-label">Total</div><div class="sc-val">'+sdTasks.length+'</div></div>';
  html+='<div class="stat-card"><div class="sc-label">Done</div><div class="sc-val" style="color:var(--accent)">'+done+'</div></div>';
  html+='<div class="stat-card" style="'+(overdue?'border-color:var(--red)':'')+'"><div class="sc-label">Overdue</div><div class="sc-val" style="color:'+(overdue?'var(--red)':'var(--text2)')+'">'+overdue+'</div></div>';
  html+='<div class="stat-card"><div class="sc-label">Hours</div><div class="sc-val">'+Math.floor(totalSec/3600)+'<span style="font-size:12px;color:var(--text3)">h</span></div></div>';
  html+='</div>';

  // Grouping controls
  var groupOpts=[['status','Status'],['assignee','Assignee'],['dueDate','Due Date'],['client','Client'],['priority','Priority'],['none','All Tasks']];
  html+='<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
  html+='<span style="font-size:10px;font-weight:600;color:var(--text3)">GROUP BY</span>';
  groupOpts.forEach(function(g){
    html+='<button class="sort-btn'+(dg===g[0]?' active':'')+'" onclick="window._drillGroup=\''+g[0]+'\';window._drillSelected={};render()">'+g[1]+'</button>';
  });
  html+='</div>';

  // Build groups
  var groups={};
  var groupOrder=[];
  sdTasks.forEach(function(t){
    var key='';
    if(dg==='status') key=t.status||'Unknown';
    else if(dg==='assignee') key=taskAssignees(t).map(function(u){return u.name;}).join(', ')||'Unassigned';
    else if(dg==='dueDate'){
      if(!t.dueDate){key='No Due Date';}
      else{var d=new Date(t.dueDate+'T00:00:00'),now=new Date();now.setHours(0,0,0,0);
        var diff=Math.floor((d-now)/86400000);
        if(diff<0)key='Overdue';else if(diff===0)key='Due Today';else if(diff<=7)key='This Week';else if(diff<=30)key='This Month';else key='Later';
      }
    }
    else if(dg==='client') key=(getClient(t.clientId)?.name)||'No Client';
    else if(dg==='priority') key=(t.priority||'medium').charAt(0).toUpperCase()+(t.priority||'medium').slice(1)+' Priority';
    else key='All Tasks';
    if(!groups[key]){groups[key]=[];groupOrder.push(key);}
    groups[key].push(t);
  });
  // Sort group order
  if(dg==='dueDate'){var dord=['Overdue','Due Today','This Week','This Month','Later','No Due Date'];groupOrder.sort(function(a,b){return(dord.indexOf(a)===-1?99:dord.indexOf(a))-(dord.indexOf(b)===-1?99:dord.indexOf(b));});}
  else if(dg==='priority'){var pord=['High Priority','Medium Priority','Low Priority'];groupOrder.sort(function(a,b){return(pord.indexOf(a)===-1?99:pord.indexOf(a))-(pord.indexOf(b)===-1?99:pord.indexOf(b));});}
  else groupOrder.sort();

  // Render groups with multi-select filter chips
  groupOrder.forEach(function(key){
    var gTasks=groups[key];
    var isSelected=!!ds[key];
    var col=dg==='status'?statusColor(key):(dg==='priority'?{'High Priority':'var(--red)','Medium Priority':'var(--amber)','Low Priority':'var(--accent)'}[key]||'var(--text3)':'var(--accent)');
    html+='<div style="margin-bottom:14px">';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer" onclick="window._drillSelected[\''+key.replace(/'/g,"\\'")+'\']=!window._drillSelected[\''+key.replace(/'/g,"\\'")+'\'];render()">';
    html+='<div style="width:8px;height:8px;border-radius:50%;background:'+col+';flex-shrink:0"></div>';
    html+='<span style="font-size:13px;font-weight:600;color:'+(isSelected?'var(--accent)':'var(--text2)')+'">'+key+'</span>';
    html+='<span style="font-size:11px;color:var(--text3);background:var(--bg3);padding:1px 7px;border-radius:99px">'+gTasks.length+'</span>';
    html+='<span style="font-size:10px;color:var(--text3);margin-left:auto">'+(isSelected?'▲ Hide':'▼ Show')+'</span>';
    html+='</div>';
    if(isSelected||Object.keys(ds).length===0){
      if(gTasks.length===0){html+='<div style="font-size:12px;color:var(--text3);padding:8px 12px">No tasks</div>';}
      else{html+=gTasks.map(function(t){return taskCard(t);}).join('');}
    }
    html+='</div>';
  });

  if(sdTasks.length===0){html+='<div style="text-align:center;padding:3rem;color:var(--text3)">No tasks in this sub-department</div>';}
  return html;
}



function calendarPage(){
  const tasks=myTasks().filter(t=>t.dueDate&&!isTaskTerminal(t));
  const year=calViewDate.getFullYear(),month=calViewDate.getMonth();
  const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate(),todayD=today();
  const dateMap={};tasks.forEach(t=>{if(!dateMap[t.dueDate])dateMap[t.dueDate]=[];dateMap[t.dueDate].push(t)});
  const selTasks=calSelectedDate?myTasks().filter(t=>t.dueDate===calSelectedDate):[];
  let cells='';
  for(let i=0;i<firstDay;i++)cells+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=dateMap[ds]||[];
    const isToday=ds===todayD,isSel=ds===calSelectedDate,hasOvr=dt.some(t=>dueStatus(t.dueDate,t.startDate)==='overdue');
    let cls='cal-day';if(isToday)cls+=' today';if(isSel)cls+=' selected';else if(hasOvr)cls+=' has-overdue';else if(dt.length)cls+=' has-tasks';
    cells+=`<div class="${cls}" onclick="calSelectedDate='${ds}';render()"><div class="cal-date">${d}</div><div style="display:flex;flex-wrap:wrap;gap:1px">${dt.slice(0,4).map(t=>`<div class="cal-dot" style="background:${getDept(t.deptId)?.color||'#5a6080'}"></div>`).join('')}${dt.length>4?`<div style="font-size:8px;color:var(--text3)">+${dt.length-4}</div>`:''}</div></div>`;
  }
  const upcoming=myTasks().filter(t=>t.dueDate&&!isTaskTerminal(t)).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  const mn=calViewDate.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  return`<div class="flex-between mb-12"><div class="page-title">Calendar</div><button class="btn btn-primary btn-sm" onclick="openModal('newTask',{prefill:getNewTaskContext()})">+ Task</button><button class=\"btn btn-ghost btn-sm\" onclick=\"exportCalendarPDF()\">⬇ PDF</button></div>
  <div class="flex-between mb-12"><button class="btn btn-ghost btn-sm" onclick="calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()-1,1);render()">← Prev</button><div style="font-size:14px;font-weight:600">${mn}</div><button class="btn btn-ghost btn-sm" onclick="calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()+1,1);render()">Next →</button></div>
  <div class="cal-grid">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}${cells}</div>
  ${calSelectedDate?`<div class="section-label">${fmtDateFull(calSelectedDate)} — ${selTasks.length} task${selTasks.length!==1?'s':''}</div>${selTasks.length?selTasks.map(t=>taskCard(t)).join(''):`<div style="text-align:center;padding:1.5rem;color:var(--text3);font-size:13px">No tasks due this date</div>`}`:''}
  <div class="section-label">Upcoming</div>
  ${upcoming.slice(0,8).map(t=>{const dept=getDept(t.deptId),client=getClient(t.clientId);
    return`<div class="task-row${dueStatus(t.dueDate,t.startDate)==='overdue'?' overdue':''}" data-tid="${t.id}">
      <div style="display:flex;align-items:flex-start;gap:8px"><div style="flex:1"><div style="font-size:14px;font-weight:500">${t.title}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${dept?`<span class="badge" style="background:${dept.color}22;color:${dept.color}">${dept.name.split(' ')[0]}</span>`:''}${client?`<span style="font-size:11px;color:var(--text3)">${shortName(client.name)}</span>`:''}</div></div>
      ${dueBadge(t.dueDate)}</div>
    </div>`;}).join('')}
  ${!upcoming.length?`<div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px">No upcoming tasks with due dates</div>`:''}`;
}

function certsPage(){
  const role=currentUser.role;
  const isAdminOrMgr=role==='superadmin'||role==='manager';
  // ─── New Cert button direct creation
  const certSortField=certFilter.sortBy||'date';
  const certSortAsc=certFilter.sortAsc||false;
  let certs=[...CERTIFICATES].sort((a,b)=>{
    let va='',vb='';
    if(certSortField==='date'){va=a.certDate||a.createdAt||'';vb=b.certDate||b.createdAt||'';}
    else if(certSortField==='client'){va=getClient(a.clientId)?.name||'';vb=getClient(b.clientId)?.name||'';}
    else if(certSortField==='purpose'){va=a.purpose||'';vb=b.purpose||'';}
    else if(certSortField==='udin'){va=a.udin?'1':'0';vb=b.udin?'1':'0';}
    const cmp=va.localeCompare(vb);
    return certSortAsc?cmp:-cmp;
  });
  // Role filter
  if(role==='employee') certs=certs.filter(c=>c.createdByUserId===currentUser.id||c.taskAssigneeId===currentUser.id);
  // Apply filters
  if(certFilter.caFirm!=='all')   certs=certs.filter(c=>c.caFirmId===certFilter.caFirm);
  if(certFilter.hasUDIN==='yes')  certs=certs.filter(c=>c.udin&&validateUDIN(c.udin));
  if(certFilter.hasUDIN==='no')   certs=certs.filter(c=>!c.udin||!validateUDIN(c.udin));
  if(certFilter.createdBy!=='all')certs=certs.filter(c=>c.createdByUserId===certFilter.createdBy);
  if(certFilter.purpose!=='all')  certs=certs.filter(c=>c.purpose===certFilter.purpose);
  if(certFilter.dateFrom) certs=certs.filter(c=>(c.certDate||c.createdAt||'')>=certFilter.dateFrom);
  if(certFilter.dateTo)   certs=certs.filter(c=>(c.certDate||c.createdAt||'')<=certFilter.dateTo);
  if(certFilter.certSearch){
    const q=certFilter.certSearch.toLowerCase();
    certs=certs.filter(c=>(c.certNo||'').toLowerCase().includes(q)||(c.subject||'').toLowerCase().includes(q)||(c.udin||'').toLowerCase().includes(q)||(c.signingMember||'').toLowerCase().includes(q)||(getClient(c.clientId||TASKS.find(t=>t.id===c.taskId)?.clientId)?.name||'').toLowerCase().includes(q));

  const hasFilter=certFilter.caFirm!=='all'||certFilter.hasUDIN!=='all'||certFilter.createdBy!=='all'||certFilter.purpose!=='all'||certFilter.dateFrom||certFilter.dateTo||certFilter.certSearch;

    <button class="sort-btn${certFilter.view==='table'?' active':''}" onclick="certFilter.view='table';render()">⊞ Table</button>

    <input class="form-input" style="flex:1;min-width:160px;max-width:220px;font-size:12px;padding:5px 10px"

function updateCertNoPreview(){

  const preview=document.getElementById('cert-no-preview');
  if(preview&&firmId)preview.textContent=generateCertNo(firmId);
  // Update member list too
  const memberSel=document.getElementById('ce-member');

    const firm=getCAFirm(firmId);
    memberSel.innerHTML=`<option value="">— Select —</option>${(firm?.memberships||[]).map(m=>`<option value="${m.name}">${m.name} (M.No. ${m.membershipNo||'—'})</option>`).join('')}<option value="__custom">Other / Type manually</option>`;

function checkUDINPreview(val){
  const el=document.getElementById('udin-feedback');if(!el)return;
  if(!val){el.innerHTML=`<span style="color:var(--text3)">Enter UDIN after generating from ICAI portal</span>`;return}
  if(validateUDIN(val)){el.innerHTML=`<span style="color:var(--accent)">✓ Valid UDIN format</span>`;}
  else{el.innerHTML=`<span style="color:var(--amber)">⚠ Should be 18 alphanumeric characters</span>`;}
}
async function createCert({taskId,taskAssigneeId}){
  const caFirmId=document.getElementById('ce-cafirm')?.value;
  if(!caFirmId){toast('Select a CA Firm');return}
  const id=uid();
  const certNo=generateCertNo(caFirmId);
  const udinVal=(document.getElementById('ce-udin')?.value||'').trim().toUpperCase();
  const memberVal=document.getElementById('ce-member')?.value;
  const cert={
    id,taskId:taskId||'',taskAssigneeId:taskAssigneeId||'',
    caFirmId,certNo,
    subject:document.getElementById('ce-subject')?.value?.trim()||'',
    purpose:document.getElementById('ce-purpose')?.value||'',
    certDate:document.getElementById('ce-date')?.value||today(),
    signingMember:memberVal==='__custom'?(prompt('Enter member name:')||''):memberVal,
    udin:udinVal,udinDate:document.getElementById('ce-udindate')?.value||'',
    clientId:TASKS.find(t=>t.id===taskId)?.clientId||'',
    createdByUserId:currentUser.id,createdByName:currentUser.name,
    createdAt:today(),
  };
  await fbSet('certificates/'+id,cert);
  // Mark task as certificate
  if(taskId)await fbUpd('tasks/'+taskId,{isCertificate:true,certId:id});
  closeModal();toast('Certificate created — '+certNo);
}
async function saveCert(id){
  const cert=CERTIFICATES.find(c=>c.id===id);if(!cert)return;
  const isAdminOrMgr=currentUser.role==='superadmin'||currentUser.role==='manager';
  const udinLocked=cert.udin&&validateUDIN(cert.udin)&&!isAdminOrMgr;
  const updates={
    caFirmId:document.getElementById('ce-cafirm')?.value,
    subject:document.getElementById('ce-subject')?.value?.trim(),
    purpose:document.getElementById('ce-purpose')?.value,
    certDate:document.getElementById('ce-date')?.value,
  };
  const memberVal=document.getElementById('ce-member')?.value;
  updates.signingMember=memberVal==='__custom'?(prompt('Enter member name:')||cert.signingMember||''):memberVal;
  if(!udinLocked){
    const udinVal=(document.getElementById('ce-udin')?.value||'').trim().toUpperCase();
    updates.udin=udinVal;
    updates.udinDate=document.getElementById('ce-udindate')?.value||'';
  }
  await fbUpd('certificates/'+id,updates);
  closeModal();toast('Certificate updated');
}
async function deleteCert(id){
  const isAdminOrMgr=currentUser.role==='superadmin'||currentUser.role==='manager';
  if(!isAdminOrMgr){toast('Only managers/admins can delete certificates');return}
  if(!confirm('Delete this certificate record?'))return;
  const cert=CERTIFICATES.find(c=>c.id===id);
  await fbDel('certificates/'+id);
  if(cert?.taskId)await fbUpd('tasks/'+cert.taskId,{isCertificate:false,certId:''});
  closeModal();toast('Certificate deleted');
}

function billingTimeReport(){
  const billingTabs=['Tasks','Client Time Report'];
  // All time entries grouped by client
  const fromDate=billingFilter.month?(billingFilter.month+'-01'):'';
  const toDate=billingFilter.month?(billingFilter.month+'-31'):'';
  let entries=TIME_ENTRIES.filter(function(e){
    if(fromDate&&e.date<fromDate)return false;
    if(toDate&&e.date>toDate)return false;
    if(billingFilter.client!=='all'){
      const t=TASKS.find(function(x){return x.id===e.taskId;});
      if(!t||t.clientId!==billingFilter.client)return false;
    }
    return true;
  });
  // Group by client
  const byClient={};
  entries.forEach(function(e){
    const t=TASKS.find(function(x){return x.id===e.taskId;});
    if(!t)return;
    const cid=t.clientId||'unknown';
    if(!byClient[cid])byClient[cid]={clientId:cid,tasks:{},totalSec:0};
    if(!byClient[cid].tasks[t.id])byClient[cid].tasks[t.id]={task:t,secs:0,entries:[]};
    byClient[cid].tasks[t.id].secs+=(e.seconds||0);
    byClient[cid].tasks[t.id].entries.push(e);
    byClient[cid].totalSec+=(e.seconds||0);
  });
  const months=[];for(let i=0;i<6;i++){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}
  const clientKeys=Object.keys(byClient).sort(function(a,b){return byClient[b].totalSec-byClient[a].totalSec;});
  return`<div class="page-title mb-8">Client Time Report</div>
  <div class="tabs">${billingTabs.map((t,i)=>`<div class="tab${i===1?' active':''}" data-tab="${i}">${t}</div>`).join('')}</div>
  <div class="filter-bar">
    <select class="form-select" onchange="billingFilter.client=this.value;render()"><option value="all">All Clients</option>${CLIENTS.map(c=>`<option value="${c.id}"${billingFilter.client===c.id?' selected':''}>${c.name}</option>`).join('')}</select>
    <select class="form-select" onchange="billingFilter.month=this.value;render()"><option value="">All Months</option>${months.map(m=>`<option value="${m}"${billingFilter.month===m?' selected':''}>${new Date(m+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</option>`).join('')}</select>
    <button class="btn btn-ghost btn-sm" onclick="exportClientTimeReport()">⬇ PDF</button>
  </div>
  <div class="g3 mb-12">
    <div class="stat-card"><div class="sc-label">Clients</div><div class="sc-val">${clientKeys.length}</div></div>
    <div class="stat-card"><div class="sc-label">Total Hours</div><div class="sc-val">${fmtSec(entries.reduce((a,e)=>a+(e.seconds||0),0))}</div></div>
    <div class="stat-card"><div class="sc-label">Tasks</div><div class="sc-val">${new Set(entries.map(e=>e.taskId)).size}</div></div>
  </div>
  ${clientKeys.length?clientKeys.map(cid=>{
    const cr=byClient[cid];const client=getClient(cr.clientId);
    const taskEntries=Object.values(cr.tasks).sort((a,b)=>b.secs-a.secs);
    return`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:12px;overflow:hidden">
      <div style="padding:12px 14px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;font-weight:600">${client?.name||'Unknown Client'}</div>
        <div style="font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent)">${fmtSec(cr.totalSec)}</div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--bg3)"><th style="padding:6px 12px;text-align:left;color:var(--text3);font-size:10px;font-weight:600">TASK</th><th style="padding:6px 12px;text-align:left;color:var(--text3);font-size:10px;font-weight:600">DEPT</th><th style="padding:6px 12px;text-align:left;color:var(--text3);font-size:10px;font-weight:600">STATUS</th><th style="padding:6px 12px;text-align:right;color:var(--text3);font-size:10px;font-weight:600">TIME</th></tr></thead>
        <tbody>${taskEntries.map(te=>{const dept=getDept(te.task.deptId);return`<tr style="border-bottom:1px solid var(--border)"><td style="padding:7px 12px;font-weight:500">${te.task.title}</td><td style="padding:7px 12px;color:${dept?.color||'var(--text3)'}font-size:11px">${dept?.name.split(' ')[0]||'—'}</td><td style="padding:7px 12px"><span style="font-size:10px;background:${statusColor(te.task.status)}22;color:${statusColor(te.task.status)};padding:1px 6px;border-radius:99px">${te.task.status}</span></td><td style="padding:7px 12px;text-align:right;font-family:var(--mono);color:var(--accent)">${fmtSec(te.secs)}</td></tr>`;}).join('')}</tbody>
      </table>
    </div>`;}).join('')
    :`<div style="text-align:center;padding:2.5rem;color:var(--text3)">No time entries for this period</div>`}`;
}

function exportClientTimeReport(){
  const td=today();const firm=getActiveFirm()||{};
  let rows='';
  const entries=TIME_ENTRIES;
  const byClient={};
  entries.forEach(function(e){
    const t=TASKS.find(function(x){return x.id===e.taskId;});if(!t)return;
    const cid=t.clientId||'unknown';
    if(!byClient[cid])byClient[cid]={tasks:{}};
    if(!byClient[cid].tasks[t.id])byClient[cid].tasks[t.id]={task:t,secs:0};
    byClient[cid].tasks[t.id].secs+=(e.seconds||0);
  });
  Object.keys(byClient).forEach(function(cid){
    const c=getClient(cid);const cr=byClient[cid];
    const total=Object.values(cr.tasks).reduce(function(a,te){return a+te.secs;},0);
    rows+=`<tr style="background:#f0f0f0"><td colspan="4" style="padding:8px 12px;font-weight:700">${c?.name||'Unknown'} — Total: ${fmtSec(total)}</td></tr>`;
    Object.values(cr.tasks).sort(function(a,b){return b.secs-a.secs;}).forEach(function(te){
      const dept=getDept(te.task.deptId);
      rows+=`<tr><td style="padding:6px 12px 6px 24px">${te.task.title}</td><td>${dept?dept.name:''}</td><td>${te.task.status}</td><td style="text-align:right;font-family:monospace">${fmtSec(te.secs)}</td></tr>`;
    });
  });
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;font-size:12px;padding:20px}table{width:100%;border-collapse:collapse}td{border-bottom:1px solid #eee;padding:5px 12px}.hdr{border-bottom:3px solid #7ED957;margin-bottom:16px;padding-bottom:8px}</style></head><body><div class="hdr"><strong style="font-size:16px">${firm.name||''}</strong><div style="color:#666">Client Time Report — ${fmtDate(td)}</div></div><table>${rows}</table>
</body></html>`;
  const w=window.open('','_blank');if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),400);}
}

function billingPage(){
  if(!canAccessBilling())return '<div class="page-header"><div class="page-title">Billing</div></div><div style="text-align:center;padding:4rem 2rem;color:var(--text3)"><div style="font-size:36px;margin-bottom:12px">🔒</div><div style="font-weight:500">Access Restricted</div></div>';

  // ── Scope: all billing-ready tasks the user can see ──
  const billingScope=TASKS.filter(function(t){
    if(currentUser.role==='superadmin') return true;
    if(currentUser.role==='manager'){
      const depts=Array.isArray(currentUser.deptIds)&&currentUser.deptIds.length?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);
      return depts.includes(t.deptId)||isAssignedTo(t,currentUser.id);
    }
    return isAssignedTo(t,currentUser.id);
  });
  let tasks=billingScope.filter(t=>isBillingReady(t));

  // ── Filters ──
  if(billingFilter.client!=='all') tasks=tasks.filter(t=>t.clientId===billingFilter.client);
  if(billingFilter.dept!=='all')   tasks=tasks.filter(t=>t.deptId===billingFilter.dept);
  if(billingFilter.firm!=='all')   tasks=tasks.filter(t=>t.firmId===billingFilter.firm);
  if(billingFilter.status==='unbilled')  tasks=tasks.filter(t=>t.billingStatus!=='invoiced');
  if(billingFilter.status==='invoiced')  tasks=tasks.filter(t=>t.billingStatus==='invoiced');
  if(billingFilter.status==='ready')     tasks=tasks.filter(t=>t.billingStatus==='ready');
  if(billingFilter.status==='nil')       tasks=tasks.filter(t=>!t.billingAmount||t.billingAmount===0);
  if(billingFilter.month) tasks=tasks.filter(t=>(t.dueDate||t.createdAt||'').startsWith(billingFilter.month));
  if(billingFilter.search){
    const q=billingFilter.search.toLowerCase();
    tasks=tasks.filter(t=>(t.title||'').toLowerCase().includes(q)||(getClient(t.clientId)?.name||'').toLowerCase().includes(q));
  }
  // Ageing filter
  const now=new Date(); now.setHours(0,0,0,0);
  if(billingFilter.ageing==='0-30')  tasks=tasks.filter(t=>{if(!t.dueDate)return false;const d=Math.floor((now-new Date(t.dueDate+'T00:00:00'))/86400000);return d>=0&&d<=30;});
  if(billingFilter.ageing==='31-60') tasks=tasks.filter(t=>{if(!t.dueDate)return false;const d=Math.floor((now-new Date(t.dueDate+'T00:00:00'))/86400000);return d>=31&&d<=60;});
  if(billingFilter.ageing==='60+')   tasks=tasks.filter(t=>{if(!t.dueDate)return false;const d=Math.floor((now-new Date(t.dueDate+'T00:00:00'))/86400000);return d>60;});

  // ── Aggregates ──
  const unbilled  = tasks.filter(t=>t.billingStatus!=='invoiced');
  const invoiced  = tasks.filter(t=>t.billingStatus==='invoiced');
  const readyToBill=tasks.filter(t=>t.billingStatus==='ready'||(!t.billingStatus&&t.approvalStatus==='approved'));
  const nilBilling = tasks.filter(t=>!t.billingAmount||t.billingAmount===0);
  const totalUnbilledAmt=unbilled.reduce((a,t)=>a+(t.billingAmount||0),0);
  const totalInvoicedAmt=invoiced.reduce((a,t)=>a+(t.billingAmount||0),0);
  const totalAmt=tasks.reduce((a,t)=>a+(t.billingAmount||0),0);

  // ── By-client grouping ──
  const byClient={};
  tasks.forEach(t=>{if(!byClient[t.clientId])byClient[t.clientId]={tasks:[],amt:0,unbilledAmt:0,invoicedAmt:0};byClient[t.clientId].tasks.push(t);byClient[t.clientId].amt+=(t.billingAmount||0);if(t.billingStatus==='invoiced')byClient[t.clientId].invoicedAmt+=(t.billingAmount||0);else byClient[t.clientId].unbilledAmt+=(t.billingAmount||0);});

  // ── By-dept grouping ──
  const byDept={};
  tasks.forEach(t=>{const dk=t.deptId||'__none__';if(!byDept[dk])byDept[dk]={name:getDept(t.deptId)?.name||'Unknown',tasks:[],amt:0};byDept[dk].tasks.push(t);byDept[dk].amt+=(t.billingAmount||0);});

  // ── Months for picker ──
  const months=[];for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7));}

  // ── Ageing buckets ──
  function ageDays(t){if(!t.dueDate)return null;return Math.floor((now-new Date(t.dueDate+'T00:00:00'))/86400000);}
  const age30=unbilled.filter(t=>{const d=ageDays(t);return d!==null&&d>=0&&d<=30;});
  const age60=unbilled.filter(t=>{const d=ageDays(t);return d!==null&&d>=31&&d<=60;});
  const age60p=unbilled.filter(t=>{const d=ageDays(t);return d!==null&&d>60;});
  const ageNone=unbilled.filter(t=>ageDays(t)===null||ageDays(t)<0);

  const tabs=['Summary','Tasks','By Client','By Dept','Time Report'];
  if(curTab===4) return billingTimeReport();

  // ── Bulk invoice handler ──
  function bulkInvoiceBtn(taskIds){
    const ids=taskIds.filter(id=>tasks.find(t=>t.id===id&&t.billingStatus!=='invoiced'));
    if(!ids.length) return '';
    return `<button class="btn btn-gold btn-sm" onclick="doBulkInvoice([${ids.map(id=>"'"+id+"'").join(',')}])">✓ Invoice All (${ids.length})</button>`;
  }

  // ── View: SUMMARY (Tab 0) ──
  if(curTab===0){
    return `
    <div class="flex-between mb-12">
      <div class="page-title">Billing</div>
      <button class="btn btn-gold btn-sm" onclick="generateBillingSummaryPDF()">⬇ PDF</button>
    </div>
    <div class="tabs">${tabs.map((t,i)=>`<div class="tab${curTab===i?' active':''}" data-tab="${i}">${t}</div>`).join('')}</div>

    <!-- KPI Row -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px">
      <div class="stat-card" style="border-top:3px solid var(--amber)">
        <div class="sc-label">Pending Invoice</div>
        <div class="sc-val" style="color:var(--amber)">${fmtMoney(totalUnbilledAmt)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${unbilled.length} tasks</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--green,#4ade80)">
        <div class="sc-label">Invoiced</div>
        <div class="sc-val" style="color:var(--green,#4ade80)">${fmtMoney(totalInvoicedAmt)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${invoiced.length} tasks</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--gold,#f0c040)">
        <div class="sc-label">Total Billing</div>
        <div class="sc-val" style="color:var(--gold,#f0c040)">${fmtMoney(totalAmt)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${tasks.length} tasks</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--red)">
        <div class="sc-label">Not Set</div>
        <div class="sc-val" style="color:var(--red)">${nilBilling.length}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">need billing amt</div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--accent)">
        <div class="sc-label">Ready to Bill</div>
        <div class="sc-val" style="color:var(--accent)">${readyToBill.length}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">approved, not invoiced</div>
      </div>
    </div>

    <!-- Ageing Analysis -->
    <div class="section-label">📅 Ageing Analysis (Unbilled)</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">0–30 days</div>
        <div style="font-size:20px;font-weight:700;color:var(--green,#4ade80);margin:4px 0">${age30.length}</div>
        <div style="font-size:11px;color:var(--text3)">${fmtMoney(age30.reduce((a,t)=>a+(t.billingAmount||0),0))}</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">31–60 days</div>
        <div style="font-size:20px;font-weight:700;color:var(--amber);margin:4px 0">${age60.length}</div>
        <div style="font-size:11px;color:var(--text3)">${fmtMoney(age60.reduce((a,t)=>a+(t.billingAmount||0),0))}</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">60+ days</div>
        <div style="font-size:20px;font-weight:700;color:var(--red);margin:4px 0">${age60p.length}</div>
        <div style="font-size:11px;color:var(--text3)">${fmtMoney(age60p.reduce((a,t)=>a+(t.billingAmount||0),0))}</div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">No due date</div>
        <div style="font-size:20px;font-weight:700;color:var(--text3);margin:4px 0">${ageNone.length}</div>
        <div style="font-size:11px;color:var(--text3)">${fmtMoney(ageNone.reduce((a,t)=>a+(t.billingAmount||0),0))}</div>
      </div>
    </div>

    <!-- Dept Breakdown -->
    <div class="section-label">🏢 By Department</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px">
      ${Object.entries(byDept).map(([dk,dd])=>{
        const deptInv=dd.tasks.filter(t=>t.billingStatus==='invoiced').reduce((a,t)=>a+(t.billingAmount||0),0);
        const deptUnbilled=dd.amt-deptInv;
        const pct=totalAmt?Math.round(dd.amt/totalAmt*100):0;
        return `<div style="display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:12px;font-weight:600">${dd.name}</div>
            <div style="font-size:10px;color:var(--text3)">${dd.tasks.length} tasks · ${pct}% of total</div>
            <div style="height:3px;background:var(--bg3);border-radius:99px;margin-top:4px;width:${Math.min(100,pct*2)}%"><div style="height:100%;background:var(--accent);border-radius:99px;width:${pct}%"></div></div>
          </div>
          <div style="text-align:right"><div style="font-size:10px;color:var(--text3)">Unbilled</div><div style="font-size:12px;font-weight:600;color:var(--amber)">${fmtMoney(deptUnbilled)}</div></div>
          <div style="text-align:right"><div style="font-size:10px;color:var(--text3)">Invoiced</div><div style="font-size:12px;font-weight:600;color:var(--green,#4ade80)">${fmtMoney(deptInv)}</div></div>
          <div style="text-align:right"><div style="font-size:10px;color:var(--text3)">Total</div><div style="font-size:13px;font-weight:700;color:var(--gold,#f0c040)">${fmtMoney(dd.amt)}</div></div>
        </div>`;
      }).join('')||'<div style="padding:2rem;text-align:center;color:var(--text3)">No billing data</div>'}
    </div>

    <!-- Top Clients -->
    <div class="section-label">👥 Top Clients by Billing</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
      ${Object.entries(byClient).sort((a,b)=>b[1].amt-a[1].amt).slice(0,8).map(([cid,cd])=>{
        const c=getClient(cid);
        return `<div style="display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--border)">
          <div style="font-size:12px;font-weight:500">${c?.name||'Unknown'}<span style="font-size:10px;color:var(--text3);margin-left:6px">${cd.tasks.length} tasks</span></div>
          <div style="text-align:right;font-size:11px;color:var(--amber)">${fmtMoney(cd.unbilledAmt)}</div>
          <div style="text-align:right;font-size:11px;color:var(--green,#4ade80)">${fmtMoney(cd.invoicedAmt)}</div>
          <div style="text-align:right;font-size:12px;font-weight:700;color:var(--gold,#f0c040)">${fmtMoney(cd.amt)}</div>
        </div>`;
      }).join('')||'<div style="padding:2rem;text-align:center;color:var(--text3)">No data</div>'}
    </div>`;
  }

  // ── Common filter bar ──
  const filterBar=`<div class="filter-bar" style="flex-wrap:wrap;margin-bottom:12px">
    <input class="form-input" style="max-width:180px" placeholder="Search task or client…" value="${billingFilter.search}" id="billing-search-inp" onfocus="document.body.dataset.lastSearchFocus='billing-search-inp'" oninput="billingFilter.search=this.value;render()"/>
    <select class="form-select" onchange="billingFilter.client=this.value;render()"><option value="all">All Clients</option>${CLIENTS.map(c=>`<option value="${c.id}"${billingFilter.client===c.id?' selected':''}>${c.name}</option>`).join('')}</select>
    <select class="form-select" onchange="billingFilter.dept=this.value;render()"><option value="all">All Depts</option>${DEPTS.map(d=>`<option value="${d.id}"${billingFilter.dept===d.id?' selected':''}>${d.name}</option>`).join('')}</select>
    <select class="form-select" onchange="billingFilter.month=this.value;render()"><option value="">All Months</option>${months.map(m=>`<option value="${m}"${billingFilter.month===m?' selected':''}>${new Date(m+'-01').toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</option>`).join('')}</select>
    <select class="form-select" onchange="billingFilter.status=this.value;render()"><option value="all">All Status</option><option value="unbilled"${billingFilter.status==='unbilled'?' selected':''}>Unbilled</option><option value="ready"${billingFilter.status==='ready'?' selected':''}>Ready</option><option value="invoiced"${billingFilter.status==='invoiced'?' selected':''}>Invoiced</option><option value="nil"${billingFilter.status==='nil'?' selected':''}>No Amount Set</option></select>
    <select class="form-select" onchange="billingFilter.ageing=this.value;render()"><option value="all">All Ages</option><option value="0-30">0–30 days</option><option value="31-60">31–60 days</option><option value="60+">60+ days</option></select>
  </div>`;

  const pageHdr=`<div class="flex-between mb-12">
    <div class="page-title">Billing</div>
    <div style="display:flex;gap:6px">${bulkInvoiceBtn(unbilled.map(t=>t.id))}<button class="btn btn-gold btn-sm" onclick="generateBillingSummaryPDF()">⬇ PDF</button></div>
  </div>
  <div class="tabs">${tabs.map((t,i)=>`<div class="tab${curTab===i?' active':''}" data-tab="${i}">${t}</div>`).join('')}</div>
  <div class="g3 mb-12">
    <div class="stat-card"><div class="sc-label">Pending</div><div class="sc-val" style="color:var(--amber)">${fmtMoney(totalUnbilledAmt)}</div></div>
    <div class="stat-card"><div class="sc-label">Invoiced</div><div class="sc-val" style="color:var(--green,#4ade80)">${fmtMoney(totalInvoicedAmt)}</div></div>
    <div class="stat-card"><div class="sc-label">Total</div><div class="sc-val" style="color:var(--gold,#f0c040)">${fmtMoney(totalAmt)}</div></div>
  </div>${filterBar}`;

  // ── View: TASKS (Tab 1) ──
  if(curTab===1){
    const sorted=tasks.slice().sort((a,b)=>(ageDays(b)||0)-(ageDays(a)||0));
    return pageHdr+`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:var(--bg3)">
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid var(--border)">Task</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid var(--border)">Client</th>
        <th style="padding:8px 10px;text-align:left;border-bottom:2px solid var(--border)">Dept</th>
        <th style="padding:8px 10px;text-align:center;border-bottom:2px solid var(--border)">Time</th>
        <th style="padding:8px 10px;text-align:center;border-bottom:2px solid var(--border)">Age</th>
        <th style="padding:8px 10px;text-align:right;border-bottom:2px solid var(--border)">Amount ₹</th>
        <th style="padding:8px 10px;text-align:center;border-bottom:2px solid var(--border)">Status</th>
        <th style="padding:8px 10px;border-bottom:2px solid var(--border)"></th>
      </tr></thead>
      <tbody>${sorted.map((t,i)=>{
        const c=getClient(t.clientId),d=getDept(t.deptId),age=ageDays(t);
        const ageColor=age===null?'var(--text3)':age<=30?'var(--green,#4ade80)':age<=60?'var(--amber)':'var(--red)';
        const statusBadge=t.billingStatus==='invoiced'
          ?'<span style="background:var(--green-bg);color:var(--green,#4ade80);padding:2px 8px;border-radius:99px;font-size:10px">✓ Invoiced</span>'
          :t.billingStatus==='ready'
          ?'<span style="background:var(--amber-bg);color:var(--amber);padding:2px 8px;border-radius:99px;font-size:10px">Ready</span>'
          :'<span style="background:var(--bg3);color:var(--text3);padding:2px 8px;border-radius:99px;font-size:10px">Unbilled</span>';
        return `<tr style="border-bottom:1px solid var(--border);background:${i%2===0?'transparent':'var(--bg2)'}">
          <td style="padding:8px 10px;max-width:200px"><div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.title}">${t.title}</div></td>
          <td style="padding:8px 10px;color:var(--text2)">${c?.name||'—'}</td>
          <td style="padding:8px 10px;color:var(--text3)">${d?.name?.split(' ')[0]||'—'}</td>
          <td style="padding:8px 10px;text-align:center;color:var(--text3);font-family:var(--mono)">${fmtSec(t.seconds||0)}</td>
          <td style="padding:8px 10px;text-align:center;font-weight:600;color:${ageColor}">${age!==null?(age===0?'Today':age+'d'):'—'}</td>
          <td style="padding:8px 10px;text-align:right">
            <input type="number" value="${t.billingAmount||0}" min="0" step="100"
              style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:4px 6px;color:var(--text);font-family:var(--mono);font-size:12px;width:90px;text-align:right;outline:none"
              onchange="fbUpd('tasks/${t.id}',{billingAmount:parseFloat(this.value)||0})" onclick="event.stopPropagation()"/>
          </td>
          <td style="padding:8px 10px;text-align:center">${statusBadge}</td>
          <td style="padding:8px 10px;white-space:nowrap">
            ${t.billingStatus==='invoiced'
              ?`<button class="btn btn-ghost btn-xs" onclick="fbUpd('tasks/${t.id}',{billingStatus:'unbilled'}).then(()=>toast('Moved back'))">↩</button>`
              :`<button class="btn btn-gold btn-xs" onclick="fbUpd('tasks/${t.id}',{billingStatus:'invoiced'}).then(()=>toast('Invoiced ✓'))">✓ Invoice</button>`}
            <button class="btn btn-ghost btn-xs" onclick="openModal('taskDetail',{id:'${t.id}'})">→</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }

  // ── View: BY CLIENT (Tab 2) ──
  if(curTab===2){
    const clientsSorted=Object.entries(byClient).sort((a,b)=>b[1].amt-a[1].amt);
    return pageHdr+clientsSorted.map(([cid,cd])=>{
      const c=getClient(cid);
      const cUnbilled=cd.tasks.filter(t=>t.billingStatus!=='invoiced');
      return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:12px;overflow:hidden">
        <div style="display:grid;grid-template-columns:1fr auto auto auto auto;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border)">

async function doBulkInvoice(taskIds){
  if(!taskIds||!taskIds.length)return;
  const filtered=taskIds.filter(id=>TASKS.find(t=>t.id===id&&t.billingStatus!=='invoiced'));
  if(!filtered.length){toast('All already invoiced');return;}
  if(!confirm('Mark '+filtered.length+' task(s) as invoiced?'))return;
  for(const id of filtered){
    await fbUpd('tasks/'+id,{billingStatus:'invoiced'});
  }
  toast('✓ '+filtered.length+' tasks marked as invoiced');
}

function timesheetsPage(){

function getWeekRange(){
  const d=new Date();const day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{from:mon.toISOString().slice(0,10),to:sun.toISOString().slice(0,10)};
}
function setTsMonth(v){tsFilter.selectedMonth=v;render()}
function getMonthRange(){
  if(tsFilter.selectedMonth){
    const [y,m]=tsFilter.selectedMonth.split('-').map(Number);
    const lastDay=new Date(y,m,0).getDate();
    const from=tsFilter.selectedMonth+'-01';
    const to=tsFilter.selectedMonth+'-'+String(lastDay).padStart(2,'0');
    const today2=new Date().toISOString().slice(0,10);
    return{from,to:to>today2?today2:to};
  }
  const d=new Date();
  return{from:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01',to:d.toISOString().slice(0,10)};
}

function monthSheet(){

  for(let i=0;i<12;i++){

    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0');
    months.push({value:y+'-'+m,label:d.toLocaleDateString('en-IN',{month:'short',year:'numeric'})});

  const curMonth=tsFilter.selectedMonth||new Date().toISOString().slice(0,7);
  const monthPicker='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">'

    +'</div>';
  return monthPicker+tsFilterBar(false)+tsHoursTable(entries,r.from,r.to);
}
function tsHoursTable(entries,from,to){
  const role=currentUser.role;
  // Get all dates in range
  const dates=[];let d=new Date(from+'T00:00:00');const end=new Date(to+'T00:00:00');
  while(d<=end){dates.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
  // Get all users in scope
  const users=role==='employee'?[currentUser]:role==='manager'?USERS.filter(u=>u.deptId===currentUser.deptId||(Array.isArray(u.deptIds)&&u.deptIds.includes(currentUser.deptId))):USERS;
  // Build matrix: user x date
  const totalByDay={};dates.forEach(dt=>{totalByDay[dt]=0;});
  const totalByUser={};
  users.forEach(u=>{
    const uEntries=entries.filter(e=>e.userId===u.id);
    const dayMap={};dates.forEach(dt=>{dayMap[dt]=uEntries.filter(e=>e.date===dt).reduce((a,e)=>a+(e.seconds||0),0);totalByDay[dt]+=(dayMap[dt]||0);});
    totalByUser[u.id]=Object.values(dayMap).reduce((a,v)=>a+v,0);
    u._dayMap=dayMap;
  });
  const grand=Object.values(totalByUser).reduce((a,v)=>a+v,0);
  // Responsive: show at most 7 dates in columns
  const showDates=dates.slice(-Math.min(dates.length,14));
  return`<div style="overflow-x:auto;margin-top:10px">
    <table class="ts-table" style="min-width:100%">
      <thead><tr>
        <th style="text-align:left;min-width:120px">Employee</th>
        ${showDates.map(dt=>`<th style="text-align:center;min-width:60px;font-size:10px">${new Date(dt+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</th>`).join('')}
        <th style="text-align:center;color:var(--accent)">Total</th>
      </tr></thead>
      <tbody>
        ${users.map(u=>{
          const row=showDates.map(dt=>{
            const sec=u._dayMap?u._dayMap[dt]||0:0;
            return`<td style="text-align:center;font-family:var(--mono);font-size:11px;${sec>0?'color:var(--text2)':'color:var(--text3)'}">${sec>0?`<span style='cursor:pointer;text-decoration:underline dotted' onclick='showDayDetail("${u.id}","${dt}")'>${Math.floor(sec/3600)+'h'+(Math.floor((sec%3600)/60)>0?Math.floor((sec%3600)/60)+'m':'')}</span>`:'-'}</td>`;
          }).join('');
          return`<tr><td><div style="display:flex;align-items:center;gap:6px"><div class="avatar ${avClass(u.id)}" style="width:22px;height:22px;font-size:8px">${initials(u.name)}</div><span style="font-size:12px">${u.name}</span></div></td>${row}<td style="text-align:center;font-family:var(--mono);font-weight:600;color:var(--accent)">${totalByUser[u.id]>0?fmtSec(totalByUser[u.id]):'-'}</td></tr>`;
        }).join('')}
        <tr style="border-top:2px solid var(--border2)">
          <td style="font-weight:600;font-size:12px">Daily Total</td>
          ${showDates.map(dt=>`<td style="text-align:center;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--teal)">${totalByDay[dt]>0?Math.floor(totalByDay[dt]/3600)+'h':'-'}</td>`).join('')}
          <td style="text-align:center;font-family:var(--mono);font-weight:700;color:var(--accent)">${fmtSec(grand)}</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div style="margin-top:10px"><button class="btn btn-ghost btn-sm" onclick="openModal('manualTime',{})">+ Manual Entry</button></div>`;
}
function tsFilterBar(showDate=true){
  const role=currentUser.role;
  return`<div class="filter-bar">
    ${showDate?`<input type="date" class="form-input" style="width:auto;padding:6px 10px;font-size:12px" value="${tsFilter.dateFrom}" onchange="tsFilter.dateFrom=this.value;tsFilter.dateTo=this.value;render()"/>`:''}
    ${role!=='employee'?`<select class="form-select" onchange="tsFilter.emp=this.value;render()"><option value="all">All Staff</option>${USERS.filter(u=>(u.role==='employee'||u.role==='manager')&&(role==='superadmin'||u.deptId===currentUser.deptId)).map(u=>`<option value="${u.id}"${tsFilter.emp===u.id?' selected':''}>${u.name}</option>`).join('')}</select>
    <select class="form-select" onchange="tsFilter.dept=this.value;render()"><option value="all">All Depts</option>${DEPTS.filter(d=>{if(role==='superadmin')return true;const myD=Array.isArray(currentUser.deptIds)&&currentUser.deptIds.length?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);return myD.includes(d.id);}).map(d=>`<option value="${d.id}"${tsFilter.dept===d.id?' selected':''}>${d.name.split(' ')[0]}</option>`).join('')}</select>`:''}
    <select class="form-select" onchange="tsFilter.client=this.value;render()"><option value="all">All Clients</option>${CLIENTS.map(c=>`<option value="${c.id}"${tsFilter.client===c.id?' selected':''}>${shortName(c.name)}</option>`).join('')}</select>
  </div>`;
}
function filteredEntries(from,to){
  let entries=[...TIME_ENTRIES];const role=currentUser.role;
  if(role==='employee')entries=entries.filter(e=>e.userId===currentUser.id);
  else if(role==='manager'){
    // Include ALL departments the manager belongs to
    const mgrDepts=Array.isArray(currentUser.deptIds)&&currentUser.deptIds.length
      ?currentUser.deptIds
      :(currentUser.deptId?[currentUser.deptId]:[]);
    const ms=USERS.filter(u=>{
      const uDepts=Array.isArray(u.deptIds)&&u.deptIds.length?u.deptIds:(u.deptId?[u.deptId]:[]);
      return mgrDepts.some(d=>uDepts.includes(d));
    }).map(u=>u.id);
    entries=entries.filter(e=>ms.includes(e.userId));
  }
  if(tsFilter.emp!=='all')entries=entries.filter(e=>e.userId===tsFilter.emp);
  if(tsFilter.client!=='all')entries=entries.filter(e=>{const t=TASKS.find(x=>x.id===e.taskId);return t?.clientId===tsFilter.client});
  if(tsFilter.dept!=='all')entries=entries.filter(e=>{const t=TASKS.find(x=>x.id===e.taskId);return t?.deptId===tsFilter.dept});
  if(from)entries=entries.filter(e=>e.date>=from);if(to)entries=entries.filter(e=>e.date<=to);
  return entries;
}
function daySheet(){
  const entries=filteredEntries(tsFilter.dateFrom,tsFilter.dateFrom),totalS=teSec(entries);
  return`${tsFilterBar(true)}<div class="flex-between mb-12"><div style="font-size:13px;color:var(--text2)">${fmtDateFull(tsFilter.dateFrom)}</div><div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--accent)">${fmtSec(totalS)}</div></div>
  ${entries.length?`<div style="overflow-x:auto"><table class="ts-table"><thead><tr><th>Task</th><th>Employee</th><th>Client</th><th>Status</th><th>Time</th><th>Note</th><th>Edit</th></tr></thead>
  <tbody>${entries.map(e=>{const t=TASKS.find(x=>x.id===e.taskId),u=getUser(e.userId),c=t?getClient(t.clientId):null;return`<tr><td style="color:var(--text);font-weight:500">${t?.title||'—'}</td><td>${u?`<div style="display:flex;align-items:center;gap:5px"><div class="avatar ${avClass(e.userId)}" style="width:20px;height:20px;font-size:8px">${initials(u.name)}</div>${shortName(u.name)}</div>`:'—'}</td><td>${c?shortName(c.name):'—'}</td><td>${t?`<span class="badge" style="background:${statusColor(t.status)}22;color:${statusColor(t.status)}">${t.status}</span>`:'—'}</td><td style="font-family:var(--mono);color:var(--accent)">${fmtSec(e.seconds)}</td><td style="font-size:11px;color:var(--text3)">${e.note||''}</td><td style="text-align:center">${(currentUser.role==='superadmin'||currentUser.role==='manager'||e.userId===currentUser.id)?`<button style="background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 6px;border-radius:3px;font-size:11px" onclick="openModal('editTimeEntry',{entryId:'${e.id}'})">✎</button>`:'—'}</td></tr>`;}).join('')}</tbody></table></div>`:`<div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px">No entries</div>`}
  <div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="openModal('manualTime',{})">+ Manual Entry</button></div>`;
}
function rangeSheet(){
  const entries=filteredEntries(tsFilter.dateFrom,tsFilter.dateTo),totalS=teSec(entries);
  const byDate={};entries.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e)});
  const dates=Object.keys(byDate).sort();

  <div class="g3 mb-16"><div class="stat-card"><div class="sc-label">Total</div><div class="sc-val">${Math.floor(totalS/3600)}<span style="font-size:13px;color:var(--text3)">h</span></div></div><div class="stat-card"><div class="sc-label">Entries</div><div class="sc-val">${entries.length}</div></div><div class="stat-card"><div class="sc-label">Days</div><div class="sc-val">${dates.length}</div></div></div>
  ${dates.length?dates.map(date=>{const de=byDate[date],ds=teSec(de);return`<div style="margin-bottom:14px"><div class="flex-between mb-8"><div style="font-size:12px;font-weight:600;color:var(--text2)">${fmtDateFull(date)}</div><div style="font-family:var(--mono);font-size:12px;color:var(--accent)">${fmtSec(ds)}</div></div>${de.map(e=>{const t=TASKS.find(x=>x.id===e.taskId),u=getUser(e.userId),c=t?getClient(t.clientId):null,dept=t?getDept(t.deptId):null;return`<div class="card-sm mb-6"><div class="flex-between"><div style="font-size:13px;font-weight:500">${t?.title||'—'}</div><div style="font-family:var(--mono);font-size:13px;color:var(--accent)">${fmtSec(e.seconds)}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:5px;font-size:11px;color:var(--text3)">${u?`<span>${u.name}</span>`:''}${c?`<span>· ${shortName(c.name)}</span>`:''}${dept?`<span style="color:${dept.color}">· ${dept.name.split(' ')[0]}</span>`:''}${e.note?`<span>· ${e.note}</span>`:''}</div></div>`;}).join('')}</div>`;}).join(''):`<div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px">No entries</div>`}
