<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[data-theme="dark"]{--bg:#0f1117;--bg2:#171b26;--bg3:#1e2333;--bg4:#252a3a;--border:#2e3347;--border2:#3a4060;--text:#e8eaf0;--text2:#9aa0b8;--text3:#5a6080;--shadow:rgba(0,0,0,.4)}
[data-theme="light"]{--bg:#f0f2f8;--bg2:#ffffff;--bg3:#f5f6fa;--bg4:#e8eaf0;--border:#dde0ec;--border2:#c8cce0;--text:#1a1d2e;--text2:#4a5070;--text3:#8890b0;--shadow:rgba(0,0,0,.08)}
:root{--font-scale:1;--accent:#7ED957;--accent-bg:rgba(126,217,87,0.12);--blue:#4a9eff;--blue-bg:rgba(74,158,255,0.12);--amber:#f5a623;--amber-bg:rgba(245,166,35,0.12);--red:#ff5f5f;--red-bg:rgba(255,95,95,0.12);--purple:#a78bfa;--purple-bg:rgba(167,139,250,0.12);--teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.12);--gold:#f0c040;--gold-bg:rgba(240,192,64,0.12);--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--r:10px;--r2:14px;--r3:18px;--nav-h:62px;--header-h:56px}
body{background:var(--bg);color:var(--text);overflow-x:hidden;font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden;transition:background .2s,color .2s}
#app{display:flex;flex-direction:column;min-height:100vh}
.top-bar{height:var(--header-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px 0 14px;gap:8px;position:fixed;top:0;left:0;right:0;z-index:160;box-shadow:0 1px 8px var(--shadow)}
.logo{font-weight:700;font-size:15px;flex:0 0 auto}.logo span{color:var(--accent)}
/* ── Sidebar dept hover panel ──────────── */
.nav-tasks-hover{position:fixed;left:var(--nav-w);top:var(--header-h);width:220px;background:var(--bg2);border:1px solid var(--border);border-radius:0 var(--r2) var(--r2) 0;box-shadow:4px 4px 20px var(--shadow);z-index:150;display:none;max-height:calc(100vh - var(--header-h));overflow-y:auto}
.nav-item[data-nav-page=tasks]:hover .nav-tasks-hover,.nav-tasks-hover:hover{display:block}
.nav-dept-item{padding:8px 14px;cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.nav-dept-item:hover{background:var(--bg3);color:var(--text)}
.nav-dept-item.active{color:var(--accent);font-weight:600;background:var(--bg3)}
.nav-dept-all{padding:10px 14px;font-size:12px;font-weight:600;color:var(--text3);border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.5px}

/* ── Search Portal ─────────────────────── */
.search-portal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:flex;align-items:flex-start;justify-content:center;padding-top:80px}
.search-portal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.5);overflow:hidden}
.search-portal-inp{width:100%;padding:16px 20px;font-size:18px;background:transparent;border:none;outline:none;color:var(--text);border-bottom:1px solid var(--border);font-family:var(--font)}
.search-portal-results{max-height:460px;overflow-y:auto}
.sp-section-label{padding:8px 16px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;background:var(--bg3);border-bottom:1px solid var(--border)}
.sp-result{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.sp-result:hover,.sp-result.active{background:var(--bg3)}
.sp-result-icon{width:32px;height:32px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sp-result-main{flex:1;min-width:0}
.sp-result-title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-result-sub{font-size:11px;color:var(--text3);margin-top:1px}
.sp-result-badge{font-size:10px;padding:2px 7px;border-radius:99px;flex-shrink:0}
.sp-empty{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.sp-hint{padding:8px 16px;font-size:10px;color:var(--text3);border-top:1px solid var(--border);display:flex;gap:16px}

/* ── Chat Hub ─────────────────────────────────── */
.chat-shell{display:flex;height:calc(100vh - var(--header-h) - 32px);gap:0;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--border);overflow:hidden}
.chat-sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2)}
.chat-sidebar-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-room-list{flex:1;overflow-y:auto}
.chat-room-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.chat-room-item:hover,.chat-room-item.active{background:var(--bg3)}
.chat-room-item.active{border-left:3px solid var(--accent)}
.chat-room-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.chat-room-info{flex:1;min-width:0}
.chat-room-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-room-preview{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.chat-unread-badge{background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;flex-shrink:0}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2)}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:2px}
.chat-msg{display:flex;align-items:flex-end;gap:8px;margin-bottom:4px;max-width:100%}
.chat-msg.mine{flex-direction:row-reverse}
.chat-msg-bubble{max-width:68%;min-width:40px;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap;overflow-wrap:break-word}
.chat-msg.mine .chat-msg-bubble{background:var(--accent);color:#0f1117;border-bottom-right-radius:4px}
.chat-msg.theirs .chat-msg-bubble{background:var(--bg3);color:var(--text);border-bottom-left-radius:4px}
.chat-msg-meta{font-size:10px;color:var(--text3);white-space:nowrap;margin-bottom:6px}
.chat-msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.chat-date-divider{text-align:center;font-size:10px;color:var(--text3);margin:8px 0;display:flex;align-items:center;gap:8px}
.chat-date-divider::before,.chat-date-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--bg2)}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;color:var(--text);outline:none;resize:none;max-height:120px;font-family:var(--font);line-height:1.4}
.chat-input:focus{border-color:var(--accent)}
.chat-send-btn{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.chat-send-btn:hover{opacity:.85}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text3);gap:12px}
.chat-nav-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;position:absolute;top:4px;right:4px}
/* ── Batch Work ───────────────────────────────── */
.batch-badge{background:var(--purple-bg);color:var(--purple);font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;border:1px solid rgba(167,139,250,.3)}

.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.sync-dot.ok{background:var(--accent)}.sync-dot.syncing{background:var(--amber);animation:blink 1s infinite}.sync-dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.search-wrap{flex:1;max-width:240px;position:relative}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px 7px 32px;color:var(--text);font-family:var(--font);font-size:12px;outline:none}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);z-index:300;max-height:300px;overflow-y:auto;box-shadow:0 8px 24px var(--shadow)}
.sr-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}.sr-item:last-child{border-bottom:none}.sr-item:hover{background:var(--bg3)}
.user-pill{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:3px 8px 3px 3px;cursor:pointer;user-select:none}
.uname{font-size:12px;font-weight:500}.role-badge{font-size:10px;padding:2px 6px;border-radius:99px;background:var(--accent-bg);color:var(--accent);font-weight:500}
.running-chip{display:flex;align-items:center;gap:5px;background:var(--accent-bg);border:1px solid rgba(126,217,87,.25);border-radius:99px;padding:3px 8px;font-size:11px;color:var(--accent);font-family:var(--mono);cursor:pointer;white-space:nowrap}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;box-shadow:0 -1px 8px var(--shadow)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px;border-radius:var(--r);min-width:40px}
.nav-item svg{width:20px;height:20px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item span{font-size:9px;color:var(--text3);font-weight:500}
.nav-item.active svg{stroke:var(--accent)}.nav-item.active span{color:var(--accent)}
.main{flex:1;padding:16px;padding-bottom:calc(var(--nav-h)+16px);max-width:960px;margin:0 auto;width:100%}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;position:relative;overflow:hidden}
.sc-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.sc-val{font-size:22px;font-weight:600;font-family:var(--mono)}.sc-sub{font-size:11px;color:var(--text3);margin-top:3px}
.sc-dot{position:absolute;right:-10px;bottom:-10px;width:50px;height:50px;border-radius:50%;opacity:.12}
.page-title{font-size:18px;font-weight:600;margin-bottom:4px}.page-sub{font-size:13px;color:var(--text3);margin-bottom:16px}
.section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#0f1117}.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,95,95,.2)}
.btn-gold{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(240,192,64,.25)}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,166,35,.25)}
.btn-blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(74,158,255,.2)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center}
.btn-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.form-row{margin-bottom:14px}.form-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-select option{background:var(--bg2)}.form-textarea{resize:vertical;min-height:60px}
.pw-wrap{position:relative}.pw-wrap .form-input{padding-right:40px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text3);background:none;border:none;padding:4px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:500}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.progress-bar{height:5px;background:var(--bg4);border-radius:99px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:99px;transition:width .4s}
.task-row{display:block;width:100%;box-sizing:border-box;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:8px;cursor:pointer;transition:border .15s}
.task-row:hover{border-color:var(--border2)}.task-row.timer-active{border-color:var(--accent);background:rgba(126,217,87,.04)}
.task-row.billing-ready{border-color:var(--gold)}.task-row.overdue{border-color:var(--red)}
.task-row.pending-approval{border-color:var(--amber)}.task-row.udin-required{border-color:var(--purple)}
.people-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}.people-row:last-child{border-bottom:none}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.av-g{background:rgba(126,217,87,.18);color:var(--accent)}.av-b{background:var(--blue-bg);color:var(--blue)}.av-a{background:var(--amber-bg);color:var(--amber)}.av-p{background:var(--purple-bg);color:var(--purple)}.av-t{background:var(--teal-bg);color:var(--teal)}.av-r{background:var(--red-bg);color:var(--red)}
.tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--r);padding:3px;margin-bottom:16px;overflow-x:auto}
.tab{flex:1;min-width:fit-content;padding:7px 10px;text-align:center;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-radius:7px;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--bg2);color:var(--text);box-shadow:0 1px 3px var(--shadow)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:var(--r3) var(--r3) 0 0;padding:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;overflow-x:hidden;transform:translateY(24px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:600}
/* UDIN */
.udin-block{background:var(--purple-bg);border:1px solid rgba(167,139,250,.25);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.udin-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
.udin-entry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.udin-entry:last-child{margin-bottom:0}
/* COMMENTS */
.comment-item{padding:10px 0;border-bottom:1px solid var(--border)}.comment-item:last-child{border-bottom:none}
.comment-author{font-size:11px;font-weight:600;color:var(--text2)}.comment-time{font-size:10px;color:var(--text3);margin-left:6px}.comment-text{font-size:13px;margin-top:3px}
/* APPROVAL */
.approval-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.appr-pending{background:var(--amber-bg);color:var(--amber)}.appr-approved{background:var(--accent-bg);color:var(--accent)}.appr-rejected{background:var(--red-bg);color:var(--red)}
/* RECURRING */
.recur-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;background:var(--purple-bg);color:var(--purple)}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-day-name{text-align:center;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;padding:4px 0}
.cal-day{min-height:52px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:4px;cursor:pointer}
.cal-day:hover{border-color:var(--border2)}.cal-day.today{border-color:var(--accent);background:var(--accent-bg)}.cal-day.has-tasks{border-color:var(--blue)}.cal-day.has-overdue{border-color:var(--red)}.cal-day.selected{box-shadow:0 0 0 2px var(--accent)}
.cal-date{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px}.cal-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin:1px}
/* DUE DATE */
.due-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600}
.due-ok{background:var(--teal-bg);color:var(--teal)}.due-soon{background:var(--amber-bg);color:var(--amber)}.due-overdue{background:var(--red-bg);color:var(--red)}.due-none{background:var(--bg4);color:var(--text3)}
/* BARS */
.dept-bar{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}.dept-bar:last-child{border-bottom:none}
.db-name{flex:1;font-size:13px;font-weight:500}.db-bar{width:90px;height:6px;background:var(--bg4);border-radius:99px;overflow:hidden}.db-fill{height:100%;border-radius:99px}.db-val{font-family:var(--mono);font-size:12px;color:var(--text2);min-width:52px;text-align:right}
/* TABLE */
.ts-table{width:100%;border-collapse:collapse;font-size:12px}
.ts-table th{text-align:left;padding:8px 10px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap}
.ts-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.ts-table tr:last-child td{border-bottom:none}.ts-table tr:hover td{background:var(--bg3)}
/* FILTER */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}.filter-bar .form-select{width:auto;padding:6px 10px;font-size:12px}
/* LIST */
.list-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.li-name{flex:1;font-size:13px}.li-sub{font-size:11px;color:var(--text3)}
/* BILLING */
.billing-card{background:var(--bg2);border:1px solid rgba(240,192,64,.25);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.billing-card.invoiced{border-color:var(--accent);opacity:.7}
/* FIRM MASTER */
.firm-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px;cursor:pointer;transition:border .15s}
.firm-card:hover{border-color:var(--border2)}.firm-card.active-firm{border-color:var(--accent);background:var(--accent-bg)}
/* SETTINGS */
.sett-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;cursor:pointer}
.sett-item:hover{border-color:var(--border2)}.sett-icon{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* TOGGLE */
.toggle{width:42px;height:24px;background:var(--border2);border-radius:99px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:white;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}.toggle.on::after{left:21px}
/* NOTIFICATION STATUS */
.notif-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}.notif-row:last-child{border-bottom:none}
.notif-sent{color:var(--accent)}.notif-pending{color:var(--amber)}.notif-failed{color:var(--red)}
/* MISC */
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.w-full{width:100%}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover,.chip.sel{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.running-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
.animate-in{display:block;width:100%;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent}.color-swatch.picked{border-color:var(--text)}
/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:32px;width:100%;max-width:380px;box-shadow:0 8px 32px var(--shadow)}
.login-logo{font-size:26px;font-weight:700;text-align:center;margin-bottom:6px}
.login-error{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,95,95,.2);border-radius:var(--r);padding:9px 12px;font-size:13px;margin-bottom:14px}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 18px;font-size:13px;color:var(--text);box-shadow:0 8px 24px var(--shadow);z-index:400;animation:toastIn .2s ease;white-space:nowrap;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* SPLASH */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.splash-logo{font-size:26px;font-weight:700}.splash-logo span{color:var(--accent)}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* USER PICKER */
.user-picker-wrap{min-height:100vh;background:var(--bg);padding:20px;display:flex;flex-direction:column;align-items:center}
.user-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;width:100%;max-width:600px}
.user-opt{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 10px;cursor:pointer;transition:all .15s;text-align:center}
.user-opt:hover{border-color:var(--accent);background:var(--accent-bg);transform:translateY(-2px)}
.uo-av{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.uo-name{font-size:12px;font-weight:600;margin-bottom:2px}.uo-role{font-size:10px;color:var(--text3)}
/* PIN LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px var(--shadow)}
.login-logo{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px}.login-logo span{color:var(--accent)}
.login-firm{font-size:13px;color:var(--text3);text-align:center;margin-bottom:24px}
.login-error{background:var(--red-bg);color:var(--red);border:1px solid rgba(255,95,95,.2);border-radius:var(--r);padding:8px 12px;font-size:12px;margin-bottom:14px;text-align:center}
/* PIN pad */
.pin-display{display:flex;justify-content:center;gap:10px;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all .15s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto}
.pin-key{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center;font-size:20px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
.pin-key:hover{background:var(--bg4);border-color:var(--border2)}.pin-key:active{transform:scale(.94)}
.pin-key.pin-del{font-size:16px;color:var(--text2)}.pin-key.pin-zero{grid-column:2}
/* BULK */
.bulk-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--blue);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:99;box-shadow:0 -4px 20px var(--shadow);animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.task-selected{border-color:var(--blue)!important;background:rgba(74,158,255,.05)!important}
/* CHECKLIST */
.checklist-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}.checklist-item:last-child{border-bottom:none}
.check-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-box.done{background:var(--accent);border-color:var(--accent)}
.check-box.done svg{display:block}.check-box svg{display:none;width:10px;height:10px;stroke:white;fill:none;stroke-width:3;stroke-linecap:round}
.check-text{font-size:13px;flex:1}.check-text.done{text-decoration:line-through;color:var(--text3)}
.cl-progress{font-size:10px;background:var(--bg4);color:var(--text2);padding:2px 7px;border-radius:99px;font-weight:600}
/* LEAVES */
.leave-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.lv-pending{background:var(--amber-bg);color:var(--amber)}.lv-approved{background:var(--accent-bg);color:var(--accent)}.lv-rejected{background:var(--red-bg);color:var(--red)}
.leave-on-duty{font-size:9px;background:var(--amber-bg);color:var(--amber);padding:1px 5px;border-radius:99px;font-weight:600}
/* PERFORMANCE */
.perf-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:10px}
/* SVG CHART */
.chart-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;overflow-x:auto;margin-bottom:14px}

/* ── FONT SIZE ── */
:root{--base-font:14px;--nav-w:200px;--nav-w-sm:48px;--top-h:56px}
body{font-size:var(--base-font)}
.app-sub{font-size:13px;font-weight:400;color:var(--text3)}

/* ── LEFT SIDEBAR NAV ── */
.app-shell{display:block;min-height:100vh;padding-top:var(--header-h)}
.side-nav{width:var(--nav-w);background:var(--bg2);border-right:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;padding:8px 0;position:fixed;top:var(--header-h);left:0;height:calc(100vh - var(--header-h));overflow-y:auto;overflow-x:hidden;transition:width .2s;z-index:90}
.side-nav.collapsed{width:var(--nav-w-sm)}
.main-area{display:block;margin-left:var(--nav-w);padding:16px 20px 40px;max-width:calc(100vw - var(--nav-w));transition:margin-left .2s,max-width .2s;overflow-x:hidden;box-sizing:border-box;min-height:calc(100vh - var(--header-h))}
.main-area.nav-collapsed{margin-left:var(--nav-w-sm);max-width:calc(100vw - var(--nav-w-sm))}
.nav-section{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:10px 14px 4px;white-space:nowrap;overflow:hidden}
.side-nav.collapsed .nav-section{opacity:0}
.side-nav .nav-item{display:flex;align-items:center;flex-direction:row;gap:10px;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);white-space:nowrap;overflow:hidden;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--text2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-bg)}
.nav-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-label{transition:opacity .15s;white-space:nowrap;overflow:hidden}.side-nav:not(.collapsed) .nav-label{opacity:1;width:auto;font-size:13px}
.side-nav.collapsed .nav-label{opacity:0;width:0}
.nav-badge{background:var(--amber);color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;flex-shrink:0}
.side-nav.collapsed .nav-badge{display:none}
.nav-toggle-btn{display:flex;align-items:center;justify-content:center;padding:10px;cursor:pointer;color:var(--text3);border-top:1px solid var(--border);margin-top:auto;flex-shrink:0}
.nav-toggle-btn:hover{color:var(--text)}
@media(min-width:769px){
  .side-nav{width:var(--nav-w)!important}
  .side-nav .nav-label{opacity:1!important;width:auto!important}
  .side-nav .nav-section{opacity:1!important}
  .side-nav .nav-badge{display:flex!important}
  .main-area{margin-left:var(--nav-w)!important;max-width:calc(100vw - var(--nav-w))!important}
}
@media(max-width:768px){
  :root{--nav-w:160px;--nav-w-sm:44px}
  .main-area{padding:12px 12px 40px}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .modal-body{padding:14px}.modal *{max-width:100%;box-sizing:border-box}
  .top-bar{padding:0 10px}
  .filter-bar{gap:5px}
  .ms-trigger{padding:4px 8px;font-size:11px}
}
@media(max-width:640px){
  /* Slide-in drawer nav on mobile */
  .side-nav{position:fixed;top:0!important;left:-260px;width:240px!important;height:100vh;flex-direction:column;border-right:1px solid var(--border);border-top:none;padding:60px 0 8px;z-index:200;background:var(--bg2);transition:left .25s ease;box-shadow:none}
  .side-nav.mobile-open{left:0;box-shadow:4px 0 24px rgba(0,0,0,.4)}
  .side-nav.collapsed{width:240px!important;left:-260px}
  .side-nav.collapsed.mobile-open{left:0}
  .side-nav .nav-section{display:block!important;opacity:1!important}
  .side-nav .nav-toggle-btn{display:none!important}
  .side-nav .nav-item{flex-direction:row;gap:10px;padding:12px 16px;font-size:13px;border-top:none;border-left:3px solid transparent;flex:unset;justify-content:flex-start;align-items:center;width:100%}
  .nav-item.active{border-top:none;border-left-color:var(--accent)}
  .nav-item svg{width:18px;height:18px;flex-shrink:0}
  .nav-label{font-size:13px;opacity:1!important;width:auto!important}
  .nav-badge{position:unset;top:auto;right:auto}
  .mobile-nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
  /* Main area full width */
  .main-area{margin-left:0!important;max-width:100vw!important;padding:10px 10px 20px!important;box-sizing:border-box}
  .top-bar{padding:0 10px}
  /* Cards and grids */
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr 1fr}
  .g4{grid-template-columns:1fr 1fr}
  .stat-card{padding:10px 8px}
  /* Task cards */
  .task-row{padding:10px}
  .tc-badges{flex-wrap:wrap}
  /* FAB higher on mobile to clear bottom nav */
  
  /* Modals full-screen on mobile */
  .modal-body{border-radius:var(--r2) var(--r2) 0 0;max-height:92vh;width:100%;max-width:100%!important;margin:auto 0 0}
  /* Sort/filter bar compact */
  .ms-filter{position:relative;display:inline-block}
.ms-trigger{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;user-select:none;min-width:80px}
.ms-trigger.has-value{border-color:var(--accent);color:var(--accent)}
.ms-trigger svg{width:11px;height:11px;flex-shrink:0;opacity:.6}
.ms-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:200px;max-width:260px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);box-shadow:0 8px 24px var(--shadow);z-index:400;padding:6px}
.ms-dropdown input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 8px;font-size:12px;color:var(--text);outline:none;margin-bottom:6px;box-sizing:border-box}
.ms-option{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--text2)}
.ms-option:hover{background:var(--bg3)}
.ms-option.selected{color:var(--accent)}
.ms-option .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ms-filter.open .ms-dropdown{display:block}
.sort-bar{padding:8px}
  .filter-bar{padding:8px}
  /* Kanban horizontal scroll */
  .kanban-board{padding-bottom:80px}
  /* Tabs scroll */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap}
  .tab{flex-shrink:0;white-space:nowrap}
  /* Tables */

  /* Page header */
  .page-header{flex-wrap:wrap;gap:8px}
  .page-title{font-size:17px}

/* ── MULTI-SELECT FILTER ── */

.ms-trigger{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap;color:var(--text2);user-select:none}
.ms-trigger:hover{border-color:var(--border2)}

.ms-opt:hover{background:var(--bg3)}

.dept-chip:hover{background:var(--bg3);color:var(--text2)}
.dept-chip.active{background:var(--accent-bg);color:var(--text);font-weight:600}

/* ── SORT/GROUP BAR ── */
.ms-filter{position:relative;display:inline-block}
.ms-trigger{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--text2);white-space:nowrap;user-select:none;min-width:80px}

.sort-btn{padding:3px 8px;border-radius:99px;font-size:11px;font-weight:500;background:transparent;border:1px solid var(--border);color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s;margin:2px}
.sort-btn:hover{background:var(--bg4);color:var(--text2)}
.sort-btn.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(126,217,87,.3)}

(function securityInit(){
  // 1. Disable console in production to prevent data extraction
  const _noop=()=>{};
  const _origConsole={log:console.log,warn:console.warn,error:console.error,info:console.info};
  // Keep error for debugging but suppress log/warn/info
  if(window.location.hostname!=='localhost'&&window.location.hostname!=='127.0.0.1'){
    console.log=_noop;
    console.warn=_noop;
    console.info=_noop;
    console.table=_noop;
    console.dir=_noop;
    // Allow error for critical debugging
  }

  // 2. Detect DevTools open and warn
  let _devToolsOpen=false;
  const _devThreshold=160;
  setInterval(()=>{
    if(window.outerWidth-window.innerWidth>_devThreshold||window.outerHeight-window.innerHeight>_devThreshold){
      if(!_devToolsOpen){
        _devToolsOpen=true;
        // Log audit event silently
        if(window.currentUser&&window.db){
          try{window.db.ref('audit_log/'+Date.now()).set({type:'devtools_open',userId:window.currentUser?.id,email:window.currentUser?.email,ts:Date.now()});}catch(_){}
        }
      }
    } else {
      _devToolsOpen=false;
    }
  },2000);

  // 3. Session timeout after 8 hours of inactivity
  let _sessionExpiry=Date.now()+8*60*60*1000;
  ['click','keydown','touchstart'].forEach(evt=>{
    document.addEventListener(evt,()=>{_sessionExpiry=Date.now()+8*60*60*1000;},true);
  });
  setInterval(()=>{
    if(Date.now()>_sessionExpiry&&window.currentUser){
      if(window.auth){window.auth.signOut();}
      localStorage.clear();
      window.currentUser=null;
      if(window.renderLogin)window.renderLogin();
      alert('Session expired. Please sign in again.');
    }
  },60000);

  // 4. Prevent right-click context menu inspection (mild deterrent)
  // document.addEventListener('contextmenu',e=>e.preventDefault()); // disabled - too restrictive

  // 5. Clear clipboard on page unload to prevent data leakage
  window.addEventListener('beforeunload',()=>{
    try{navigator.clipboard.writeText('');}catch(_){}
  });

  // 6. Override toString of sensitive arrays to not leak data
  // This prevents console.log(TASKS) from showing data in a simple way
  // Done after globals are defined (see end of startListeners)

})();

function _lsPersist(){} // Data caching removed for security
function _localUpd(p,v){var parts=p.split('/');
  if(parts[0]==='tasks'){var t=TASKS.find(function(x){return x.id===parts[1]});if(t)Object.assign(t,v);}
  else if(parts[0]==='users'){var u=USERS.find(function(x){return x.id===parts[1]});if(u)Object.assign(u,v);}
  _lsPersist();rerender();}
function _localSet(p,v){var parts=p.split('/');
  if(parts[0]==='tasks'){if(!TASKS.find(function(x){return x.id===v.id}))TASKS.push(v);}
  else if(parts[0]==='users'){if(!USERS.find(function(x){return x.id===v.id}))USERS.push(v);}
  else if(parts[0]==='time_entries'){if(!TIME_ENTRIES.find(function(x){return x.id===v.id}))TIME_ENTRIES.push(v);}
  else if(parts[0]==='leaves'){if(!LEAVES.find(function(x){return x.id===v.id}))LEAVES.push(v);}
  _lsPersist();rerender();}
function _localDel(p){var parts=p.split('/');
  if(parts[0]==='tasks')TASKS=TASKS.filter(function(x){return x.id!==parts[1]});
  else if(parts[0]==='time_entries')TIME_ENTRIES=TIME_ENTRIES.filter(function(x){return x.id!==parts[1]});
  else if(parts[0]==='leaves')LEAVES=LEAVES.filter(function(x){return x.id!==parts[1]});
  _lsPersist();rerender();}
var _isFile=window.location.protocol==='file:';
function fbSet(p,v){if(_isFile){_localSet(p,v);return Promise.resolve();}setSyncing();_ownWriteInProgress=true;return db.ref(p).set(v).then(()=>{setSyncOk();setTimeout(()=>{_ownWriteInProgress=false;if(!modalState)render();},400);}).catch(e=>{_ownWriteInProgress=false;setSyncErr(e);})}
function fbUpd(p,v){if(_isFile){_localUpd(p,v);return Promise.resolve();}setSyncing();_ownWriteInProgress=true;return db.ref(p).update(v).then(()=>{setSyncOk();setTimeout(()=>{_ownWriteInProgress=false;if(!modalState)render();},400);}).catch(e=>{_ownWriteInProgress=false;setSyncErr(e);})}
function fbDel(p){if(_isFile){_localDel(p);return Promise.resolve();}setSyncing();_ownWriteInProgress=true;return db.ref(p).remove().then(()=>{setSyncOk();setTimeout(()=>{_ownWriteInProgress=false;if(!modalState)render();},400);}).catch(e=>{_ownWriteInProgress=false;setSyncErr(e);})}
function setSyncing(){syncStatus='syncing';updateSyncDot()}
function setSyncOk(){syncStatus='ok';updateSyncDot()}
function setSyncErr(){syncStatus='err';updateSyncDot()}
function updateSyncDot(){const el=document.querySelector('.sync-dot');if(el)el.className='sync-dot '+syncStatus}
function uid(){if(_isFile){return 'loc_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}return db.ref().push().key}
function objToArr(o){return o?Object.values(o):[]}
function arrToObj(a){const o={};a.forEach(x=>o[x.id]=x);return o}

function checkLoaded(){
  if(Object.values(loaded).every(Boolean)){
    syncStatus='ok';
    checkRecurringTasks();
    // Security: make sensitive arrays non-enumerable in window scope
    // This prevents window.TASKS etc. from appearing in console autocomplete
    // Security: clear seed data and make sensitive vars non-enumerable
    try{
      ['SD_USERS','SD_CLIENTS','SD_TASKS','SD_TIME_ENTRIES','SD_CA_FIRMS','SEED_PIN_HASH','SD_SUBDEPTS','SD_STATUSES','SD_DEPTS','SD_FIRMS','SD_LEAVES','SD_CERTIFICATES'].forEach(k=>{
        delete window[k];
      });
    }catch(_){}
    render();
  }
}
// Track last user interaction time to protect editing sessions
let _lastInteraction=Date.now();
let _rerenderTimer=null;
let _pendingRerender=false;
document.addEventListener('keydown',(e)=>{
  _lastInteraction=Date.now();
  // Don't fire shortcuts when typing in inputs
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(modalState){if(e.key==='Escape'){closeModal();return;}return;}
  switch(e.key){
    case 'd': navigate('dashboard'); break;
    case 't': navigate('tasks'); break;
    case 'r': navigate('reports'); break;
    case 'l': navigate('leaves'); break;
    case 's': if(e.shiftKey){navigate('settings');}break;
    case 'e': navigate('drill'); break;
    case 'q': navigate('reminders-list'); break; // reminders
    case 'b': navigate('billing'); break;
    case 'h': navigate('home');break;
    case 'a': navigate('tasks',2);break;
    case 'v': navigate('reminders',1);break; // V = compliance calendar
    case 'y': navigate('calendar');break; // Y = task calendar
    case 'x': navigate('dsc');break; // X = DSC
    case 's': if(!modalState){openSearchPortal();return;}break;
    case 'n': openModal('newTask',{prefill:getNewTaskContext()});break;
    case 'c': navigate('clients');break;
    case 'k': navigate('certs');break;
    case 'm': navigate('chat');break;
    case '/': {const si=document.getElementById('search-inp');if(si){e.preventDefault();si.focus();searchOpen=true;render();}}break;
    case 'Escape': searchOpen=false;searchQuery='';render();break;
    case 'Tab': {
      e.preventDefault();
      const pages=['dashboard','tasks','reports','leaves','drill','quickview','billing','timesheets'];
      const idx=pages.indexOf(curPage);
      const next=e.shiftKey?pages[(idx-1+pages.length)%pages.length]:pages[(idx+1)%pages.length];
      navigate(next);
    }break;
    case '?': showShortcutsHelp(); break;
  }
});
document.addEventListener('mousedown',()=>{_lastInteraction=Date.now();});
document.addEventListener('input',()=>{_lastInteraction=Date.now();});

function rerender(){
  if(!_rendered)return;
  const active=document.activeElement;
  const inForm=active&&(active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.tagName==='SELECT');
  const modalOpen=!!modalState;
  if(modalOpen) return; // never auto-rerender while modal is open
  const recentInteraction=(Date.now()-_lastInteraction)<5000; // 5 sec grace window

  if(inForm||modalOpen||recentInteraction){
    // Mark that a re-render is pending but don't disrupt the user
    _pendingRerender=true;
    // Schedule a re-render for after the grace window expires
    clearTimeout(_rerenderTimer);
    _rerenderTimer=setTimeout(function(){
      if(_pendingRerender&&!modalState&&!document.querySelector('input:focus,textarea:focus,select:focus')){
        _pendingRerender=false;
        render();
      }
    }, 5000);
    return;
  }
  _pendingRerender=false;
  render();
}

function startListeners(){
  db.ref('users').on('value',s=>{const v=s.val();if(!v){db.ref('users').set(arrToObj(SD_USERS));return}USERS=objToArr(v);if(!loaded.users){loaded.users=true;checkLoaded();}else markRemoteUpdate('users');});
  db.ref('depts').on('value',s=>{const v=s.val();if(!v){if(currentUser)db.ref('depts').set(arrToObj(SD_DEPTS));return;}DEPTS=objToArr(v);if(!loaded.depts){loaded.depts=true;checkLoaded();}else render();},e=>{if(e.code==='PERMISSION_DENIED'){loaded.depts=true;checkLoaded();}});
  db.ref('subdepts').on('value',s=>{const v=s.val();if(!v){if(currentUser)db.ref('subdepts').set(arrToObj(SD_SUBDEPTS));return;}SUBDEPTS=objToArr(v);if(!loaded.subdepts){loaded.subdepts=true;checkLoaded();}else render();},e=>{if(e.code==='PERMISSION_DENIED'){loaded.subdepts=true;checkLoaded();}});
  db.ref('statuses').on('value',s=>{const v=s.val();if(!v){if(currentUser)db.ref('statuses').set(SD_STATUSES);return;}STATUSES=v; // keep as {sdId:[...]} object - do NOT use objToArr
if(!loaded.statuses){loaded.statuses=true;checkLoaded();}else render();},e=>{if(e.code==='PERMISSION_DENIED'){loaded.statuses=true;checkLoaded();}});

  db.ref('clients').on('value',s=>{const v=s.val();if(!v){if(currentUser)db.ref('clients').set(arrToObj(SD_CLIENTS));else{loaded.clients=true;checkLoaded();}return;}CLIENTS=objToArr(v);if(!loaded.clients){loaded.clients=true;checkLoaded();}else markRemoteUpdate('clients');},e=>{if(e.code==='PERMISSION_DENIED'){loaded.clients=true;checkLoaded();}});
  db.ref('tasks').on('value',s=>{const v=s.val();if(!v){if(currentUser)db.ref('tasks').set(arrToObj(SD_TASKS));else{loaded.tasks=true;checkLoaded();}return;}TASKS=objToArr(v);if(!loaded.tasks){loaded.tasks=true;checkLoaded();}else markRemoteUpdate('tasks');},e=>{if(e.code==='PERMISSION_DENIED'){loaded.tasks=true;checkLoaded();}});
  db.ref('time_entries').on('value',s=>{TIME_ENTRIES=objToArr(s.val()||{},e=>{if(e.code==='PERMISSION_DENIED'){loaded.entries=true;checkLoaded();}});if(!loaded.entries){loaded.entries=true;checkLoaded();}else markRemoteUpdate('time');});
  db.ref('recurring_tasks').on('value',s=>{const v=s.val();if(!v){if(currentUser)db.ref('recurring_tasks').set(arrToObj(SD_RECURRING));else{loaded.recurring=true;checkLoaded();}return;}RECURRING=objToArr(v);if(!loaded.recurring){loaded.recurring=true;checkLoaded();}else markRemoteUpdate('recurring');},e=>{if(e.code==='PERMISSION_DENIED'){loaded.recurring=true;checkLoaded();}});
  db.ref('comments').on('value',s=>{COMMENTS=s.val()||{};if(!loaded.comments){loaded.comments=true;checkLoaded();}else markRemoteUpdate('comments');},e=>{if(e.code==='PERMISSION_DENIED'){loaded.comments=true;checkLoaded();}});
  db.ref('firms').on('value',s=>{const v=s.val();if(!v){db.ref('firms').set(arrToObj(SD_FIRMS));return}FIRMS=objToArr(v);if(!loaded.firms){loaded.firms=true;checkLoaded();}else markRemoteUpdate('firms');});
  db.ref('emailjs_config').on('value',s=>{EMAILJS_CFG=s.val()||SD_EMAILJS;if(!s.val())db.ref('emailjs_config').set(SD_EMAILJS);if(!loaded.emailjs){loaded.emailjs=true;checkLoaded();}else markRemoteUpdate('emailjs');initEmailJS();});
  db.ref('ca_firms').on('value',s=>{const v=s.val();if(!v){db.ref('ca_firms').set(arrToObj(SD_CA_FIRMS));return}CA_FIRMS=objToArr(v);if(!loaded.cafirms){loaded.cafirms=true;checkLoaded();}else markRemoteUpdate('cafirms');});
  db.ref('certificates').on('value',s=>{CERTIFICATES=objToArr(s.val()||{},e=>{if(e.code==='PERMISSION_DENIED'){loaded.certs=true;checkLoaded();}});if(!loaded.certs){loaded.certs=true;checkLoaded();}else markRemoteUpdate('certs');});
  db.ref('leaves').on('value',s=>{LEAVES=objToArr(s.val()||{},e=>{if(e.code==='PERMISSION_DENIED'){loaded.leaves=true;checkLoaded();}});if(!loaded.leaves){loaded.leaves=true;checkLoaded();}else markRemoteUpdate('leaves');});
  db.ref('admin_settings').on('value',s=>{ADMIN_SETTINGS=s.val()||{escalationDays:3,dueDateChangeLimit:3,timeAlertHours:2,leaveBalances:{annual:24,sick:10,halfDay:10,wfh:20}};if(!loaded.settings){loaded.settings=true;checkLoaded();}else markRemoteUpdate('settings');});
  // Notifications: always update live (badge needs to reflect immediately)
  db.ref('notifications').on('value',s=>{NOTIFICATIONS=objToArr(s.val()||{}).filter(n=>!n.userId||n.userId===currentUser?.id,e=>{if(e.code==='PERMISSION_DENIED'){loaded.notifications=true;checkLoaded();}});loaded.notifications=true;checkLoaded();updateNotifBadge();if(_pendingRemoteUpdate)showRefreshBadge();else rerender();});
  db.ref('reminders').on('value',s=>{REMINDERS=objToArr(s.val()||{}).filter(r=>r.userId===currentUser?.id,e=>{if(e.code==='PERMISSION_DENIED'){loaded.reminders=true;checkLoaded();}});if(!loaded.reminders){loaded.reminders=true;checkLoaded();}checkReminders();if(!_pendingRemoteUpdate)rerender();});
  db.ref('task_templates').on('value',s=>{TASK_TEMPLATES=objToArr(s.val()||{},e=>{if(e.code==='PERMISSION_DENIED'){loaded.templates=true;checkLoaded();}});if(!loaded.templates){loaded.templates=true;checkLoaded();}else markRemoteUpdate('templates');});
  db.ref('whatsapp_config').on('value',s=>{WHATSAPP_CFG=s.val()||{};loaded.whatsapp=true;checkLoaded();},e=>{if(e.code==='PERMISSION_DENIED'){loaded.whatsapp=true;checkLoaded();}});
  // Active timer listener is attached in doEmailLogin/initWithAuth after user is known
  loaded.timer=true; // mark as loaded immediately

  // Chat rooms - only after user is logged in
  db.ref('chat_rooms').on('value',s=>{
    const uid=currentUser?.id;
    CHAT_ROOMS=uid?objToArr(s.val()||{}).filter(r=>Array.isArray(r.members)&&r.members.includes(uid)):[];
    chatLoaded=true;
    updateChatBadge();
    if(curPage==='chat') rerender();
  });
  // Chat messages for current room - loaded on demand in openChatRoom()

  // Auth state listener - purely for monitoring, initWithAuth() handles startup
  auth.onAuthStateChanged(function(fbUser){
    if(fbUser){
      // User is signed in - nothing to do
    } else if(currentUser) {
      // Lost auth session - redirect to login
      currentUser=null;
      renderLogin();
    }
  });

  // Batch logs
  db.ref('batch_logs').on('value',s=>{
    BATCH_LOGS=objToArr(s.val()||{});
    batchLogLoaded=true;
    if(curPage==='tasks'||curPage==='reports') rerender();
  });
  db.ref('dsc_records').on('value',s=>{
    DSC_RECORDS=objToArr(s.val()||{});
    if(!loaded.dsc){loaded.dsc=true;checkLoaded();}else render();
  },e=>{if(!loaded.dsc){loaded.dsc=true;checkLoaded();}});
  db.ref('dsc_movements').on('value',s=>{DSC_MOVEMENTS=objToArr(s.val()||{});render();},e=>{});
}

async function saveCAFirm(editId){
  const name=document.getElementById('caf-name')?.value?.trim();
  const scheme=document.getElementById('caf-scheme')?.value?.trim();
  if(!name){toast('Name required');return;}
  const data={name,pan:document.getElementById('caf-pan')?.value||'',regNo:document.getElementById('caf-regno')?.value||'',scheme:scheme||'',memberships:collectCafMembers()};
  const firmId=editId||uid();
  if(editId){
    const existing=CA_FIRMS.find(f=>f.id===editId);
    await fbUpd('ca_firms/'+editId,{...data,active:existing?.active||false});
  } else {
    await fbSet('ca_firms/'+firmId,{id:firmId,...data,active:CA_FIRMS.length===0,createdAt:today()});
  }
  // Save cert sequence override to admin_settings if provided
  const overrideVal=document.getElementById('caf-seq-override')?.value?.trim();
  const overrideKey='certSeqOverride_'+firmId;
  if(overrideVal!==''&&overrideVal!==undefined){
    const overrideNum=parseInt(overrideVal,10);
    if(!isNaN(overrideNum)){
      await fbUpd('admin_settings',{[overrideKey]:overrideNum});
      toast((editId?'Updated':'Added')+' — next cert will be #'+(overrideNum+1));
    } else {
      toast(editId?'Updated':'Added');
    }
  } else {
    // Clear any existing override
    const updates={};updates[overrideKey]=null;
    await fbUpd('admin_settings',updates);
    toast(editId?'Updated':'Added');
  }
  closeModal();
}

async function deleteCAFirm(id){if(CA_FIRMS.length<=1){toast('Cannot delete last CA Firm');return}await fbDel('ca_firms/'+id);closeModal();toast('Deleted')}

function collectCafMembers(){const l=document.getElementById('caf-members-list');if(!l)return[];const rows=l.querySelectorAll('[id^="caf-member-"],[style*="margin-bottom"]');const members=[];l.querySelectorAll('div').forEach(row=>{const inputs=row.querySelectorAll('input');if(inputs.length>=2){const name=inputs[0].value.trim();const membershipNo=inputs[1].value.trim();if(name)members.push({name,membershipNo})}});return members}

function applyFontSize(size){
  const s=Math.max(11,Math.min(40,size));
  // Set on html root so rem units scale, and set CSS variable for px-based elements
  const scale=s/14; // 14px is our base
  document.documentElement.style.setProperty('--font-scale',scale);
  document.documentElement.style.fontSize=s+'px';
  document.getElementById('app').style.fontSize=s+'px';
  LS.set('userFontSize',s);
}
function applyTheme(id){
  const t=THEMES.find(x=>x.id===id)||THEMES[0];
  document.documentElement.style.setProperty('--accent',t.accent);
  document.documentElement.style.setProperty('--accent-bg',t.bg);
  accentTheme=id;
  LS.set('accentTheme',id);
}

  <div class="form-row"><label class="form-label">Note</label>

  <div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn btn-primary" style="flex:1" onclick="saveTimeEntry('${entryId}')">Save</button>
    <button class="btn btn-danger btn-sm" onclick="deleteTimeEntry('${entryId}')">Delete</button>
  </div>`;
}

async function saveTimeEntry(entryId){
  const e=TIME_ENTRIES.find(x=>x.id===entryId);
  if(!e)return;
  const hh=parseInt(document.getElementById('ete-h')?.value)||0;
  const mm=parseInt(document.getElementById('ete-m')?.value)||0;
  const newSec=hh*3600+mm*60;
  if(newSec<=0){toast('Enter time > 0');return;}
  const date=document.getElementById('ete-date')?.value||e.date;
  const note=document.getElementById('ete-note')?.value||'';
  const diff=newSec-e.seconds;
  await fbUpd('time_entries/'+entryId,{seconds:newSec,date,note});
  // Update task total seconds
  if(diff!==0){
    const task=TASKS.find(t=>t.id===e.taskId);
    if(task) await fbUpd('tasks/'+e.taskId,{seconds:Math.max(0,(task.seconds||0)+diff)});
  }
  closeModal();toast('Time entry updated ✓');
}

async function deleteTimeEntry(entryId){
  const e=TIME_ENTRIES.find(x=>x.id===entryId);
  if(!e)return;
  const role=currentUser.role;
  const canDelete=role==='superadmin'||role==='manager'||e.userId===currentUser.id;
  if(!canDelete){toast('No permission to delete this entry');return;}
  if(!confirm('Delete this time entry?'))return;
  // Subtract seconds from task total
  const task=TASKS.find(t=>t.id===e.taskId);
  if(task) await fbUpd('tasks/'+e.taskId,{seconds:Math.max(0,(task.seconds||0)-(e.seconds||0))});
  await fbDel('time_entries/'+entryId);
  closeModal();toast('Entry deleted');
}

async function executeMerge(targetId){
  const target=TASKS.find(t=>t.id===targetId);
  if(!target){toast('Target task not found');return;}
  const selectedIds=[...document.querySelectorAll('.merge-cb:checked')].map(el=>el.value);
  if(selectedIds.length===0){toast('Select at least one task to merge');return;}
  if(!confirm('Merge '+selectedIds.length+' task(s) into "'+target.title+'"? This cannot be undone.'))return;
  let totalAddedSec=0;
  let mergedAssignees=Array.isArray(target.assignees)?[...target.assignees]:(target.assigneeId?[target.assigneeId]:[]);
  for(const sid of selectedIds){
    const src=TASKS.find(t=>t.id===sid);
    if(!src)continue;
    // Move all time entries to target
    const srcEntries=TIME_ENTRIES.filter(e=>e.taskId===sid);
    for(const e of srcEntries){
      await fbUpd('time_entries/'+e.id,{taskId:targetId});
    }
    totalAddedSec+=src.seconds||0;
    // Merge assignees (unique)
    const srcAssignees=Array.isArray(src.assignees)?src.assignees:(src.assigneeId?[src.assigneeId]:[]);
    srcAssignees.forEach(uid2=>{if(!mergedAssignees.includes(uid2))mergedAssignees.push(uid2);});
    // Move comments
    if(COMMENTS[sid]){
      const srcComments=COMMENTS[sid];
      for(const cid of Object.keys(srcComments)){
        await fbSet('comments/'+targetId+'/'+cid,srcComments[cid]);
      }
    }
    // Delete source task
    await fbDel('tasks/'+sid);
  }
  // Update target with merged data
  await fbUpd('tasks/'+targetId,{
    seconds:(target.seconds||0)+totalAddedSec,
    assignees:mergedAssignees,
  });
  closeModal();
  toast(selectedIds.length+' task(s) merged into "'+target.title+'" ✓');
}

function totalUnreadCount(){
  return Object.values(CHAT_UNREAD).reduce((a,b)=>a+b,0);

function updateChatBadge(){
  const total=totalUnreadCount();

  const badge=document.getElementById('chat-nav-badge');

function getChatRoomId(userId1,userId2){
  // Deterministic DM room ID
  return 'dm_'+[userId1,userId2].sort().join('_');

// ── Open a chat room & load messages ──────────────────
function openChatRoom(roomId){
  // Verify user is a member of this room before subscribing
  const room=getChatRoom(roomId);
  if(room&&room.members&&!room.members.includes(currentUser.id)){
    console.warn('[Chat] Access denied to room',roomId,'- not a member');
    toast('You are not a member of this chat');
    return;
  }
  // Detach listener from previous room to prevent stacking
  if(curChatRoom&&curChatRoom!==roomId){
    db.ref('chat_messages/'+curChatRoom).off('value');
  }
  curChatRoom=roomId;
  CHAT_MESSAGES[roomId]=CHAT_MESSAGES[roomId]||{};
  let _lastMsgCount=Object.keys(CHAT_MESSAGES[roomId]).length;
  // Subscribe to messages for this room only
  db.ref('chat_messages/'+roomId).on('value',s=>{
    const newMsgs=s.val()||{};
    const newCount=Object.keys(newMsgs).length;
    // Detect new incoming message (not from self) for desktop notification
    if(newCount>_lastMsgCount){
      const allMsgs=Object.values(newMsgs).sort((a,b)=>a.ts-b.ts);
      const latest=allMsgs[allMsgs.length-1];
      if(latest&&latest.userId!==currentUser.id&&!latest.readBy?.[currentUser.id]){
        const room=getChatRoom(roomId)||{};
        const sender=getUser(latest.userId);
        const title=(room.type==='group'?room.name:sender?.name)||'New message';
        showDesktopNotif(title,latest.text.slice(0,80),null);
      }
    }
    _lastMsgCount=newCount;
    CHAT_MESSAGES[roomId]=newMsgs;
    // Mark messages as read
    const msgs=Object.values(CHAT_MESSAGES[roomId]);
    msgs.forEach(msg=>{
      if(msg.userId!==currentUser.id&&!(msg.readBy&&msg.readBy[currentUser.id])){
        db.ref('chat_messages/'+roomId+'/'+msg.id+'/readBy/'+currentUser.id).set(Date.now());
      }
    });
    CHAT_UNREAD[roomId]=0;
    updateChatBadge();
    if(curPage==='chat'&&curChatRoom===roomId){
      rerender();
      setTimeout(()=>{const el=document.getElementById('chat-msgs-end');if(el)el.scrollIntoView();},50);
    }
  });
  render();
  setTimeout(()=>{
    const inp=document.getElementById('chat-inp');if(inp)inp.focus();
    const el=document.getElementById('chat-msgs-end');if(el)el.scrollIntoView();
  },80);
}

async function sendChatMessage(roomId){

  inp.value='';inp.style.height='auto';

  await fbUpd('chat_rooms/'+roomId,{lastMsg:text,lastMsgTs:Date.now(),lastMsgUser:currentUser.id});

  const room=getChatRoom(roomId)||{members:[],type:'dm'};
  const notifTitle=(room.type==='group'?(room.name+' — '):'') + currentUser.name;
  (room.members||[]).filter(m=>m!==currentUser.id).forEach(memberId=>{
    pushNotif(memberId,'chat',notifTitle,text.slice(0,100),null);
  });
  setTimeout(()=>{const el=document.getElementById('chat-msgs-end');if(el)el.scrollIntoView();},30);
}

async function addToGroup(roomId,userId){
  if(!userId)return;
  const room=getChatRoom(roomId);

  const members=[...new Set([...(room.members||[]),userId])];
  await fbUpd('chat_rooms/'+roomId,{members});
  toast('Member added');closeModal();
}
async function removeFromGroup(roomId,userId){
  const room=getChatRoom(roomId);
  if(!room)return;
  const members=(room.members||[]).filter(m=>m!==userId);
  await fbUpd('chat_rooms/'+roomId,{members});
  toast('Member removed');closeModal();
}
async function deleteChatGroup(roomId){

async function saveBatchLog(taskId){
  const qty=parseInt(document.getElementById('bl-qty')?.value)||0;

  const userId=document.getElementById('bl-user')?.value||currentUser.id;
  const hh=parseInt(document.getElementById('bl-h')?.value)||0;
  const mm2=parseInt(document.getElementById('bl-m')?.value)||0;
  const seconds=hh*3600+mm2*60;
  const date=document.getElementById('bl-date')?.value||today();
  const note=document.getElementById('bl-note')?.value||'';
  const id=uid();
  await fbSet('batch_logs/'+id,{id,taskId,userId,date,qty,seconds,note,ts:Date.now()});
  if(seconds>0){
    await fbSet('time_entries/'+uid(),{id:uid(),taskId,userId,date,seconds,note:note||'Batch work'});
    const task=TASKS.find(t=>t.id===taskId);
    if(task) await fbUpd('tasks/'+taskId,{seconds:(task.seconds||0)+seconds});
  }
  closeModal();toast(`Logged ${qty} units ✓`);
}

// Each user's Firebase Auth email: userId@taskhub.app (synthetic, never emailed)
function fbAuthEmail(userId){ return userId+'@taskhub.app'; }

// Legacy: fbAuthSignIn - kept for reference only, no longer called
async function fbAuthSignIn(userId, pinHash){
  // pinHash is the hex SHA-256 of the PIN - use as Firebase Auth password
  const email = fbAuthEmail(userId);
  try {
    await auth.signInWithEmailAndPassword(email, pinHash);
    return true;
  } catch(e){
    if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/invalid-email'){
      // Account doesn't exist yet - create it (first login after migration)
      try {
        await auth.createUserWithEmailAndPassword(email, pinHash);
        /* auth log removed */
        return true;
      } catch(e2){
        console.error('[Auth] Failed to create account:', e2.code, e2.message);
        return false;
      }
    } else if(e.code === 'auth/wrong-password'){
      // PIN mismatch at Firebase Auth level - try to re-create with new hash
      // This handles the case where user changed PIN but auth account has old one
      try {
        const user = auth.currentUser;
        if(user) await user.delete();
      } catch(_){}
      try {
        await auth.createUserWithEmailAndPassword(email, pinHash);
        return true;
      } catch(e3){
        console.error('[Auth] Re-create failed:', e3.code);
        // Fallback: allow login anyway (PIN check already passed)
        return true;
      }
    } else {
      console.error('[Auth] Sign in error:', e.code, e.message);
      // Non-critical: allow login anyway since PIN already verified
      return true;
    }
  }
}

async function fbAuthSignOut(){
  try { await auth.signOut(); } catch(_){}
}

async function fbAuthUpdatePassword(userId, newPinHash){
  try {
    const user = auth.currentUser;
    if(user && user.email === fbAuthEmail(userId)){
      await user.updatePassword(newPinHash);
      
    } else {
      // Re-sign in with old hash then update (shouldn't happen normally)
      /* auth warn removed */
    }
  } catch(e){
    if(e.code === 'auth/requires-recent-login'){
      // Re-authenticate and retry
      try {
        const storedUser = LS.get('currentUser', null);
        if(storedUser){
          const oldHash = storedUser.pinHash;
          await auth.signInWithEmailAndPassword(fbAuthEmail(userId), oldHash);
          await auth.currentUser.updatePassword(newPinHash);
        }
      } catch(e2){ /* auth warn removed */ }
    }
    console.error('[Auth] updatePassword error:', e.code);
  }
}


function showForgotPassword(){
  const email=prompt('Enter your email address to receive a password reset / activation link:');
  if(!email||!email.trim())return;
  auth.sendPasswordResetEmail(email.trim())
    .then(()=>{
      alert('✓ Password reset link sent to '+email.trim()+'\n\nCheck your inbox (and spam folder).\n\nIf this is your first login, this link will activate your account and let you set a password.');
    })
    .catch(e=>{
      if(e.code==='auth/user-not-found'){
        // User doesn't have a Firebase Auth account yet — create one first, then send reset
        auth.createUserWithEmailAndPassword(email.trim(),'TempPass_'+Math.random().toString(36).slice(2,10)+'!')
          .then(()=>auth.sendPasswordResetEmail(email.trim()))
          .then(()=>{
            alert('✓ Account activated! Password setup link sent to '+email.trim()+'\n\nCheck your inbox and follow the link to set your password.');
          })
          .catch(()=>{
            alert('Could not send reset email. Make sure you are using the email address registered with your admin.');
          });
      } else if(e.code==='auth/invalid-email'){
        alert('Invalid email address.');
      } else {
        alert('Could not send reset email: '+e.message);
      }
    });
}


function assignDeptUsers(){
  const deptId=document.getElementById('f-dept')?.value;
  if(!deptId){toast('Select a department first');return;}
  const dept=getDept(deptId);
  // Get all users in this department
  const deptUsers=USERS.filter(u=>{
    if(u.deptId===deptId) return true;
    if(Array.isArray(u.deptIds)&&u.deptIds.includes(deptId)) return true;
    return false;
  });
  if(!deptUsers.length){toast('No staff found in '+dept?.name);return;}
  // Check all their checkboxes
  let checked=0;
  document.querySelectorAll('.f-assignee-cb').forEach(cb=>{
    const inDept=deptUsers.some(u=>u.id===cb.value);
    cb.checked=inDept;
    if(inDept) checked++;
  });
  // Make sure all rows are visible
  document.querySelectorAll('.f-assignee-row').forEach(el=>el.style.display='flex');
  toast(checked+' staff from '+dept?.name+' selected');
}


function assignDeptUsersToTask(taskId){

function showClientTasksInForm(clientId){
  const panel=document.getElementById('f-client-tasks');
  const list=document.getElementById('f-client-tasks-list');
  if(!panel||!list) return;
  if(!clientId){panel.style.display='none';list.innerHTML='';return;}

  // Get ALL active tasks for this client across all depts
  const clientTasks=TASKS.filter(t=>
    t.clientId===clientId && !isTaskTerminal(t)
  ).sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));

  if(!clientTasks.length){
    panel.style.display='none';
    return;
  }

  panel.style.display='block';
  const alreadyAssigned=clientTasks.filter(t=>isAssignedTo(t,currentUser.id));
  const notAssigned=clientTasks.filter(t=>!isAssignedTo(t,currentUser.id));

  let html='';

  if(alreadyAssigned.length){
    html+='<div style="font-size:10px;color:var(--teal);margin-bottom:4px">Already assigned to you ('+alreadyAssigned.length+'):</div>';
    html+=alreadyAssigned.map(t=>{
      const dept=getDept(t.deptId);
      const assignees=taskAssignees(t).map(u=>shortName(u.name)).join(', ');
      return '<div style="padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;font-size:12px">'
        +'<div style="flex:1"><div style="font-weight:500">'+t.title+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">'+(dept?dept.name+' · ':'')+t.status+(t.dueDate?' · Due '+fmtDate(t.dueDate):'')+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">Assignees: '+assignees+'</div></div>'
        +'<button class="btn btn-ghost btn-xs" style="color:var(--accent)" onclick="openModal(\'taskDetail\',{id:\''+t.id+'\'})">Open →</button>'
        +'</div>';
    }).join('');
  }

  if(notAssigned.length){
    html+='<div style="font-size:10px;color:var(--text3);margin-top:'+(alreadyAssigned.length?'8px':'0')+'px;margin-bottom:4px">Other active tasks for this client ('+notAssigned.length+'):</div>';
    html+=notAssigned.map(t=>{
      const dept=getDept(t.deptId);
      const assignees=taskAssignees(t).map(u=>shortName(u.name)).join(', ');
      return '<div style="padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;font-size:12px">'
        +'<div style="flex:1"><div style="font-weight:500">'+t.title+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">'+(dept?dept.name+' · ':'')+t.status+(t.dueDate?' · Due '+fmtDate(t.dueDate):'')+'</div>'
        +'<div style="font-size:10px;color:var(--text3)">Assigned to: '+assignees+'</div></div>'
        +'<button class="btn btn-primary btn-xs" onclick="assignSelfToExistingTask(\''+t.id+'\')">Assign Me</button>'
        +'</div>';
    }).join('');
  }

  list.innerHTML=html;
}

async function assignSelfToExistingTask(taskId){
  const t=TASKS.find(x=>x.id===taskId);
  if(!t){toast('Task not found');return;}
  if(isAssignedTo(t,currentUser.id)){
    toast('You are already assigned to this task');
    openModal('taskDetail',{id:taskId});
    closeModal();
    return;
  }
  // Add current user to assignees
  const existing=Array.isArray(t.assignees)?t.assignees:(t.assigneeId?[t.assigneeId]:[]);
  const newAssignees=[...new Set([...existing,currentUser.id])];
  await fbUpd('tasks/'+taskId,{assignees:newAssignees});
  logChange(taskId,'reassigned',currentUser.name+' self-assigned');
  closeModal();
  toast('You have been assigned to "'+t.title+'" ✓');
  // Open the task detail
  setTimeout(()=>openModal('taskDetail',{id:taskId}),300);
}

let searchPortalOpen=false;
let searchPortalQuery='';
let searchPortalActive=0; // keyboard nav index

function openSearchPortal(){
  searchPortalOpen=true;
  searchPortalQuery='';
  searchPortalActive=0;
  render();
  setTimeout(()=>{
    const inp=document.getElementById('sp-inp');
    if(inp) inp.focus();
  },30);
}

function closeSearchPortal(){
  searchPortalOpen=false;
  searchPortalQuery='';
  render();
}

function doGlobalSearch(q){
  if(!q||q.length<1) return {tasks:[],clients:[],users:[],certs:[]};
  const lq=q.toLowerCase().trim();

  // Tasks
  const tasks=TASKS.filter(t=>{
    if(isTaskTerminal(t)&&q.length<3) return false;
    return (t.title||'').toLowerCase().includes(lq)||
      (getClient(t.clientId)?.name||'').toLowerCase().includes(lq)||
      (getDept(t.deptId)?.name||'').toLowerCase().includes(lq)||
      (t.notes||'').toLowerCase().includes(lq)||
      taskAssignees(t).some(u=>(u.name||'').toLowerCase().includes(lq));
  }).slice(0,8);

  // Clients
  const clients=CLIENTS.filter(c=>
    (c.name||'').toLowerCase().includes(lq)||
    (c.email||'').toLowerCase().includes(lq)||
    (c.gstin||'').toLowerCase().includes(lq)||
    (c.pan||'').toLowerCase().includes(lq)
  ).slice(0,5);

  // Users / staff
  const users=USERS.filter(u=>
    (u.name||'').toLowerCase().includes(lq)||
    (u.email||'').toLowerCase().includes(lq)||
    (u.role||'').toLowerCase().includes(lq)||
    (getDept(u.deptId)?.name||'').toLowerCase().includes(lq)
  ).slice(0,4);

  // Certificates
  const certs=CERTIFICATES.filter(c=>
    (c.clientName||getClient(c.clientId)?.name||'').toLowerCase().includes(lq)||
    (c.purpose||'').toLowerCase().includes(lq)||
    (c.udin||'').toLowerCase().includes(lq)||
    (c.certNo||'').toLowerCase().includes(lq)
  ).slice(0,4);

  return {tasks,clients,users,certs};
}

function searchPortalHTML(){
  if(!searchPortalOpen) return '';
  const res=doGlobalSearch(searchPortalQuery);
  const total=res.tasks.length+res.clients.length+res.users.length+res.certs.length;
  const hasQuery=searchPortalQuery.length>0;

  const taskRows=res.tasks.map((t,i)=>{
    const client=getClient(t.clientId);
    const dept=getDept(t.deptId);
    const sc=statusColor(t.status);
    return `<div class="sp-result" data-sp-idx="${i}" onclick="closeSearchPortal();openModal('taskDetail',{id:'${t.id}'})">
      <div class="sp-result-icon" style="background:${sc}22;color:${sc}">✅</div>

      </div>
      <span class="sp-result-badge" style="background:${sc}22;color:${sc}">${t.priority||'med'}</span>
    </div>`;
  }).join('');

  const clientRows=res.clients.map(c=>{
    const taskCount=TASKS.filter(t=>t.clientId===c.id&&!isTaskTerminal(t)).length;
    return `<div class="sp-result" onclick="closeSearchPortal();navigate('clients');setTimeout(()=>openModal('clientDetail',{id:'${c.id}'}),200)">

        <div class="sp-result-sub">${c.gstin?'GSTIN: '+c.gstin+' · ':''}${c.pan?'PAN: '+c.pan+' · ':''}${taskCount} active tasks</div>
      </div>
    </div>`;
  }).join('');

  const userRows=res.users.map(u=>{
    const dept=getDept(u.deptId);
    return `<div class="sp-result" onclick="closeSearchPortal();navigate('reports',3);setTimeout(()=>{perfDrillUser='${u.id}';render();},200)">
      <div class="sp-result-icon">${getAvatarHTML(u.id,32)}</div>
      <div class="sp-result-main">
        <div class="sp-result-title">${u.name}</div>
        <div class="sp-result-sub">${u.role} · ${dept?dept.name:'No dept'}</div>
      </div>
    </div>`;
  }).join('');

  const certRows=res.certs.map(c=>{
    return `<div class="sp-result" onclick="closeSearchPortal();navigate('certs')">
      <div class="sp-result-icon" style="background:var(--amber-bg);color:var(--amber)">📋</div>
      <div class="sp-result-main">
        <div class="sp-result-title">${c.purpose||'Certificate'}</div>
        <div class="sp-result-sub">${getClient(c.clientId)?.name||c.clientName||''}${c.udin?' · UDIN: '+c.udin:''}${c.certNo?' · Cert #'+c.certNo:''}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="search-portal" onclick="if(event.target===this)closeSearchPortal()">
    <div class="search-portal-box">
      <input class="search-portal-inp" id="sp-inp" placeholder="Search tasks, clients, staff, certificates…"
        value="${searchPortalQuery}"
        oninput="searchPortalQuery=this.value;searchPortalActive=0;render();this.focus()"
        onkeydown="handleSearchPortalKey(event)"/>
      <div class="search-portal-results">
        ${!hasQuery?`<div class="sp-empty">Start typing to search across everything…</div>`:''}
        ${hasQuery&&total===0?`<div class="sp-empty">No results for "<strong>${searchPortalQuery}</strong>"</div>`:''}
        ${res.tasks.length?`<div class="sp-section-label">📋 Tasks (${res.tasks.length})</div>${taskRows}`:''}
        ${res.clients.length?`<div class="sp-section-label">👥 Clients (${res.clients.length})</div>${clientRows}`:''}
        ${res.users.length?`<div class="sp-section-label">👤 Staff (${res.users.length})</div>${userRows}`:''}
        ${res.certs.length?`<div class="sp-section-label">📋 Certificates (${res.certs.length})</div>${certRows}`:''}
      </div>
      <div class="sp-hint">
        <span>↑↓ navigate</span><span>↵ open</span><span>Esc close</span>
        <span style="margin-left:auto">Press <kbd>S</kbd> anywhere to search</span>
      </div>
    </div>
  </div>`;
}

function handleSearchPortalKey(e){
  if(e.key==='Escape'){closeSearchPortal();return;}
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    const items=document.querySelectorAll('.sp-result');
    if(!items.length)return;
    items[searchPortalActive]?.classList.remove('active');
    searchPortalActive=(e.key==='ArrowDown')?
      Math.min(searchPortalActive+1,items.length-1):
      Math.max(searchPortalActive-1,0);
    items[searchPortalActive]?.classList.add('active');
    items[searchPortalActive]?.scrollIntoView({block:'nearest'});
    return;
  }
  if(e.key==='Enter'){
    const items=document.querySelectorAll('.sp-result');
    if(items[searchPortalActive]) items[searchPortalActive].click();
    return;
  }
}

// ─── Approval / Rejection ───────────────────────────────
function approveTask(taskId){
  const t=TASKS.find(x=>x.id===taskId);
  if(!t){toast('Task not found');return;}
  // Show inline billing input inside the approval card
  const billingEl=document.getElementById('approve-billing-'+taskId);
  if(billingEl){
    billingEl.style.display='block';
    document.getElementById('approve-billing-inp-'+taskId)?.focus();
  } else {
    // Direct approve without billing
    _doApproveTask(taskId,t.billingAmount||0);
  }
}

async function _doApproveTask(taskId,billingAmount){
  const updates={
    approvalStatus:'approved',
    billingStatus: billingAmount>0?'ready':'unbilled',
    billingAmount: billingAmount
  };
  await fbUpd('tasks/'+taskId,updates);
  logChange(taskId,'approved','Approved by '+currentUser.name+(billingAmount?' — Billing: ₹'+billingAmount.toLocaleString('en-IN'):''));
  // Email notification to assignees
  const t=TASKS.find(x=>x.id===taskId);
  if(t){
    const asgns=Array.isArray(t.assignees)?t.assignees:(t.assigneeId?[t.assigneeId]:[]);
    asgns.forEach(uid2=>{
      const u2=getUser(uid2);
      if(u2?.email) sendEmail(u2.email,'✅ Task Approved: '+t.title,'Your task "'+t.title+'" has been approved by '+currentUser.name+(billingAmount?'\nBilling amount: ₹'+billingAmount.toLocaleString('en-IN'):'')+'.',t.title,u2.name,'');
    });
  }
  toast('Task approved ✓');
  render();
}

function rejectTask(taskId){
  const t=TASKS.find(x=>x.id===taskId);
  if(!t){toast('Task not found');return;}
  // Show inline rejection remark input
  const rejectEl=document.getElementById('reject-remark-'+taskId);
  if(rejectEl){
    rejectEl.style.display='block';
    document.getElementById('reject-remark-inp-'+taskId)?.focus();
  } else {
    _doRejectTask(taskId,'');
  }
}

async function _doRejectTask(taskId,remark){
  const updates={approvalStatus:'rejected',rejectionRemark:remark||''};
  await fbUpd('tasks/'+taskId,updates);
  logChange(taskId,'rejected','Rejected by '+currentUser.name+(remark?' — Reason: '+remark:''));
  // Email notification
  const t=TASKS.find(x=>x.id===taskId);
  if(t){
    const asgns=Array.isArray(t.assignees)?t.assignees:(t.assigneeId?[t.assigneeId]:[]);
    asgns.forEach(uid2=>{
      const u2=getUser(uid2);
      if(u2?.email) sendEmail(u2.email,'❌ Task Rejected: '+t.title,'Your task "'+t.title+'" has been rejected by '+currentUser.name+(remark?'\n\nReason: '+remark:'')+'.',t.title,u2.name,'');
    });
  }
  toast('Task rejected');
  render();
}


async function resetApprovalIfNeeded(taskId, changeDesc){
  const t=TASKS.find(x=>x.id===taskId);
  if(!t||t.approvalStatus!=='approved') return;
  await fbUpd('tasks/'+taskId,{approvalStatus:'none',billingStatus:'unbilled'});
  logChange(taskId,'approval_reset','Approval reset due to: '+changeDesc);
  toast('ℹ Approval reset — task re-queued after changes');
}
