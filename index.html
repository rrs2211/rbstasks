async function doMergeClients(){
  const targetId=document.getElementById('mc-target')?.value;
  if(!targetId){toast('Select a target client');return;}
  const sourceIds=[...document.querySelectorAll('.mc-source-cb:checked')].map(el=>el.value).filter(id=>id!==targetId);
  if(!sourceIds.length){toast('Select at least one source client');return;}
  const target=getClient(targetId);
  if(!target){toast('Target client not found');return;}
  if(!confirm(`Merge ${sourceIds.length} client(s) into "${target.name}"?\n\nAll tasks, certificates and time entries will be moved to "${target.name}".\nSource clients will be deleted.\n\nThis cannot be undone.`)){return;}
  
  let tasksMoved=0,certsMoved=0;
  // Move all tasks from source clients to target
  for(const srcId of sourceIds){
    const srcTasks=TASKS.filter(t=>t.clientId===srcId);
    for(const t of srcTasks){
      await fbUpd('tasks/'+t.id,{clientId:targetId});
      tasksMoved++;
    }
    // Move certificates
    const srcCerts=CERTIFICATES.filter(c=>c.clientId===srcId);
    for(const c of srcCerts){
      await fbUpd('certificates/'+c.id,{clientId:targetId});
      certsMoved++;
    }
    // Move time entries
    const srcEntries=TIME_ENTRIES.filter(e=>e.clientId===srcId);
    for(const e of srcEntries){
      await fbUpd('time_entries/'+e.id,{clientId:targetId});
    }
    // Delete source client
    await fbDel('clients/'+srcId);
  }
  closeModal();
  toast(`✓ Merged: ${tasksMoved} tasks, ${certsMoved} certificates moved to "${target.name}"`);
}

function nextDscSerial(){
  if(!DSC_RECORDS.length) return 'DSC-001';
  const serials=DSC_RECORDS.map(d=>{const m=(d.serial||'').match(/DSC-(\d+)/);return m?parseInt(m[1],10):0;});
  return 'DSC-'+String(Math.max(...serials)+1).padStart(3,'0');
}

function dscStatus(d){
  // Auto-mark expired as inactive
  if(d.expiryDate&&d.expiryDate<=today()&&d.active!==false) return 'expired';
  if(!d.active) return 'inactive';
  if(d.location==='office') return 'in_office';
  if(d.location==='client') return 'with_client';
  if(d.location==='cs') return 'with_cs';
  return 'unknown';
}

function dscStatusBadge(d){
  const s=dscStatus(d);
  const map={
    in_office:  ['🏢 In Office','var(--green,#4ade80)','var(--green-bg)'],
    with_client:['👤 With Client','var(--amber)','var(--amber-bg)'],
    with_cs:    ['💼 With CS','var(--blue)','var(--blue-bg)'],
    expired:    ['⛔ Expired','var(--red)','var(--red-bg)'],
    inactive:   ['❌ Inactive','var(--text3)','var(--bg3)'],
    unknown:    ['❓ Unknown','var(--text3)','var(--bg3)'],
  };
  const [label,color,bg]=map[s]||map.unknown;
  return `<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:${bg};color:${color};font-weight:600">${label}</span>`;
}

function dscExpiryBadge(d){
  if(!d.expiryDate) return '';
  const now=new Date();now.setHours(0,0,0,0);
  const exp=new Date(d.expiryDate+'T00:00:00');
  const days=Math.floor((exp-now)/86400000);
  if(days<0)  return '<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:var(--red-bg);color:var(--red);font-weight:600">⛔ Expired '+Math.abs(days)+'d ago</span>';
  if(days===0)return '<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:var(--red-bg);color:var(--red);font-weight:600">⛔ Expires TODAY</span>';
  if(days<=7) return '<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:var(--red-bg);color:var(--red);font-weight:600">⚠ Expires in '+days+'d</span>';
  if(days<=30)return '<span style="font-size:10px;padding:2px 8px;border-radius:99px;background:var(--amber-bg);color:var(--amber);font-weight:600">Expires in '+days+'d</span>';
  return '<span style="font-size:10px;color:var(--text3)">Exp: '+fmtDate(d.expiryDate)+'</span>';
}

      +'<div class="stat-card" style="border-top:3px solid var(--green,#4ade80);cursor:pointer" onclick="dscFilter.status=dscFilter.status===\'in_office\'?\'all\':\'in_office\';render()"><div class="sc-label">In Office</div><div class="sc-val" style="color:var(--green,#4ade80)">'+inOffice+'</div></div>'

      +'<div class="stat-card" style="border-top:3px solid var(--amber);cursor:pointer" onclick="dscFilter.status=dscFilter.status===\'with_client\'?\'all\':\'with_client\';render()"><div class="sc-label">With Client</div><div class="sc-val" style="color:var(--amber)">'+withClient+'</div></div>'
      +'<div class="stat-card" style="border-top:3px solid var(--red);cursor:pointer" onclick="dscFilter.tab=2;render()"><div class="sc-label">Expiring ≤30d</div><div class="sc-val" style="color:var(--red)">'+expiringSoon+'</div></div>'
      +'<div class="stat-card"><div class="sc-label">Total Active</div><div class="sc-val">'+DSC_RECORDS.filter(d=>d.active!==false).length+'</div></div>'
      +'</div>'
      +tabBar()
      +'<div class="filter-bar" style="margin-bottom:10px">'
      +'<input class="form-input" id="dsc-search-inp" style="max-width:220px" placeholder="Search serial, company, PAN, holder…" value="'+escHtml(dscFilter.search||'')+'"'
      +' onfocus="document.body.dataset.lastSearchFocus=\'dsc-search-inp\'" oninput="dscFilter.search=this.value;render()"/>'
      +'<select class="form-select" onchange="dscFilter.status=this.value;render()">'
      +'<option value="all">All Status</option>'
      +'<option value="in_office"'+(dscFilter.status==='in_office'?' selected':'')+'>🏢 In Office</option>'
      +'<option value="with_cs"'+(dscFilter.status==='with_cs'?' selected':'')+'>💼 With CS</option>'
      +'<option value="with_client"'+(dscFilter.status==='with_client'?' selected':'')+'>👤 With Client</option>'
      +'</select>'
      +((dscFilter.search||dscFilter.status!=='all')?'<button class="btn btn-ghost btn-xs" onclick="dscFilter.search=\'\';dscFilter.status=\'all\';render()">✕ Clear</button>':'')
      +'</div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">'
      +'<thead><tr style="background:var(--bg3);border-bottom:2px solid var(--border)">'
      +'<th style="padding:7px 8px;text-align:left">Serial</th>'
      +'<th style="padding:7px 8px;text-align:left">Company</th>'
      +'<th style="padding:7px 8px;text-align:left">Holder / PAN</th>'
      +'<th style="padding:7px 8px;text-align:left">Class</th>'
      +'<th style="padding:7px 8px;text-align:left">Expiry</th>'
      +'<th style="padding:7px 8px;text-align:left">Status / Location</th>'
      +'<th style="padding:7px 8px;text-align:left">Actions</th>'
      +'</tr></thead><tbody>'
      +( records.length
        ? records.sort((a,b)=>(a.serial||'').localeCompare(b.serial||'')).map((d,i)=>{
            const st=dscStatus(d);
            const rowBg=i%2===0?'transparent':'var(--bg2)';
            return '<tr style="border-bottom:1px solid var(--border);background:'+rowBg+'">'
              +'<td style="padding:6px 8px;font-family:var(--mono);font-weight:700;color:var(--accent)">'+d.serial+'</td>'
              +'<td style="padding:6px 8px"><div style="font-weight:500">'+escHtml(d.company||'—')+'</div><div style="font-size:10px;color:var(--text3)">'+escHtml(d.currentWith||'')+'</div></td>'
              +'<td style="padding:6px 8px"><div>'+escHtml(d.holderName||'—')+'</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">'+escHtml(d.panNo||'')+'</div></td>'
              +'<td style="padding:6px 8px;font-size:10px;color:var(--text3)">'+escHtml(d.dscClass||'')+'</td>'
              +'<td style="padding:6px 8px">'+dscExpiryBadge(d)+'</td>'
              +'<td style="padding:6px 8px">'+dscStatusBadge(d)+'</td>'
              +'<td style="padding:6px 8px;white-space:nowrap">'+dscQuickBtns(d,isAdmin)+'</td>'
              +'</tr>';
          }).join('')
        : '<tr><td colspan="7" style="padding:2rem;text-align:center;color:var(--text3)">No DSC records match</td></tr>'
      )
      +'</tbody></table></div>';
  }

  // ── TAB 1: Movement Log ──────────────────────────────────────────────────
  if(tab===1){
    const movements=[...DSC_MOVEMENTS].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const q=(dscFilter.search||'').toLowerCase();
    const filtered=q?movements.filter(m=>{const d=DSC_RECORDS.find(x=>x.id===m.dscId);return(d?.serial||'').toLowerCase().includes(q)||(d?.company||'').toLowerCase().includes(q)||(m.personName||'').toLowerCase().includes(q);}):movements;
    return pageHdr()
      +tabBar()
      +'<div class="filter-bar" style="margin-bottom:10px">'
      +'<input class="form-input" id="dsc-search-inp" style="max-width:220px" placeholder="Search by serial, company, person…" value="'+escHtml(dscFilter.search||'')+'"'
      +' onfocus="document.body.dataset.lastSearchFocus=\'dsc-search-inp\'" oninput="dscFilter.search=this.value;render()"/>'
      +'</div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">'
      +'<thead><tr style="background:var(--bg3);border-bottom:2px solid var(--border)">'
      +'<th style="padding:7px 8px">Date</th><th style="padding:7px 8px">Serial</th><th style="padding:7px 8px">Company</th>'
      +'<th style="padding:7px 8px">Direction</th><th style="padding:7px 8px">Person</th>'
      +'<th style="padding:7px 8px">Contact</th><th style="padding:7px 8px">Remarks</th><th style="padding:7px 8px">By</th>'
      +'</tr></thead><tbody>'
      +( filtered.length
        ? filtered.map((m,i)=>{
            const dsc=DSC_RECORDS.find(d=>d.id===m.dscId);
            const dir=m.direction==='out'?'<span style="color:var(--amber);font-weight:600">→ Out</span>':'<span style="color:var(--green,#4ade80);font-weight:600">← In</span>';
            return '<tr style="border-bottom:1px solid var(--border);background:'+(i%2===0?'transparent':'var(--bg2)')+'"><td style="padding:6px 8px;font-size:10px;color:var(--text3)">'+(m.date?fmtDate(m.date):'—')+'</td><td style="padding:6px 8px;font-family:var(--mono);color:var(--accent)">'+(dsc?.serial||'—')+'</td><td style="padding:6px 8px;font-weight:500">'+(dsc?.company||'—')+'</td><td style="padding:6px 8px">'+dir+'</td><td style="padding:6px 8px">'+(m.personName||'—')+'</td><td style="padding:6px 8px;font-size:10px;color:var(--text3)">'+(m.contact||'—')+'</td><td style="padding:6px 8px;font-size:10px;color:var(--text3)">'+(m.remarks||'—')+'</td><td style="padding:6px 8px;font-size:10px;color:var(--text3)">'+(getUser(m.recordedBy)?.name||'')+'</td></tr>';
          }).join('')
        : '<tr><td colspan="8" style="padding:2rem;text-align:center;color:var(--text3)">No movements recorded</td></tr>'
      )
      +'</tbody></table></div>';
  }

  // ── TAB 2: Expiry Alert (active only, expiring within N days) ────────────
  if(tab===2){
    const exDays=dscExpiry||30;
    const expiring=DSC_RECORDS.filter(d=>{
      if(!d.active||d.active===false) return false; // skip inactive/expired
      if(!d.expiryDate) return false;
      const days=Math.floor((new Date(d.expiryDate+'T00:00:00')-now)/86400000);
      return days>=0&&days<=exDays; // active but expiring soon
    }).sort((a,b)=>a.expiryDate.localeCompare(b.expiryDate));
    const alreadyExpiredCount=DSC_RECORDS.filter(d=>d.expiryDate&&d.expiryDate<=todayStr).length;
    return pageHdr()
      +tabBar()
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">'
      +'<span style="font-size:13px;font-weight:600">Show DSCs expiring within:</span>'
      +'<input type="number" class="form-input" value="'+dscExpiry+'" min="1" max="365" style="width:75px" onchange="dscExpiry=parseInt(this.value)||30;render()"/>'
      +'<span style="font-size:13px">days</span>'
      +(alreadyExpiredCount?'<button class="btn btn-ghost btn-xs" onclick="dscFilter.tab=3;render()" style="color:var(--red)">'+alreadyExpiredCount+' expired — view →</button>':'')
      +'</div>'
      +( expiring.length
        ? '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden">'
          +expiring.map(d=>{
            const days=Math.floor((new Date(d.expiryDate+'T00:00:00')-now)/86400000);
            const bg=days<=7?'rgba(239,68,68,.05)':'transparent';
            return '<div style="display:grid;grid-template-columns:auto 1fr auto auto auto auto;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:'+bg+'">'
              +'<div style="font-family:var(--mono);font-weight:700;color:var(--accent)">'+d.serial+'</div>'
              +'<div><div style="font-weight:500">'+escHtml(d.company)+'</div><div style="font-size:10px;color:var(--text3)">'+escHtml(d.holderName||'')+'</div></div>'
              +dscStatusBadge(d)
              +dscExpiryBadge(d)
              +'<button class="btn btn-ghost btn-xs" onclick="openModal(\'dscDetail\',{id:\''+d.id+'\'})">View</button>'
              +(isAdmin?'<button class="btn btn-ghost btn-xs" onclick="openModal(\'dscEdit\',{id:\''+d.id+'\'})">Edit</button>':'')
              +'</div>';
          }).join('')
          +'</div>'
        : '<div style="text-align:center;padding:3rem;color:var(--text3)">✓ No active DSCs expiring within '+exDays+' days</div>'
      );
  }

  // ── TAB 3: Expired DSCs ──────────────────────────────────────────────────
  if(tab===3){
    const expired=DSC_RECORDS.filter(d=>!d.active||d.active===false||( d.expiryDate&&d.expiryDate<=todayStr))
      .sort((a,b)=>(b.expiryDate||'').localeCompare(a.expiryDate||''));
    return pageHdr()
      +tabBar()
      +'<div style="font-size:12px;color:var(--text3);margin-bottom:10px">'+expired.length+' expired / inactive DSC records</div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">'
      +'<thead><tr style="background:var(--bg3);border-bottom:2px solid var(--border)">'
      +'<th style="padding:7px 8px">Serial</th><th style="padding:7px 8px">Company</th>'
      +'<th style="padding:7px 8px">Holder</th><th style="padding:7px 8px">Expiry</th>'
      +'<th style="padding:7px 8px">Last Location</th><th style="padding:7px 8px"></th>'
      +'</tr></thead><tbody>'
      +( expired.length
        ? expired.map((d,i)=>'<tr style="border-bottom:1px solid var(--border);background:'+(i%2===0?'transparent':'var(--bg2)')+';opacity:0.7">'
            +'<td style="padding:6px 8px;font-family:var(--mono);color:var(--text3)">'+d.serial+'</td>'
            +'<td style="padding:6px 8px;font-weight:500">'+escHtml(d.company||'—')+'</td>'
            +'<td style="padding:6px 8px;color:var(--text3)">'+escHtml(d.holderName||'—')+'</td>'
            +'<td style="padding:6px 8px"><span style="color:var(--red);font-size:11px">'+fmtDate(d.expiryDate||'')+'</span></td>'
            +'<td style="padding:6px 8px;font-size:10px;color:var(--text3)">'+escHtml(d.currentWith||'—')+'</td>'
            +'<td style="padding:6px 8px;white-space:nowrap">'
            +'<button class="btn btn-ghost btn-xs" onclick="openModal(\'dscDetail\',{id:\''+d.id+'\'})">View</button>'
            +(isAdmin?'<button class="btn btn-ghost btn-xs" onclick="openModal(\'dscEdit\',{id:\''+d.id+'\'})">Renew/Edit</button>':'')
            +'</td></tr>'
          ).join('')
        : '<tr><td colspan="6" style="padding:2rem;text-align:center;color:var(--text3)">No expired DSC records</td></tr>'
      )
      +'</tbody></table></div>';
  }

  // ── TAB 4: New DSC ───────────────────────────────────────────────────────
  if(tab===4){
    if(!isAdmin) return pageHdr()+tabBar()+'<div style="text-align:center;padding:3rem;color:var(--red)">Only managers/admins can add DSC records.</div>';
    const nextSerial=nextDscSerial();
    // Unique companies from existing records for datalist
    const existingCompanies=[...new Set(DSC_RECORDS.map(d=>d.company).filter(Boolean))].sort();
    // Unique holders from existing records for datalist
    const existingHolders=[...new Set(DSC_RECORDS.map(d=>d.holderName).filter(Boolean))].sort();
    // Also include CLIENTS names
    const clientNames=CLIENTS.map(c=>c.name).filter(Boolean);
    const allCompanies=[...new Set([...existingCompanies,...clientNames])].sort();

    return pageHdr()
      +tabBar()
      +'<div style="max-width:600px;margin:0 auto">'
      +'<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden">'
      +'<div style="background:var(--bg3);padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">'
      +'<span style="font-weight:600;font-size:13px">New DSC Record</span>'
      +'<span style="font-family:var(--mono);font-weight:700;color:var(--accent);font-size:14px">'+nextSerial+'</span>'
      +'</div>'
      +'<div style="padding:16px">'
      // Company name - datalist
      +'<div class="form-row"><label class="form-label">Company Name *</label>'
      +'<input class="form-input" id="dsc-company" list="dsc-company-list" placeholder="Type or select company…" autofocus oninput="dscUpdateHolderList(this.value)"/>'
      +'<datalist id="dsc-company-list">'+allCompanies.map(n=>'<option value="'+escHtml(n)+'">').join('')+'</datalist>'
      +'</div>'
      // Holder name - datalist filtered by company
      +'<div class="form-row"><label class="form-label">Holder / Authorised Person</label>'
      +'<input class="form-input" id="dsc-holder" list="dsc-holder-list" placeholder="Select or type holder name"/>'
      +'<datalist id="dsc-holder-list">'+existingHolders.map(n=>'<option value="'+escHtml(n)+'">').join('')+'</datalist>'
      +'</div>'
      +'<div class="g2">'
      +'<div class="form-row"><label class="form-label">PAN No.</label><input class="form-input" id="dsc-pan" placeholder="AAABC1234D" maxlength="10" style="text-transform:uppercase"/></div>'
      +'<div class="form-row"><label class="form-label">DSC Class</label>'
      +'<select class="form-select" id="dsc-class"><option>Class 2</option><option>Class 3</option><option>DGFT</option><option>Organisation</option></select></div>'
      +'</div>'
      +'<div class="g2">'
      +'<div class="form-row"><label class="form-label">Entry Date *</label><input class="form-input" type="date" id="dsc-entry-date" value="'+today()+'"/></div>'
      +'<div class="form-row"><label class="form-label">Expiry Date</label><input class="form-input" type="date" id="dsc-expiry"/></div>'
      +'</div>'
      +'<div class="g2">'
      +'<div class="form-row"><label class="form-label">Given By</label><input class="form-input" id="dsc-given-by" list="dsc-person-list" placeholder="Who handed over DSC"/><datalist id="dsc-person-list">'+[...new Set(DSC_MOVEMENTS.map(m=>m.personName).filter(Boolean))].map(n=>'<option value="'+escHtml(n)+'">').join('')+'</datalist></div>'
      +'<div class="form-row"><label class="form-label">Given By Contact</label><input class="form-input" id="dsc-given-contact" placeholder="Phone number"/></div>'
      +'</div>'
      +'<div class="g2">'
      +'<div class="form-row"><label class="form-label">Current Location</label>'
      +'<select class="form-select" id="dsc-location"><option value="office">🏢 In Office</option><option value="cs">💼 With CS</option><option value="client">👤 With Client</option></select></div>'
      +'<div class="form-row"><label class="form-label">Currently With</label><input class="form-input" id="dsc-current-with" placeholder="Name / team holding DSC"/></div>'
      +'</div>'
      +'<div class="form-row"><label class="form-label">DSC Password <span style="font-size:10px;color:var(--red)">(admin-only)</span></label>'
      +'<input class="form-input" id="dsc-password" type="password" placeholder="Token password (optional)" autocomplete="new-password"/></div>'
      +'<div class="form-row"><label class="form-label">Remarks</label><input class="form-input" id="dsc-remarks" placeholder="Any notes…"/></div>'
      +'<button class="btn btn-primary w-full" style="margin-top:8px" onclick="saveDscRecord()">Save DSC Record</button>'
      +'</div></div></div>';
  }

  return pageHdr()+tabBar();
}

// Helper: update holder datalist based on selected company
function dscUpdateHolderList(company){
  const list=document.getElementById('dsc-holder-list');
  if(!list) return;
  const holders=[...new Set(DSC_RECORDS.filter(d=>(d.company||'').toLowerCase()===company.toLowerCase()).map(d=>d.holderName).filter(Boolean))];
  list.innerHTML=holders.map(n=>'<option value="'+escHtml(n)+'">').join('');
}

// Helper: quick action buttons per DSC row
function dscQuickBtns(d, isAdmin){
  const st=dscStatus(d);
  const btns=[];
  btns.push('<button class="btn btn-ghost btn-xs" onclick="openModal(\'dscDetail\',{id:\''+d.id+'\'})">View</button>');
  if(isAdmin) btns.push('<button class="btn btn-ghost btn-xs" onclick="openModal(\'dscEdit\',{id:\''+d.id+'\'})">Edit</button>');
  if(isAdmin){
    if(st==='in_office'){
      btns.push('<button class="btn btn-xs" style="background:var(--blue-bg);color:var(--blue)" onclick="dscMarkWithCS(\''+d.id+'\')">→ CS</button>');
      btns.push('<button class="btn btn-xs" style="background:var(--amber-bg);color:var(--amber)" onclick="openModal(\'dscOutward\',{dscId:\''+d.id+'\'})">→ Client</button>');
    }
    if(st==='with_cs'){
      btns.push('<button class="btn btn-xs" style="background:var(--green-bg);color:var(--green,#4ade80)" onclick="dscMarkInwardFromCS(\''+d.id+'\')">← Office</button>');
    }
    if(st==='with_client'){
      btns.push('<button class="btn btn-xs" style="background:var(--green-bg);color:var(--green,#4ade80)" onclick="openModal(\'dscInward\',{dscId:\''+d.id+'\'})">← Return</button>');
    }
  }
  return btns.join('');
}


async function saveDscRecord(){
  const company=(document.getElementById('dsc-company')?.value||'').trim();
  if(!company){toast('Company name is required');return;}
  const entryDate=document.getElementById('dsc-entry-date')?.value||today();
  const id=uid();
  const serial=nextDscSerial();
  const rec={
    id,serial,company,
    panNo:(document.getElementById('dsc-pan')?.value||'').trim().toUpperCase(),
    holderName:(document.getElementById('dsc-holder')?.value||'').trim(),
    dscClass:document.getElementById('dsc-class')?.value||'Class 3',
    entryDate,
    expiryDate:document.getElementById('dsc-expiry')?.value||'',
    givenBy:(document.getElementById('dsc-given-by')?.value||'').trim(),
    givenByContact:(document.getElementById('dsc-given-contact')?.value||'').trim(),
    location:document.getElementById('dsc-location')?.value||'office',
    currentWith:(document.getElementById('dsc-current-with')?.value||'').trim(),
    password:document.getElementById('dsc-password')?.value||'',
    remarks:(document.getElementById('dsc-remarks')?.value||'').trim(),
    active:true,createdBy:currentUser.id,createdAt:today()
  };
  await fbSet('dsc_records/'+id,rec);
  const movId=uid();
  await fbSet('dsc_movements/'+movId,{id:movId,dscId:id,date:entryDate,direction:'in',personName:rec.givenBy||'—',contact:rec.givenByContact||'',location:rec.location,recordedBy:currentUser.id,remarks:'Initial entry — '+rec.company,createdAt:today()});
  dscFilter.tab=0;
  toast('DSC '+serial+' added ✓');
  render();
}

function downloadDscTemplate(){
  // Create CSV template
  const headers=['Serial (leave blank for auto)','Company Name','PAN No.','Holder Name','DSC Class','Entry Date (YYYY-MM-DD)','Expiry Date (YYYY-MM-DD)','Location (office/cs/client)','Currently With','Given By','Given By Contact','Remarks'];
  const sample=['','ABC Pvt Ltd','AAABC1234A','Rajesh Shah','Class 3','2024-01-15','2027-01-14','office','Office','Rajesh Shah','9876543210','Sample DSC'];
  const csv=[headers.join(','),sample.join(',')].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='DSC_Import_Template.csv';
  a.click();
  toast('Template downloaded ✓');
}

async function processDscImport(){
  const file=document.getElementById('dsc-import-file')?.files?.[0];
  if(!file){toast('Select a file first');return;}
  const text=await file.text();
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2){toast('File is empty');return;}
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());
  let imported=0,skipped=0;
  const existing=new Set(DSC_RECORDS.map(d=>d.serial));
  for(let i=1;i<lines.length;i++){
    const vals=lines[i].split(',').map(v=>v.trim().replace(/^"|"$/g,''));
    const row={};headers.forEach((h2,idx)=>row[h2]=vals[idx]||'');
    const serial=row['serial (leave blank for auto)']||nextDscSerial();
    if(existing.has(serial)){skipped++;continue;}
    const company=row['company name']||'';
    if(!company){skipped++;continue;}
    const id=uid();
    await fbSet('dsc_records/'+id,{
      id,serial,company,
      panNo:(row['pan no.']||'').toUpperCase(),
      holderName:row['holder name']||'',
      dscClass:row['dsc class']||'Class 3',
      entryDate:row['entry date (yyyy-mm-dd)']||today(),
      expiryDate:row['expiry date (yyyy-mm-dd)']||'',
      location:row['location (office/cs/client)']||'office',
      currentWith:row['currently with']||'',
      givenBy:row['given by']||'',
      givenByContact:row['given by contact']||'',
      remarks:row['remarks']||'',
      password:'',active:true,createdBy:currentUser.id,createdAt:today()
    });
    existing.add(serial);
    imported++;
  }
  closeModal();
  toast(`Import complete: ${imported} added, ${skipped} skipped ✓`);
  dscFilter.tab=0;render();
}

let _dscImportData=[];
async function dscPreviewImport(input){
  const file=input.files?.[0];
  const preview=document.getElementById('dsc-import-preview');
  const importBtn=document.getElementById('dsc-import-btn');
  if(!file||!preview||!importBtn){return;}
  preview.innerHTML='<div style="color:var(--text3);font-size:12px">Reading file…</div>';
  try{
    const text=await file.text();
    const rows=text.split('\n').filter(r=>r.trim());
    const headers=rows[0].split(',').map(c=>c.replace(/^"|"$/g,'').trim().toLowerCase());
    _dscImportData=[];
    for(let i=1;i<rows.length;i++){
      const cols=rows[i].match(/(".*?"|[^,]+)(?=,|$)/g)||rows[i].split(',');
      const clean=cols.map(c=>(c||'').replace(/^"|"$/g,'').trim());
      const company=clean[headers.findIndex(h=>h.includes('company'))]||'';
      if(!company) continue;
      _dscImportData.push({
        company,
        holderName:clean[headers.findIndex(h=>h.includes('holder'))]||'',
        panNo:clean[headers.findIndex(h=>h.includes('pan'))]||'',
        dscClass:clean[headers.findIndex(h=>h.includes('class'))]||'Class 3',
        entryDate:clean[headers.findIndex(h=>h.includes('entry'))]||today(),
        expiryDate:clean[headers.findIndex(h=>h.includes('expiry'))]||'',
        givenBy:clean[headers.findIndex(h=>h.includes('given by')&&!h.includes('contact'))]||'',
        givenByContact:clean[headers.findIndex(h=>h.includes('contact'))]||'',
        location:clean[headers.findIndex(h=>h.includes('location'))]||'office',
        currentWith:clean[headers.findIndex(h=>h.includes('currently'))]||'',
        remarks:clean[headers.findIndex(h=>h.includes('remark'))]||'',
      });
    }
    if(!_dscImportData.length){preview.innerHTML='<div style="color:var(--red);font-size:12px">No valid rows found. Check file format.</div>';return;}
    preview.innerHTML='<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">Preview ('+_dscImportData.length+' records):</div>'
      +'<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;max-height:200px;overflow-y:auto">'
      +_dscImportData.map(d=>'<div style="padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px"><b>'+escHtml(d.company)+'</b> — '+escHtml(d.holderName||'—')+' <span style="color:var(--text3)">'+escHtml(d.panNo||'')+'</span></div>').join('')
      +'</div>';
    importBtn.style.display='block';
    importBtn.textContent='Import '+_dscImportData.length+' Records';
  }catch(e){preview.innerHTML='<div style="color:var(--red);font-size:12px">Error reading file: '+e.message+'</div>';}
}

async function dscDoImport(){
  if(!_dscImportData.length){toast('No data to import');return;}
  const existingSerials=new Set(DSC_RECORDS.map(d=>d.serial));
  let imported=0,skipped=0;
  for(const row of _dscImportData){
    const serial=nextDscSerial();
    if(existingSerials.has(serial)){skipped++;continue;}
    const id=uid();
    const rec={id,serial,...row,active:!(row.expiryDate&&row.expiryDate<=today()),createdBy:currentUser.id,createdAt:today()};
    await fbSet('dsc_records/'+id,rec);
    existingSerials.add(serial);
    // Add initial movement
    await fbSet('dsc_movements/'+uid(),{id:uid(),dscId:id,date:row.entryDate||today(),direction:'in',personName:row.givenBy||'Import',contact:row.givenByContact||'',location:row.location||'office',recordedBy:currentUser.id,remarks:'Imported',createdAt:today()});
    imported++;
  }
  _dscImportData=[];
  closeModal();
  toast('✓ Imported '+imported+' DSC records'+(skipped?' ('+skipped+' skipped)':''));
}

async function saveDscEdit(id){
  const company=(document.getElementById('de-company')?.value||'').trim();
  if(!company){toast('Company name required');return;}
  const expiryDate=document.getElementById('de-expiry')?.value||'';
  const active=!(expiryDate&&expiryDate<=today()); // auto-set inactive if expired
  const updates={
    company,
    holderName:(document.getElementById('de-holder')?.value||'').trim(),
    panNo:(document.getElementById('de-pan')?.value||'').trim().toUpperCase(),
    dscClass:document.getElementById('de-class')?.value||'Class 3',
    entryDate:document.getElementById('de-entry')?.value||'',
    expiryDate,
    location:document.getElementById('de-location')?.value||'office',
    currentWith:(document.getElementById('de-with')?.value||'').trim(),
    password:document.getElementById('de-password')?.value||'',
    remarks:(document.getElementById('de-remarks')?.value||'').trim(),
    active,
    updatedAt:today()
  };
  await fbUpd('dsc_records/'+id,updates);
  closeModal();
  toast('DSC updated ✓'+(active?'':' — Marked inactive (expired)'));
}

function applyTaskSort(tasks){
  var t=[...tasks];
  t.sort(function(a,b){
    var va,vb;
    if(taskSort.field==='dueDate'){va=a.dueDate||'9999';vb=b.dueDate||'9999';}
    else if(taskSort.field==='startDate'){va=a.startDate||'9999';vb=b.startDate||'9999';}
    else if(taskSort.field==='title'){va=(a.title||'').toLowerCase();vb=(b.title||'').toLowerCase();}
    else if(taskSort.field==='client'){va=(getClient(a.clientId)?.name||'').toLowerCase();vb=(getClient(b.clientId)?.name||'').toLowerCase();}
    else if(taskSort.field==='status'){va=a.status||'';vb=b.status||'';}
    else if(taskSort.field==='dept'){va=getDept(a.deptId)?.name||'';vb=getDept(b.deptId)?.name||'';}
    else if(taskSort.field==='subdept'){va=getSD(a.subDeptId)?.name||'';vb=getSD(b.subDeptId)?.name||'';}
    else if(taskSort.field==='priority'){var pm={high:0,medium:1,low:2};va=pm[a.priority]??1;vb=pm[b.priority]??1;}
    else if(taskSort.field==='time'){va=-(a.seconds||0);vb=-(b.seconds||0);}
    else if(taskSort.field==='assignee'){va=taskAssignees(a).map(function(u){return u.name}).join(',').toLowerCase();vb=taskAssignees(b).map(function(u){return u.name}).join(',').toLowerCase();}
    else{va=a.dueDate||'9999';vb=b.dueDate||'9999';}
    var cmp=typeof va==='number'?va-vb:va.localeCompare(vb);
    return taskSort.dir==='asc'?cmp:-cmp;
  });
  return t;
}

function dailyTab(){
  const role=currentUser.role;
  const selDate=reportFilter.dateFrom||today();
  let entries=TIME_ENTRIES.filter(e=>e.date===selDate);
  if(role==='employee')entries=entries.filter(e=>e.userId===currentUser.id);
  else if(role==='manager'){
    // Include ALL departments the manager belongs to
    const mgrDepts=Array.isArray(currentUser.deptIds)&&currentUser.deptIds.length
      ?currentUser.deptIds
      :(currentUser.deptId?[currentUser.deptId]:[]);
    const ms=USERS.filter(u=>{
      const uDepts=Array.isArray(u.deptIds)&&u.deptIds.length?u.deptIds:(u.deptId?[u.deptId]:[]);
      return mgrDepts.some(d=>uDepts.includes(d));
    }).map(u=>u.id);
    entries=entries.filter(e=>ms.includes(e.userId));
  }
  if(reportFilter.emp!=='all')entries=entries.filter(e=>e.userId===reportFilter.emp);
  const byUser={};entries.forEach(e=>{if(!byUser[e.userId])byUser[e.userId]=[];byUser[e.userId].push(e)});
  const maxSec=Math.max(1,...Object.values(byUser).map(es=>es.reduce((a,e)=>a+(e.seconds||0),0)));
  const staffList=USERS.filter(u=>(u.role==='employee'||u.role==='manager')&&(role==='superadmin'||u.deptId===currentUser.deptId));
  const totalS=entries.reduce((a,e)=>a+(e.seconds||0),0);

  const filterBar=`<div class="filter-bar">
    <input type="date" class="form-input" style="width:auto;padding:6px 10px;font-size:12px" value="${selDate}" onchange="reportFilter.dateFrom=this.value;reportFilter.dateTo=this.value;render()"/>
    ${role!=='employee'?`<select class="form-select" onchange="reportFilter.emp=this.value;render()"><option value="all">All Staff</option>${staffList.map(u=>`<option value="${u.id}"${reportFilter.emp===u.id?' selected':''}>${u.name}</option>`).join('')}</select>`:''}
  </div>`;

  if(!Object.keys(byUser).length){
    return filterBar+`<div style="text-align:center;padding:2rem;color:var(--text3)">No time entries for ${fmtDate(selDate)}</div><button class="btn btn-ghost btn-sm mt-8" onclick="openModal('manualTime',{})">+ Add Manual Entry</button>`;
  }

  const svgW=Math.max(300,Object.keys(byUser).length*80);
  const bars=Object.entries(byUser).map(([uid2,es],i)=>{
    const u=getUser(uid2);const sec=es.reduce((a,e)=>a+(e.seconds||0),0);
    const dept=getDept(u?.deptId);const barH=Math.max(4,Math.round(pct(sec,maxSec)*110/100));
    const x=i*80+10;const y=140-barH;const col=dept?.color||'var(--accent)';
    return`<rect x="${x}" y="${y}" width="54" height="${barH}" rx="4" fill="${col}bb"/>`+
      `<text x="${x+27}" y="155" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="DM Sans,sans-serif">${initials(u?.name||'?')}</text>`+
      `<text x="${x+27}" y="${Math.max(12,y-4)}" text-anchor="middle" font-size="9" fill="var(--text2)" font-family="DM Mono,sans-serif">${fmtSec(sec)}</text>`;
  }).join('');

  const chart=`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px;overflow-x:auto;margin-bottom:14px"><div style="font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:600">HOURS BY STAFF</div><svg viewBox="0 0 ${svgW} 160" style="width:100%;height:auto;overflow:visible">${bars}<line x1="0" y1="140" x2="${svgW}" y2="140" stroke="var(--border)" stroke-width="1"/></svg></div>`;

  const cards=Object.entries(byUser).map(([uid2,es])=>{
    const u=getUser(uid2);const sec=es.reduce((a,e)=>a+(e.seconds||0),0);const dept=getDept(u?.deptId);
    const rows=es.map(e=>{const t=TASKS.find(x=>x.id===e.taskId);return`<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-top:1px solid var(--border);color:var(--text2)"><span>${t?.title||'\u2014'}${e.note?' \u00b7 '+e.note:''}</span><span style="font-family:var(--mono);color:var(--teal)">${fmtSec(e.seconds)}</span></div>`;}).join('');
    const deptBadge=dept?`<span style="font-size:10px;color:${dept.color}">${dept.name}</span>`:'';
    return`<div class="card mb-10"><div class="flex-between mb-8"><div style="display:flex;align-items:center;gap:8px"><div class="avatar ${avClass(uid2)}" style="width:30px;height:30px;font-size:11px">${initials(u?.name)}</div><div><div style="font-size:13px;font-weight:500">${u?.name||'\u2014'}</div>${deptBadge}</div></div><div style="font-family:var(--mono);font-size:16px;font-weight:600;color:var(--accent)">${fmtSec(sec)}</div></div>${rows}</div>`;
  }).join('');

  return filterBar+`<div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:12px">${fmtDateFull(selDate)} \u2014 <span style="font-family:var(--mono);color:var(--accent)">${fmtSec(totalS)}</span> total</div>`+chart+cards+`<button class="btn btn-ghost btn-sm" onclick="openModal('manualTime',{})">+ Add Manual Entry</button>`;
}

function perfTab(){

      <button class="btn btn-ghost btn-sm" onclick="perfDrillUser=null;render()">← Back</button>

  });

    <input type="date" class="form-input" style="width:auto;padding:6px 10px;font-size:12px" value="${reportFilter.dateFrom}" onchange="reportFilter.dateFrom=this.value;render()"/>
    <span style="color:var(--text3);font-size:12px">to</span>
    <input type="date" class="form-input" style="width:auto;padding:6px 10px;font-size:12px" value="${reportFilter.dateTo}" onchange="reportFilter.dateTo=this.value;render()"/>
    <select class="form-select" onchange="reportFilter.dept=this.value;render()"><option value="all">All Depts</option>${DEPTS.filter(d=>{if(role==='superadmin')return true;const myD=Array.isArray(currentUser.deptIds)&&currentUser.deptIds.length?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);return myD.includes(d.id);}).map(d=>`<option value="${d.id}"${reportFilter.dept===d.id?' selected':''}>${d.name.split(' ')[0]}</option>`).join('')}</select>
    <button class="btn btn-ghost btn-sm" onclick="printPerfReport()">\u2b07 PDF</button>
  </div>
  ${staffList.map(u=>{
    const uTasks=myTasks().filter(t=>isAssignedTo(t,u.id)&&!t.private);
    const uEntries=TIME_ENTRIES.filter(e=>e.userId===u.id&&e.date>=reportFilter.dateFrom&&e.date<=reportFilter.dateTo);
    const hoursLogged=uEntries.reduce((a,e)=>a+(e.seconds||0),0);
    const completed=uTasks.filter(t=>isTaskTerminal(t)).length;
    const overdueCnt=uTasks.filter(t=>dueStatus(t.dueDate,t.startDate)==='overdue'&&!isTaskTerminal(t)).length;
    const certsIssued=CERTIFICATES.filter(c=>c.createdByUserId===u.id).length;
    const avgTime=completed>0?Math.floor(hoursLogged/completed):0;
    const dept=getDept(u.deptId);

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div class="avatar ${avClass(u.id)}" style="width:38px;height:38px;font-size:13px">${initials(u.name)}</div>
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${u.name}</div><div style="font-size:11px;color:var(--text3)">${dept?.name||'\u2014'}</div></div>
        <div style="text-align:right"><div style="font-family:var(--mono);font-size:17px;font-weight:700;color:var(--accent)">${fmtSec(hoursLogged)}</div><div style="font-size:10px;color:var(--text3)">Logged</div></div>
      </div>
      <div class="g4">
        <div style="text-align:center;background:var(--bg2);border-radius:var(--r);padding:8px 4px"><div style="font-size:17px;font-weight:700;color:var(--accent)">${completed}</div><div style="font-size:10px;color:var(--text3)">Completed</div></div>
        <div style="text-align:center;background:var(--bg2);border-radius:var(--r);padding:8px 4px"><div style="font-size:17px;font-weight:700;color:${overdueCnt?'var(--red)':'var(--text2)'}">${overdueCnt}</div><div style="font-size:10px;color:var(--text3)">Overdue</div></div>
        <div style="text-align:center;background:var(--bg2);border-radius:var(--r);padding:8px 4px"><div style="font-size:17px;font-weight:700;color:var(--purple)">${certsIssued}</div><div style="font-size:10px;color:var(--text3)">Certs</div></div>
        <div style="text-align:center;background:var(--bg2);border-radius:var(--r);padding:8px 4px"><div style="font-size:17px;font-weight:700;color:var(--blue)">${fmtSec(avgTime)}</div><div style="font-size:10px;color:var(--text3)">Avg/Task</div></div>
      </div>
      ${uTasks.length?`<div class="progress-bar mt-10"><div class="progress-fill" style="width:${pct(completed,uTasks.length)}%;background:${dept?.color||'var(--accent)'}"></div></div><div style="font-size:10px;color:var(--text3);margin-top:3px">${completed}/${uTasks.length} (${pct(completed,uTasks.length)}%)</div><div style="text-align:right;margin-top:4px"><button class="btn btn-ghost btn-xs" onclick="perfDrillUser='${u.id}';render()">View Tasks →</button></div>`:``}
    </div>`;}).join('')||`<div style="text-align:center;padding:2rem;color:var(--text3)">No staff found</div>`}`;
}

function printPerfReport(){
  const role=currentUser.role;
  const mgrD=Array.isArray(currentUser.deptIds)&&currentUser.deptIds.length?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);
  const staffList=USERS.filter(u=>{
    if(u.role!=='employee') return false;
    const uD=Array.isArray(u.deptIds)&&u.deptIds.length?u.deptIds:(u.deptId?[u.deptId]:[]);
    const inMgrDept=role==='superadmin'||mgrD.some(d=>uD.includes(d));
    const inFilter=reportFilter.dept==='all'||uD.includes(reportFilter.dept);
    return inMgrDept&&inFilter;
  });
  const firm=getActiveFirm()||{};
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;font-size:13px;color:#1a1a1a;padding:28px}.hdr{border-bottom:3px solid #7ED957;padding-bottom:12px;margin-bottom:20px}.firm{font-size:20px;font-weight:700}table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#f0f0f0;padding:7px 9px;text-align:left;font-size:11px;font-weight:600;color:#555;text-transform:uppercase}td{padding:7px 9px;border-bottom:1px solid #eee}.footer{margin-top:20px;border-top:1px solid #eee;padding-top:10px;font-size:11px;color:#aaa;text-align:center}</style></head><body>
  <div class="hdr"><div class="firm">${firm.name||''}</div><div style="font-size:12px;color:#555">Performance Report \u00b7 ${reportFilter.dateFrom} to ${reportFilter.dateTo}</div></div>
  <table><thead><tr><th>Name</th><th>Dept</th><th>Hours</th><th>Completed</th><th>Overdue</th><th>Certs</th><th>Avg/Task</th><th>%</th></tr></thead><tbody>
  ${staffList.map(u=>{const uT=myTasks().filter(t=>isAssignedTo(t,u.id)&&!t.private);const uE=TIME_ENTRIES.filter(e=>e.userId===u.id&&e.date>=reportFilter.dateFrom&&e.date<=reportFilter.dateTo);const hrs=uE.reduce((a,e)=>a+(e.seconds||0),0);const done=uT.filter(t=>isTaskTerminal(t)).length;const ovd=uT.filter(t=>dueStatus(t.dueDate,t.startDate)==='overdue'&&!isTaskTerminal(t)).length;const certs=CERTIFICATES.filter(c=>c.createdByUserId===u.id).length;const avg=done>0?Math.floor(hrs/done):0;return`<tr><td>${u.name}</td><td>${getDept(u.deptId)?.name||'\u2014'}</td><td>${fmtSec(hrs)}</td><td>${done}</td><td>${ovd}</td><td>${certs}</td><td>${fmtSec(avg)}</td><td>${pct(done,uT.length||1)}%</td></tr>`}).join('')}
  </tbody></table><div class="footer">${firm.name} \u00b7 ${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</div>
</body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);
}

// \u2500\u2500 Leaves \u2500\u2500
function leavesPage(){
  const role=currentUser.role;
  const isAdmin=role==='superadmin'||role==='manager';
  const tabs=isAdmin?['My Leaves','Team Leaves','Calendar']:['My Leaves'];
  return`<div class="page-header"><div class="page-title">Leave Management</div><button class="btn btn-primary btn-sm" onclick="openModal('applyLeave',{})">+ Apply</button></div>
  <div class="tabs">${tabs.map((t,i)=>`<div class="tab${curTab===i?' active':''}" data-tab="${i}">${t}</div>`).join('')}</div>
  ${curTab===0?myLeavesTab():curTab===1&&isAdmin?teamLeavesTab():leaveCalTab()}`;
}

function myLeavesTab(){
  const myLeaves=LEAVES.filter(l=>l.userId===currentUser.id).sort((a,b)=>b.date.localeCompare(a.date));
  const approved=myLeaves.filter(l=>l.status==='approved');
  const bal=ADMIN_SETTINGS?.leaveBalances||{annual:24,sick:10,halfDay:10,wfh:20};
  const usedFull=approved.filter(l=>l.leaveType==='Full Day').length;
  const usedHalf=approved.filter(l=>l.leaveType.includes('Half Day')).length;
  const usedSick=approved.filter(l=>l.leaveType==='Sick Leave').length;
  const usedWFH=approved.filter(l=>l.leaveType==='WFH').length;
  return`<div class="g4 mb-14">
    <div class="stat-card"><div class="sc-label">Annual</div><div class="sc-val" style="font-size:18px">${bal.annual-usedFull}<span style="font-size:10px;color:var(--text3)">/${bal.annual}</span></div></div>
    <div class="stat-card"><div class="sc-label">Sick</div><div class="sc-val" style="font-size:18px">${bal.sick-usedSick}<span style="font-size:10px;color:var(--text3)">/${bal.sick}</span></div></div>
    <div class="stat-card"><div class="sc-label">Half Day</div><div class="sc-val" style="font-size:18px">${bal.halfDay-usedHalf}<span style="font-size:10px;color:var(--text3)">/${bal.halfDay}</span></div></div>
    <div class="stat-card"><div class="sc-label">WFH</div><div class="sc-val" style="font-size:18px">${bal.wfh-usedWFH}<span style="font-size:10px;color:var(--text3)">/${bal.wfh}</span></div></div>
  </div>
  ${myLeaves.length?myLeaves.map(l=>leaveCard(l,false)).join(''):`<div style="text-align:center;padding:2rem;color:var(--text3)">No leave requests yet</div>`}`;
}

function teamLeavesTab(){
  const role=currentUser.role;
  const pending=LEAVES.filter(l=>l.status==='pending'&&(role==='superadmin'||getUser(l.userId)?.deptId===currentUser.deptId)).sort((a,b)=>b.appliedAt?.localeCompare(a.appliedAt||'')||0);
  let all=LEAVES.filter(l=>role==='superadmin'||getUser(l.userId)?.deptId===currentUser.deptId).sort((a,b)=>b.date.localeCompare(a.date));
  if(leaveFilter.user!=='all')all=all.filter(l=>l.userId===leaveFilter.user);
  if(leaveFilter.status!=='all')all=all.filter(l=>l.status===leaveFilter.status);
  if(leaveFilter.month)all=all.filter(l=>l.date.startsWith(leaveFilter.month));
  const months=[];for(let i=0;i<6;i++){const d=new Date();d.setMonth(d.getMonth()-i);months.push(d.toISOString().slice(0,7))}
  const staffInScope=USERS.filter(u=>role==='superadmin'||u.deptId===currentUser.deptId);
  return`${pending.length?`<div style="margin-bottom:14px"><div class="section-label" style="margin-top:0;color:var(--amber)">Pending Approval (${pending.length})</div>${pending.map(l=>leaveCard(l,true)).join('')}</div>`:''}
  <div class="filter-bar">
    <select class="form-select" onchange="leaveFilter.user=this.value;render()"><option value="all">All Staff</option>${staffInScope.map(u=>`<option value="${u.id}"${leaveFilter.user===u.id?' selected':''}>${u.name}</option>`).join('')}</select>
    <select class="form-select" onchange="leaveFilter.status=this.value;render()"><option value="all">All</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select>
    <select class="form-select" onchange="leaveFilter.month=this.value;render()"><option value="">All Months</option>${months.map(m=>`<option value="${m}"${leaveFilter.month===m?' selected':''}>${new Date(m+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'})}</option>`).join('')}</select>
  </div>
  ${all.map(l=>leaveCard(l,true)).join('')||`<div style="text-align:center;padding:2rem;color:var(--text3)">No records found</div>`}`;
}

function leaveCalTab(){
  const role=currentUser.role;
  const approved=LEAVES.filter(l=>l.status==='approved'&&(role==='superadmin'||(role==='manager'&&getUser(l.userId)?.deptId===currentUser.deptId)||l.userId===currentUser.id));
  const year=calViewDate.getFullYear(),month=calViewDate.getMonth();
  const firstDay=new Date(year,month,1).getDay(),daysInMonth=new Date(year,month+1,0).getDate();
  const lvMap={};approved.forEach(l=>{if(!lvMap[l.date])lvMap[l.date]=[];lvMap[l.date].push(l)});
  let cells='';
  for(let i=0;i<firstDay;i++)cells+=`<div></div>`;
  const todayD=today();
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const lvs=lvMap[ds]||[];const isToday=ds===todayD;
    cells+=`<div style="min-height:56px;background:var(--bg3);border:1px solid ${isToday?'var(--accent)':lvs.length?'var(--blue)':'var(--border)'};border-radius:var(--r);padding:4px;${isToday?'background:var(--accent-bg)':''}">
      <div style="font-size:10px;font-weight:600;color:var(--text2);margin-bottom:2px">${d}</div>
      ${lvs.map(l=>{const u=getUser(l.userId);return`<div style="background:var(--blue-bg);color:var(--blue);border-radius:3px;padding:1px 4px;margin-bottom:2px;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${initials(u?.name||'?')} ${l.leaveType.split(' ')[0]}</div>`}).join('')}
    </div>`;
  }
  const mn=calViewDate.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  return`<div class="flex-between mb-10"><button class="btn btn-ghost btn-sm" onclick="calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()-1,1);render()">\u2190 Prev</button><div style="font-size:13px;font-weight:600">${mn}</div><button class="btn btn-ghost btn-sm" onclick="calViewDate=new Date(calViewDate.getFullYear(),calViewDate.getMonth()+1,1);render()">Next \u2192</button></div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:9px;font-weight:600;color:var(--text3);padding:3px 0">${d}</div>`).join('')}${cells}</div>`;
}

function leaveCard(l,showActions){
  const u=getUser(l.userId),dept=getDept(u?.deptId);
  const isAdminOrMgr=currentUser.role==='superadmin'||currentUser.role==='manager';
  const canCancel=l.userId===currentUser.id&&l.status==='pending';
  return`<div class="card mb-9">
    <div class="flex-between mb-7">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="avatar ${avClass(l.userId)}" style="width:28px;height:28px;font-size:10px">${initials(u?.name)}</div>
        <div><div style="font-size:13px;font-weight:500">${u?.name||'\u2014'}</div><div style="font-size:10px;color:var(--text3)">${dept?.name||''}</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;${l.status==='approved'?'background:var(--accent-bg);color:var(--accent)':l.status==='rejected'?'background:var(--red-bg);color:var(--red)':'background:var(--amber-bg);color:var(--amber)'}">${l.status}</span>
        ${canCancel?`<button class="btn btn-danger btn-xs" onclick="cancelLeave('${l.id}')">Cancel</button>`:''}
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text2)">
      <span style="font-weight:500">${fmtDate(l.date)}</span>
      <span style="background:var(--bg3);padding:2px 7px;border-radius:99px;font-size:11px">${l.leaveType}</span>
      ${l.reason?`<span style="color:var(--text3)">${l.reason}</span>`:''}
    </div>
    ${l.managerNote?`<div style="margin-top:7px;font-size:11px;color:var(--text3);background:var(--bg3);border-radius:var(--r);padding:6px 9px">Note: ${l.managerNote}</div>`:''}
    ${showActions&&isAdminOrMgr&&l.status==='pending'?`<div style="display:flex;gap:7px;margin-top:10px">
      <button class="btn btn-primary btn-sm" onclick="approveLeave('${l.id}')">\u2713 Approve</button>
      <button class="btn btn-danger btn-sm" onclick="openModal('rejectLeave',{id:'${l.id}'})">\u2715 Reject</button>
    </div>`:''}
  </div>`;
}

function applyLeaveHTML(){
  const leaveTypes=['Full Day','Half Day AM','Half Day PM','WFH','Sick Leave'];
  return`${mHdr('Apply for Leave')}
  <div class="form-row"><label class="form-label">Date *</label><input class="form-input" type="date" id="lv-date" min="${today()}" onchange="showLeaveDateTasks(this.value)"/></div>
  <div id="lv-tasks-warn" style="display:none;margin-bottom:10px"></div>
  <div class="form-row"><label class="form-label">Leave Type *</label><select class="form-select" id="lv-type">${leaveTypes.map(t=>`<option>${t}</option>`).join('')}</select></div>
  <div class="form-row"><label class="form-label">Reason (optional)</label><input class="form-input" id="lv-reason" placeholder="Brief reason…"/></div>
  <button class="btn btn-primary w-full" onclick="submitLeave()">Submit Request</button>`;
}
async function submitLeave(){
  const date=document.getElementById('lv-date')?.value;if(!date){toast('Select a date');return}
  const leaveType=document.getElementById('lv-type')?.value;
  const reason=document.getElementById('lv-reason')?.value||'';
  if(LEAVES.some(l=>l.userId===currentUser.id&&l.date===date&&l.status!=='rejected')){toast('Leave already applied for this date');return}
  const id=uid();
  await fbSet('leaves/'+id,{id,userId:currentUser.id,date,leaveType,reason,status:'pending',appliedAt:today()});
  closeModal();toast('Leave request submitted');
}
function rejectLeaveHTML({id}){
  const l=LEAVES.find(x=>x.id===id);const u=getUser(l?.userId);
  return`${mHdr('Reject Leave')}<div style="font-size:13px;margin-bottom:12px">Rejecting leave for <strong>${u?.name}</strong> on ${fmtDate(l?.date)}</div><div class="form-row"><label class="form-label">Reason *</label><textarea class="form-textarea" id="rj-note" placeholder="Please provide a reason…"></textarea></div><button class="btn btn-danger w-full" onclick="rejectLeave('${id}')">Reject Leave</button>`;
}
async function rejectLeave(id){
  const note=document.getElementById('rj-note')?.value?.trim();
  if(!note){toast('Please provide a reason');return}
  await fbUpd('leaves/'+id,{status:'rejected',managerNote:note,rejectedBy:currentUser.id,rejectedAt:today()});
  closeModal();toast('Leave rejected');
}
async function approveLeave(id){await fbUpd('leaves/'+id,{status:'approved',approvedBy:currentUser.id,approvedAt:today()});toast('Leave approved ✓')}
async function cancelLeave(id){if(!confirm('Cancel this leave request?'))return;await fbDel('leaves/'+id);toast('Leave cancelled')}
function userLeaveOnDate(userId,date){return LEAVES.find(l=>l.userId===userId&&l.date===date&&l.status==='approved')}

function groupTasks(tasks){
  if(taskGroup==='none') return [{label:null,tasks:tasks}];
  var groups={};
  tasks.forEach(function(t){
    var key='';
    if(taskGroup==='assignee') key=taskAssignees(t).map(function(u){return u.name}).join(', ')||'Unassigned';
    else if(taskGroup==='status') key=t.status||'Unknown';
    else if(taskGroup==='dept') key=getDept(t.deptId)?.name||'No Dept';
    else if(taskGroup==='subdept') key=getSD(t.subDeptId)?.name||'No Sub-Dept';
    else if(taskGroup==='priority') key=(t.priority||'medium').charAt(0).toUpperCase()+(t.priority||'medium').slice(1)+' Priority';
    else if(taskGroup==='dueWeek'){
      if(!t.dueDate){key='No Due Date';}
      else{var d=new Date(t.dueDate+'T00:00:00'),now=new Date();now.setHours(0,0,0,0);
        var diff=Math.floor((d-now)/86400000);
        if(diff<0)key='Overdue';else if(diff<=7)key='This Week';else if(diff<=14)key='Next Week';else key='Later';
      }
    }
    if(!groups[key])groups[key]=[];
    groups[key].push(t);
  });
  var keys=Object.keys(groups);
  if(taskGroup==='dueWeek'){var ord=['Overdue','This Week','Next Week','Later','No Due Date'];keys.sort(function(a,b){return(ord.indexOf(a)===-1?99:ord.indexOf(a))-(ord.indexOf(b)===-1?99:ord.indexOf(b));});}
  else if(taskGroup==='priority'){var pord=['High Priority','Medium Priority','Low Priority'];keys.sort(function(a,b){return(pord.indexOf(a)===-1?99:pord.indexOf(a))-(pord.indexOf(b)===-1?99:pord.indexOf(b));});}
  else keys.sort();
  return keys.map(function(k){return{label:k,tasks:groups[k]};});
}


function sortTasks(tasks){
  return [...tasks].sort((a,b)=>{
    let av=a[taskSort.field]||'',bv=b[taskSort.field]||'';
    if(taskSort.field==='priority'){const o={high:0,medium:1,low:2};av=o[av]??3;bv=o[bv]??3;}
    const cmp=av<bv?-1:av>bv?1:0;
    return taskSort.dir==='asc'?cmp:-cmp;
  });
}

function kanbanHTML(tasks){
  // Build columns based on current grouping (not just status)
  let cols=[];
  if(taskGroup==='none'||taskGroup==='status'){
    const statuses=Object.values(STATUSES).flat().filter((s,i,a)=>a.indexOf(s)===i);
    cols=statuses.map(s=>({label:s,tasks:tasks.filter(t=>t.status===s)})).filter(c=>c.tasks.length||c.label==='Not Started');
  } else if(taskGroup==='assignee'){
    const seen={};
    tasks.forEach(t=>{ taskAssignees(t).forEach(u=>{if(!seen[u.id]){seen[u.id]={label:u.name,tasks:[]};} seen[u.id].tasks.push(t);}); if(!taskAssignees(t).length){if(!seen['__none__'])seen['__none__']={label:'Unassigned',tasks:[]}; seen['__none__'].tasks.push(t);}});
    cols=Object.values(seen);
  } else if(taskGroup==='dept'){
    const seen={};
    tasks.forEach(t=>{const d=getDept(t.deptId);const k=t.deptId||'__none__';if(!seen[k])seen[k]={label:d?.name||'No Dept',tasks:[]};seen[k].tasks.push(t);});
    cols=Object.values(seen);
  } else if(taskGroup==='subdept'){
    const seen={};
    tasks.forEach(t=>{const sd=getSD(t.subDeptId);const k=t.subDeptId||'__none__';if(!seen[k])seen[k]={label:sd?.name||'No Sub-Dept',tasks:[]};seen[k].tasks.push(t);});
    cols=Object.values(seen);
  } else if(taskGroup==='priority'){
    const prios=['high','medium','low'];
    cols=prios.map(p=>({label:p.charAt(0).toUpperCase()+p.slice(1),tasks:tasks.filter(t=>t.priority===p)})).filter(c=>c.tasks.length);
  } else if(taskGroup==='dueWeek'){
    const buckets={overdue:{label:'Overdue',tasks:[]},today:{label:'Due Today',tasks:[]},week:{label:'This Week',tasks:[]},later:{label:'Later',tasks:[]},none:{label:'No Due Date',tasks:[]}};
    tasks.forEach(t=>{const ds=dueStatus(t.dueDate,t.startDate);if(!t.dueDate)buckets.none.tasks.push(t);else if(ds==='overdue')buckets.overdue.tasks.push(t);else if(ds==='soon'&&t.dueDate===today())buckets.today.tasks.push(t);else if(ds==='soon')buckets.week.tasks.push(t);else buckets.later.tasks.push(t);});
    cols=Object.values(buckets).filter(c=>c.tasks.length);
  } else {
    // Fallback to status
    const statuses=Object.values(STATUSES).flat().filter((s,i,a)=>a.indexOf(s)===i);
    cols=statuses.map(s=>({label:s,tasks:tasks.filter(t=>t.status===s)})).filter(c=>c.tasks.length||c.label==='Not Started');
  }
  return`<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:12px">
    ${cols.map(({label,tasks:ct})=>`
      <div style="min-width:200px;max-width:240px;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:${statusColor(label)};flex-shrink:0"></div>
          <span style="font-size:11px;font-weight:600;color:var(--text2)">${label}</span>
          <span style="font-size:10px;color:var(--text3);margin-left:auto">${ct.length}</span>
        </div>
        <div>${ct.map(t=>taskCard(t)).join('')}</div>
      </div>`).join('')}
  </div>`;
}

async function stopTimer(){if(!activeTimer)return;const elapsed=Math.floor((Date.now()-activeTimer.startEpoch)/1000);
  // Time cap check on stop
  if(currentUser.role==='employee'&&elapsed>0){
    const now=new Date();const workStart=new Date();workStart.setHours(9,30,0,0);
    const maxSecs=Math.min(Math.max(0,(now-workStart)/1000),9*3600);
    const todaySecs=TIME_ENTRIES.filter(e=>e.userId===currentUser.id&&e.date===today()).reduce((a,e)=>a+(e.seconds||0),0);
    if((todaySecs+elapsed)>maxSecs){
      const allowed=Math.max(0,Math.floor(maxSecs-todaySecs));
      if(allowed<=0){toast('⏰ Time cap reached for today. Timer stopped but no time logged.');await fbDel('active_timers/'+currentUser.id);activeTimer=null;clearInterval(timerInterval);timerInterval=null;rerender();return;}
    }
  }
  if(elapsed>0){const task=TASKS.find(t=>t.id===activeTimer.taskId);if(task){await fbUpd('tasks/'+task.id,{seconds:(task.seconds||0)+elapsed});const eid=uid();await fbSet('time_entries/'+eid,{id:eid,taskId:task.id,userId:activeTimer.userId||currentUser.id,date:today(),seconds:elapsed,note:'Timer'})}}await fbDel('active_timers/'+currentUser.id)}

function initEmailJS(){
  if(EMAILJS_CFG?.publicKey&&typeof emailjs!=='undefined'){
    try{emailjs.init(EMAILJS_CFG.publicKey)}catch(e){}
  }
}

async function sendEmail(to,subject,body,taskTitle='',assigneeName='',dueDate=''){
  if(!EMAILJS_CFG?.enabled||!EMAILJS_CFG?.serviceId||!EMAILJS_CFG?.templateId||!EMAILJS_CFG?.publicKey){
    console.log('[EmailJS] Not configured — skipping notification');
    return false;
  }
  if(typeof emailjs==='undefined'){console.log('[EmailJS] SDK not loaded');return false}
  try{
    await emailjs.send(EMAILJS_CFG.serviceId,EMAILJS_CFG.templateId,{
      to_email:to,to_name:assigneeName,subject,message:body,task_title:taskTitle,
      due_date:dueDate,firm_name:getActiveFirm()?.name||'R B Shah & Associates'
    });
    logNotif({to,subject,sent:true,ts:Date.now()});
    return true;
  }catch(e){
    console.error('[EmailJS] Send failed:',e);
    logNotif({to,subject,sent:false,ts:Date.now(),error:e?.text||'Failed'});
    return false;
  }
}

async function sendDigestEmail(to,name,tasks){
  if(!EMAILJS_CFG?.enabled||!EMAILJS_CFG?.digestTemplateId)return false;
  const overdue=tasks.filter(t=>dueStatus(t.dueDate,t.startDate)==='overdue'&&!isTaskTerminal(t));
  const dueToday=tasks.filter(t=>t.dueDate===today()&&!isTaskTerminal(t));
  const body=`Good morning ${name},\n\nYour daily task digest:\n\n`+
    (dueToday.length?`DUE TODAY (${dueToday.length}):\n${dueToday.map(t=>`• ${t.title} — ${t.status}`).join('\n')}\n\n`:'')+
    (overdue.length?`OVERDUE (${overdue.length}):\n${overdue.map(t=>`• ${t.title} — due ${fmtDate(t.dueDate)}`).join('\n')}\n\n`:'')+
    `Total active tasks: ${tasks.filter(t=>!isTaskTerminal(t)).length}\n\nHave a productive day!`;
  if(typeof emailjs==='undefined')return false;
  try{
    await emailjs.send(EMAILJS_CFG.serviceId,EMAILJS_CFG.digestTemplateId||EMAILJS_CFG.templateId,{
      to_email:to,to_name:name,subject:`Daily Digest — ${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'})}`,
      message:body,task_title:'Daily Digest',due_date:'',firm_name:getActiveFirm()?.name||''
    });
    return true;
  }catch(e){return false}
}

function checkRecurringTasks(){
  if(!currentUser||currentUser.role==='employee')return;
  const now=new Date();
  RECURRING.filter(r=>r.active).forEach(r=>{
    const monthKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const exists=TASKS.some(t=>t.recurringId===r.id&&t.createdAt?.startsWith(monthKey));
    if(!exists&&now.getDate()>=r.dayOfMonth){
      const id=uid();
      const sts=sdStatuses(r.subDeptId,r.deptId);
      const due=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(Math.min(28,r.dayOfMonth+7)).padStart(2,'0')}`;
      fbSet('tasks/'+id,{id,title:r.title+' — '+now.toLocaleDateString('en-IN',{month:'short',year:'numeric'}),
        deptId:r.deptId,subDeptId:r.subDeptId,clientId:r.clientId,firmId:r.firmId||FIRMS[0]?.id||'',assigneeId:r.assigneeId,
        status:sts[0]||'Not Started',priority:r.priority,seconds:0,notes:r.notes||'',
        createdAt:today(),dueDate:due,billingStatus:'unbilled',billingAmount:0,approvalStatus:'none',recurringId:r.id,udins:[]});
    }
  });
}

const AVC=['av-g','av-b','av-a','av-p','av-t','av-r'];
function avClass(id){return AVC[Math.abs(hashStr(id||''))%AVC.length]}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return Math.abs(h)}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function shortName(n){return(n||'').split(' ')[0]}
function fmtSec(s){s=Math.floor(s||0);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return`${h}h ${String(m).padStart(2,'0')}m`;if(m>0)return`${m}m ${String(sec).padStart(2,'0')}s`;return`${sec}s`}
function fmtTimer(s){s=Math.floor(s||0);return`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function fmtMoney(n){return'₹'+Number(n||0).toLocaleString('en-IN')}
function fmtDate(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}
function fmtDateFull(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}
function pct(a,b){return b?Math.min(100,Math.round(a/b*100)):0}
function totalSec(arr){return arr.reduce((a,t)=>a+(t.seconds||0),0)}
function teSec(arr){return arr.reduce((a,e)=>a+(e.seconds||0),0)}
function getUser(id){return USERS.find(u=>u.id===id)}
function taskAssignees(t){const ids=Array.isArray(t.assignees)&&t.assignees.length?t.assignees:t.assignees?.[0]||t.assigneeId?[t.assignees?.[0]||t.assigneeId]:[];return ids.map(id=>getUser(id)).filter(Boolean)}
function isAssignedTo(t,uid){const ids=Array.isArray(t.assignees)?t.assignees:t.assignees?.[0]||t.assigneeId?[t.assignees?.[0]||t.assigneeId]:[];return ids.includes(uid)}
function canAccessBilling(){if(!currentUser)return false;if(currentUser.role==='superadmin')return true;return !!currentUser.billingEnabled}

function validateUDIN(udin){return /^[A-Z0-9]{18}$/.test(udin.trim().toUpperCase())||udin.trim().length>=6}

function getCert(taskIdOrTask, strictTaskLink=false){
  // Accept either a taskId string or a task object
  const t=typeof taskIdOrTask==='object'?taskIdOrTask:TASKS.find(x=>x.id===taskIdOrTask);
  if(!t) return null;
  // Primary: match by explicit taskId link (always checked)
  let cert=CERTIFICATES.find(c=>c.taskId===t.id);
  if(cert) return cert;
  if(strictTaskLink) return null; // strict mode: only direct taskId links count
  // Secondary: match by clientId + subDeptId for UDIN validation only
  if(t.clientId&&t.subDeptId){
    cert=CERTIFICATES.find(c=>c.clientId===t.clientId&&c.subDeptId===t.subDeptId&&c.udin&&validateUDIN(c.udin));
    if(cert) return cert;
  }
  // Tertiary: match by clientId alone
  if(t.clientId){
    cert=CERTIFICATES.find(c=>c.clientId===t.clientId&&c.udin&&validateUDIN(c.udin));
    if(cert) return cert;
  }
  return null;
}
// Certificate number generation — scheme: prefix/##/suffix, ## = zero-padded seq per firm
function extractSeqFromCertNo(certNo, scheme){
  // Convert scheme like 'RBS/##/2026-27' into a regex that captures the ## part
  // Escape non-# parts, replace #+  with a capture group (\d+)
  if(!scheme||!certNo) return 0;
  const escaped=scheme.replace(/[.+?^${}()|[\]\\]/g,'\\$&'); // escape regex chars
  const pattern=escaped.replace(/#+/,'(\\d+)'); // replace ## with capture group
  const rx=new RegExp('^'+pattern+'$');
  const m=certNo.match(rx);
  return m?parseInt(m[1],10):0;
}

function generateCertNo(caFirmId){
  const firm=getCAFirm(caFirmId);
  const firmCerts=CERTIFICATES.filter(c=>c.caFirmId===caFirmId&&c.certNo);

  // Check for admin override of last cert number
  const overrideKey='certSeqOverride_'+caFirmId;
  const adminOverride=ADMIN_SETTINGS&&ADMIN_SETTINGS[overrideKey]?parseInt(ADMIN_SETTINGS[overrideKey],10):0;

  let maxSeq=adminOverride; // start from override if set

  if(!firm?.scheme){
    // No scheme: use simple counter from certNo numbers
    firmCerts.forEach(c=>{
      const nums=(c.certNo||'').match(/\d+/g);
      if(nums) nums.forEach(n=>{const v=parseInt(n,10);if(v<9000&&v>maxSeq)maxSeq=v;});
    });
    return 'CERT-'+String(maxSeq+1).padStart(3,'0');
  }

  // With scheme: extract ONLY the ## portion from each certNo using the scheme pattern
  firmCerts.forEach(c=>{
    const seq=extractSeqFromCertNo(c.certNo,firm.scheme);
    if(seq>maxSeq) maxSeq=seq;
  });

  const nextSeq=maxSeq+1;
  return firm.scheme.replace(/#+/g,m=>String(nextSeq).padStart(m.length,'0'));
}

}

if(diff===0)return'soon';if(diff<=3)return'soon';return'ok'}
function dueBadge(d,startDate){

}

async function hashPIN(pin){
  const enc=new TextEncoder().encode(pin);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doEmailLogin(){
  const emailInp=document.getElementById('login-email');
  const passInp=document.getElementById('login-password');
  const rawInput=(emailInp?.value||loginEmail).trim().toLowerCase();
  const password=passInp?.value||loginPassword;

  if(!rawInput){loginError='Please enter your email';renderLogin();return;}
  if(!password){loginError='Please enter your password';renderLogin();return;}

  loginLoading=true;loginError='';renderLogin();

  // If username entered, we need to find the real email.
  // But we can't query DB before auth. So for username login:
  // Try a lightweight public fetch of the users node (only works if rules allow)
  // or show an error asking them to use email.
  let realEmail=rawInput;

  if(!rawInput.includes('@')){
    // Username entered - try to find email via a limited public query
    // We stored users with email field - try querying with the app's own auth
    // Since user isn't logged in, we use anonymous sign-in temporarily
    loginError='Please use your email address to log in (not username).';
    loginLoading=false;
    renderLogin();
    return;
  }

  // ── Try signing in directly with Firebase Auth ──────────────────────────
  try {
    const cred = await auth.signInWithEmailAndPassword(realEmail, password);

    // ── Load user record from DB now that we're authenticated ──────────────
    let matched=null;
    try {
      const snap=await db.ref('users').orderByChild('email').equalTo(realEmail).once('value');
      const val=snap.val();
      if(val) matched=Object.values(val)[0];
    } catch(_){}

    // Fallback: scan all users
    if(!matched){
      try {
        const snap=await db.ref('users').once('value');
        const all=snap.val()?Object.values(snap.val()):[];
        matched=all.find(u=>(u.email||'').toLowerCase()===realEmail);
      } catch(_){}
    }

    if(!matched){
      await auth.signOut();
      loginLoading=false;
      loginError='Authenticated but no user record found. Contact admin.';
      renderLogin();return;
    }

    if(matched.active===false){
      await auth.signOut();
      loginLoading=false;
      loginError='Your account has been deactivated. Contact your admin.';
      renderLogin();return;
    }

    // Apply pending password reset now that we have fresh auth
    if(matched.pendingPasswordReset){
      try {
        await cred.user.updatePassword(matched.pendingPasswordReset);
        await fbUpd('users/'+matched.id,{pendingPasswordReset:null});
        toast('✓ Your password has been updated by admin.');
      } catch(_){
        await fbUpd('users/'+matched.id,{pendingPasswordReset:null});
      }
    }

    // ── Complete login ──────────────────────────────────────────────────────
    currentUser={...matched,pendingPasswordReset:null};
    LS.set('currentUser',{id:currentUser.id,name:currentUser.name,role:currentUser.role,email:currentUser.email,deptId:currentUser.deptId,deptIds:currentUser.deptIds,firmId:currentUser.firmId,active:currentUser.active,billingEnabled:currentUser.billingEnabled,photoUrl:currentUser.photoUrl||null});
    loginEmail='';loginPassword='';loginError='';loginLoading=false;
    loginSelectedUser=null;

    Object.keys(loaded).forEach(k=>loaded[k]=false);
    loaded.timer=true;
    db.ref().off();
    startListeners();

    db.ref('active_timers/'+currentUser.id).on('value',s=>{
      activeTimer=s.val()||null;
      clearInterval(timerInterval);timerInterval=null;
      if(activeTimer)timerInterval=setInterval(tickTimer,1000);
      rerender();
    });

    requestDesktopNotifPermission();
    render();

  } catch(e){
    loginLoading=false;
    if(e.code==='auth/user-not-found'||e.code==='auth/invalid-credential'){
      // User exists in DB but has no Firebase Auth account yet (old PIN-based user)
      // They must use "Forgot Password" to set up their account via email
      loginError='First-time login: click "Forgot password?" below to activate your account and set a password.';
    } else if(e.code==='auth/wrong-password'){
      loginError='Incorrect password. If admin reset your password, click "Forgot password?" to set a new one.';
    } else if(e.code==='auth/invalid-email'){
      loginError='Invalid email address.';
    } else if(e.code==='auth/too-many-requests'){
      loginError='Too many attempts. Please wait a moment and try again.';
    } else if(e.code==='auth/network-request-failed'){
      loginError='Network error. Check your connection.';
    } else {
      loginError='Sign in failed: '+(e.code||e.message);
    }
    renderLogin();
  }
}

      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    ${(()=>{const unread=NOTIFICATIONS.filter(n=>n.userId===currentUser.id&&!n.read).length;return unread?`<span style="position:absolute;top:2px;right:2px;background:var(--red);color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:1px 4px;min-width:16px;text-align:center">${unread>9?"9+":unread}</span>`:'';})()}
  </div>
  ${activeTimer?`<div class="running-chip" onclick="openModal('taskDetail',{id:'${activeTimer.taskId}'})"><div class="running-dot"></div><span id="chip-t">${fmtTimer(runSec)}</span></div>`:''}
    ${pendingApprovals?`<div style="background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,166,35,.25);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer" onclick="navigate('tasks',2)">⏳ ${pendingApprovals}</div>`:''}

  </div>`;
}
function doSearch(q){const lq=q.toLowerCase().trim();if(lq.length<2)return[];return myTasks().filter(function(t){return t.title.toLowerCase().includes(lq)||((getClient(t.clientId)?.name||'').toLowerCase().includes(lq))||t.status.toLowerCase().includes(lq)||((getSD(t.subDeptId)?.name||'').toLowerCase().includes(lq))||((getDept(t.deptId)?.name||'').toLowerCase().includes(lq))||((t.notes||'').toLowerCase().includes(lq))||(t.priority||'').toLowerCase().includes(lq)||taskAssignees(t).some(function(u){return u.name.toLowerCase().includes(lq)});}).slice(0,12).map(function(t){return Object.assign({},t,{client:getClient(t.clientId)?.name||'',dc:getDept(t.deptId)?.color||'#5a6080'})})}
function hl(text,q){if(!q)return text;const i=text.toLowerCase().indexOf(q.toLowerCase());if(i<0)return text;return text.slice(0,i)+`<span style="color:var(--accent);font-weight:600">`+text.slice(i,i+q.length)+`</span>`+text.slice(i+q.length)}
