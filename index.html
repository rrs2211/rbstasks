// ── DAILY SUMMARY PAGE ──
// ══════════════════════════════════════════
//  SUMMARY PAGE  (filters + 3 tabs + PDF)
// ══════════════════════════════════════════
// State for summary filters
let summaryFilter={users:[],depts:[],subdepts:[],dueDateFrom:'',dueDateTo:''};

function summaryPage(){
  const role=currentUser.role;
  const td=today();
  const week=new Date();week.setDate(week.getDate()+7);
  const weekStr=week.toISOString().slice(0,10);
  const firm=getActiveFirm()||{};

  // ── Determine visible scope based on role ──
  const allRoleUsers=role==='employee'?[currentUser]:
    role==='manager'?USERS.filter(function(u){
      const depts=Array.isArray(currentUser.deptIds)?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);
      return depts.includes(u.deptId)||u.id===currentUser.id;
    }):USERS;

  // ── Apply filters ──
  let scopeUsers=allRoleUsers.slice();
  if(summaryFilter.users&&summaryFilter.users.length)
    scopeUsers=scopeUsers.filter(function(u){return summaryFilter.users.includes(u.id);});
  if(summaryFilter.depts&&summaryFilter.depts.length)
    scopeUsers=scopeUsers.filter(function(u){return summaryFilter.depts.includes(u.deptId);});

  const allT=myTasks().filter(function(t){return !t.private;});

  function taskMatchesFilter(t){
    if(summaryFilter.subdepts&&summaryFilter.subdepts.length&&!summaryFilter.subdepts.includes(t.subDeptId))return false;
    if(summaryFilter.dueDateFrom&&t.dueDate&&t.dueDate<summaryFilter.dueDateFrom)return false;
    if(summaryFilter.dueDateTo&&t.dueDate&&t.dueDate>summaryFilter.dueDateTo)return false;
    return true;
  }

  function buildSummary(u){
    const uTasks=allT.filter(function(t){return isAssignedTo(t,u.id)&&taskMatchesFilter(t);});
    const overdueTasks=uTasks.filter(function(t){return dueStatus(t.dueDate,t.startDate)==='overdue'&&!isTaskTerminal(t);});
    const todayTasks=uTasks.filter(function(t){return t.dueDate===td&&!isTaskTerminal(t);});
    const upcoming=uTasks.filter(function(t){return t.dueDate>td&&t.dueDate<=weekStr&&!isTaskTerminal(t);});
    return{u,overdueTasks,todayTasks,upcoming};
  }

  // ── Handle PDF export triggers ──
  if(window._summaryPDF){
    const type=window._summaryPDF;
    window._summaryPDF=null;
    exportSectionPDF(type,scopeUsers,buildSummary,firm);
    return summaryPage();
  }
  if(window._summaryAllPDF){
    window._summaryAllPDF=false;
    exportAllSummaryPDF(scopeUsers,buildSummary,firm);
    return summaryPage();
  }

  // ── Aggregate all tasks across filtered users ──
  const allOverdue=[],allToday=[],allUpcoming=[];
  scopeUsers.forEach(function(u){
    const s=buildSummary(u);
    s.overdueTasks.forEach(function(t){if(!allOverdue.find(function(x){return x.id===t.id;}))allOverdue.push(t);});
    s.todayTasks.forEach(function(t){if(!allToday.find(function(x){return x.id===t.id;}))allToday.push(t);});
    s.upcoming.forEach(function(t){if(!allUpcoming.find(function(x){return x.id===t.id;}))allUpcoming.push(t);});
  });

  // ── Tab content ──
  function taskTableRows(tasks){
    if(!tasks.length)return '<tr><td colspan="7" style="text-align:center;padding:14px;color:var(--text3);font-size:12px">No tasks</td></tr>';
    return tasks.map(function(t,i){
      const assigneeNames=taskAssignees(t).map(function(u){return u.name.split(' ')[0];}).join(', ')||'—';
      const dept=getDept(t.deptId);
      const sd=getSD(t.subDeptId);
      const client=getClient(t.clientId);
      const priorityCol=priorityColor(t.priority);
      return '<tr onclick="openModal(\'taskDetail\',{id:\''+t.id+'\'})" style="cursor:pointer">'
        +'<td style="color:var(--text3);text-align:center">'+(i+1)+'</td>'
        +'<td style="font-weight:500;padding:6px 8px;line-height:1.4">'+t.title+'</td>'
        +'<td style="font-size:11px;color:var(--text2)">'+assigneeNames+'</td>'
        +'<td>'+( client?'<span style="font-size:11px">'+client.name+'</span>':'—')+'</td>'
        +'<td>'+(dept?'<span style="color:'+dept.color+';font-size:11px;font-weight:600">'+dept.name.split(' ')[0]+'</span>':'—')+'</td>'
        +'<td style="font-size:11px;color:var(--text3)">'+(sd?sd.name:'—')+'</td>'
        +'<td><span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:99px;background:'+priorityBg(t.priority)+';color:'+priorityCol+'">'+t.priority+'</span></td>'
        +'<td style="font-size:11px;font-family:var(--mono)">'+(t.dueDate?fmtDate(t.dueDate):'—')+'</td>'
        +'<td><span style="font-size:10px;background:'+statusColor(t.status)+'22;color:'+statusColor(t.status)+';padding:2px 6px;border-radius:99px">'+t.status+'</span></td>'
        +'</tr>';
    }).join('');
  }

  function sectionTable(tasks,color,label,pdfKey){
    return '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:0">'
      +'<div style="padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:'+color+'"></div>'
      +'<span style="font-size:13px;font-weight:600">'+label+'</span>'
      +'<span style="font-size:11px;color:var(--text3);background:var(--bg4);padding:2px 8px;border-radius:99px">'+tasks.length+' tasks</span>'
      +'</div>'
      +'<div style="display:flex;gap:6px">'
      +'<button class="btn btn-ghost btn-sm" onclick="window._summaryPDF=\''+pdfKey+'\';render()">⬇ PDF</button>'
      +'</div></div>'
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">'
      +'<thead><tr style="background:var(--bg3);font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">'
      +'<th style="padding:7px 10px;text-align:center;width:40px">#</th>'
      +'<th style="padding:7px 10px;text-align:left;min-width:160px">Task</th>'
      +'<th style="padding:7px 10px;text-align:left">Assignees</th>'
      +'<th style="padding:7px 10px;text-align:left">Client</th>'
      +'<th style="padding:7px 10px;text-align:left">Dept</th>'
      +'<th style="padding:7px 10px;text-align:left">Sub-Dept</th>'
      +'<th style="padding:7px 10px;text-align:left">Priority</th>'
      +'<th style="padding:7px 10px;text-align:left">Due</th>'
      +'<th style="padding:7px 10px;text-align:left">Status</th>'
      +'</tr></thead>'
      +'<tbody>'+taskTableRows(tasks)+'</tbody></table></div></div>';
  }

  // ── Filter bar ──
  const visibleDepts=role==='superadmin'?DEPTS:DEPTS.filter(function(d){
    const myDepts=Array.isArray(currentUser.deptIds)?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);
    return myDepts.includes(d.id);
  });
  const visibleSubdepts=summaryFilter.depts&&summaryFilter.depts.length
    ?SUBDEPTS.filter(function(s){return summaryFilter.depts.includes(s.deptId);})
    :SUBDEPTS;

  const filterBar='<div class="filter-bar" style="flex-wrap:wrap;gap:8px;background:var(--bg3);padding:12px 14px;border-radius:var(--r2);margin-bottom:14px;border:1px solid var(--border);justify-content:flex-start">'
    +'<span style="font-size:11px;font-weight:600;color:var(--text3);align-self:center;white-space:nowrap">FILTERS</span>'
    // Dept multi-select
    +(role!=='employee'?'<div class="ms-filter" id="sf-dept"><div class="ms-trigger" onclick="toggleMsFilter(\'sf-dept\')">'
      +(summaryFilter.depts&&summaryFilter.depts.length?summaryFilter.depts.map(function(id){return DEPTS.find(function(d){return d.id===id;})?.name.split(' ')[0];}).join(', '):'All Depts')
      +' ▾</div><div class="ms-dropdown">'
      +visibleDepts.map(function(d){return '<label class="ms-opt"><input type="checkbox" onclick="toggleSummaryFilter(\'depts\',\''+d.id+'\',this.checked)"'+(summaryFilter.depts&&summaryFilter.depts.includes(d.id)?' checked':'')+'><span style="color:'+d.color+'">'+d.name+'</span></label>';}).join('')
      +'</div></div>':'')
    // Sub-dept multi-select
    +(role!=='employee'?'<div class="ms-filter" id="sf-sd"><div class="ms-trigger" onclick="toggleMsFilter(\'sf-sd\')">'
      +(summaryFilter.subdepts&&summaryFilter.subdepts.length?summaryFilter.subdepts.length+' Sub-Depts':'All Sub-Depts')
      +' ▾</div><div class="ms-dropdown">'
      +visibleSubdepts.map(function(s){return '<label class="ms-opt"><input type="checkbox" onclick="toggleSummaryFilter(\'subdepts\',\''+s.id+'\',this.checked)"'+(summaryFilter.subdepts&&summaryFilter.subdepts.includes(s.id)?' checked':'')+'><span>'+s.name+'</span></label>';}).join('')
      +'</div></div>':'')
    // Person multi-select (manager/admin only)
    +(role!=='employee'?'<div class="ms-filter" id="sf-user"><div class="ms-trigger" onclick="toggleMsFilter(\'sf-user\')">'
      +(summaryFilter.users&&summaryFilter.users.length?summaryFilter.users.length+' People':'All People')
      +' ▾</div><div class="ms-dropdown">'
      +allRoleUsers.map(function(u){return '<label class="ms-opt"><input type="checkbox" onclick="toggleSummaryFilter(\'users\',\''+u.id+'\',this.checked)"'+(summaryFilter.users&&summaryFilter.users.includes(u.id)?' checked':'')+'><div class="av-sm '+avClass(u.id)+'" style="flex-shrink:0">'+initials(u.name)+'</div><span>'+u.name+'</span></label>';}).join('')
      +'</div></div>':'')
    // Due date range
    +'<div style="display:flex;align-items:center;gap:5px">'
    +'<span style="font-size:11px;color:var(--text3)">Due:</span>'
    +'<input type="date" class="form-input" style="padding:4px 8px;font-size:11px;width:130px" value="'+summaryFilter.dueDateFrom+'" onchange="summaryFilter.dueDateFrom=this.value;render()" title="Due date from"/>'
    +'<span style="font-size:11px;color:var(--text3)">—</span>'
    +'<input type="date" class="form-input" style="padding:4px 8px;font-size:11px;width:130px" value="'+summaryFilter.dueDateTo+'" onchange="summaryFilter.dueDateTo=this.value;render()" title="Due date to"/>'
    +'</div>'
    // Clear + Print All
    +(summaryFilter.users.length||summaryFilter.depts.length||summaryFilter.subdepts.length||summaryFilter.dueDateFrom||summaryFilter.dueDateTo
      ?'<button class="btn btn-danger btn-sm" onclick="summaryFilter={users:[],depts:[],subdepts:[],dueDateFrom:\'\',dueDateTo:\'\'};render()">✕ Clear</button>':'')
    +'<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="window._summaryAllPDF=true;render()">⬇ Print All</button>'
    +'</div>';

  // ── Tabs ──
  const tabLabels=['⚠ Overdue ('+allOverdue.length+')','📅 Due Today ('+allToday.length+')','📆 Next 7 Days ('+allUpcoming.length+')'];
  const tabColors=['var(--red)','var(--amber)','var(--blue)'];
  const tabKeys=['overdue','today','upcoming'];
  const tabData=[allOverdue,allToday,allUpcoming];
  const tabs='<div class="tabs">'+tabLabels.map(function(l,i){
    return '<div class="tab'+(curTab===i?' active':'')+'" data-tab="'+i+'" style="color:'+(curTab===i?tabColors[i]:'')+'">'+l+'</div>';
  }).join('')+'</div>';

  return '<div class="page-header"><div><div class="page-title">Summary</div><div style="font-size:12px;color:var(--text3)">'+fmtDateFull(td)+'</div></div>'
    +'<button class="btn btn-primary btn-sm" onclick="sendAllDigests()" title="Send daily digest email to all staff">📧 Send Digest</button></div>'
    +filterBar
    +tabs
    +sectionTable(tabData[curTab],tabColors[curTab],tabLabels[curTab],tabKeys[curTab]);
}

function toggleSummaryFilter(field,val,checked){
  if(!summaryFilter[field])summaryFilter[field]=[];
  var idx=summaryFilter[field].indexOf(val);
  if(checked&&idx<0)summaryFilter[field].push(val);
  else if(!checked&&idx>=0)summaryFilter[field].splice(idx,1);
  // If depts changed, reset subdept filter
  if(field==='depts')summaryFilter.subdepts=[];
}

function buildPrintTableHTML(tasks,title,firm){
  var td=today();
  var rows=tasks.map(function(t,i){
    var assigneeNames=taskAssignees(t).map(function(u){return u.name;}).join(', ')||'—';
    var dept=getDept(t.deptId);
    var sd=getSD(t.subDeptId);
    var client=getClient(t.clientId);

function getUpcomingComplianceDates(days){
  var result=[];
  var now=new Date();
  for(var offset=0;offset<=days;offset++){
    var d=new Date(now);d.setDate(d.getDate()+offset);
    var month=d.getMonth()+1;var dayOfMonth=d.getDate();
    GST_DATES.forEach(function(cd){
      var match=false;
      if(cd.month&&cd.day){match=(month===cd.month&&dayOfMonth===cd.day);}
      else if(cd.day&&!cd.month){match=(dayOfMonth===cd.day);}
      if(match){result.push({date:d.toISOString().slice(0,10),label:cd.label,note:cd.note,daysAway:offset,key:cd.key});}
    });
  }
  return result.slice(0,10);
}

function checkReminders(){
  if(!currentUser)return;
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const timeStr=now.toTimeString().slice(0,5); // HH:MM
  REMINDERS.forEach(function(r){
    if(r.done||r.userId!==currentUser.id)return;
    if(r.date===todayStr&&r.remindTime){
      // Within 1 minute of reminder time
      const diff=Math.abs(r.remindTime.localeCompare(timeStr));
      if(diff===0||r.remindTime===timeStr){
        if(!r._alerted){
          r._alerted=true;
          pushNotif(currentUser.id,'reminder','⏰ Reminder: '+r.title,r.notes||r.date,'');
          toast('⏰ '+r.title);
        }
      }
    }
  });
}

function handleClientImport(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // Parse columns: Name (required), GSTIN, Phone, Email
      let colMap={name:-1,gstin:-1,phone:-1,email:-1};
      if(rows[0]){
        const hdr=rows[0].map(function(v){return String(v).toLowerCase().trim();});
        hdr.forEach(function(v,i){
          if(v.includes('name')||v.includes('client'))colMap.name=i;
          else if(v.includes('gstin')||v.includes('gst'))colMap.gstin=i;
          else if(v.includes('phone')||v.includes('mobile')||v.includes('whatsapp'))colMap.phone=i;
          else if(v.includes('email')||v.includes('mail'))colMap.email=i;
        });
        if(colMap.name<0)colMap.name=0; // default first column
      }
      const startRow=colMap.name>=0&&rows[0]&&String(rows[0][colMap.name]).toLowerCase().includes('name')?1:0;
      const parsed=rows.slice(startRow).map(function(r){
        const name=String(r[colMap.name]||'').trim();
        if(!name)return null;
        return{
          name,
          gstin:colMap.gstin>=0?String(r[colMap.gstin]||'').trim().toUpperCase():'',
          phones:colMap.phone>=0&&r[colMap.phone]?[String(r[colMap.phone]).replace(/[^0-9+]/g,'').trim()]:[],
          emails:colMap.email>=0&&r[colMap.email]?[String(r[colMap.email]).trim()]:[]
        };
      }).filter(Boolean);
      const existing=new Set(CLIENTS.map(function(c){return c.name.toLowerCase();}));
      const newClients=parsed.filter(function(c){return!existing.has(c.name.toLowerCase());});
      const dupCount=parsed.length-newClients.length;
      const preview=document.getElementById('client-import-preview');
      if(preview){
        preview.innerHTML='<div style="margin-top:12px">'
          +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
          +'<div style="font-size:12px;font-weight:600">'+parsed.length+' clients found'
          +(dupCount?' <span style="color:var(--amber);font-size:11px">· '+dupCount+' already exist (will skip)</span>':'')
          +'</div>'
          +(newClients.length?'<button class="btn btn-primary btn-sm" id="confirm-import-clients-btn">Import '+newClients.length+' Clients</button>':'')
          +'</div>'
          +'<div style="overflow-x:auto;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)">'
          +'<table style="width:100%;border-collapse:collapse;font-size:11px">'
          +'<thead><tr style="background:var(--bg3)"><th style="padding:5px 9px;text-align:left">Name</th><th>GSTIN</th><th>Phone</th><th>Email</th></tr></thead><tbody>'
          +newClients.slice(0,20).map(function(c){return'<tr style="border-bottom:1px solid var(--border)"><td style="padding:5px 9px;font-weight:500">'+c.name+'</td><td style="padding:5px 9px;color:var(--text3);font-size:10px">'+c.gstin+'</td><td style="padding:5px 9px;color:var(--text3);font-size:10px">'+( c.phones[0]||'')+'</td><td style="padding:5px 9px;color:var(--text3);font-size:10px">'+( c.emails[0]||'')+'</td></tr>';}).join('')
          +(newClients.length>20?'<tr><td colspan="4" style="padding:5px 9px;color:var(--text3)">...and '+(newClients.length-20)+' more</td></tr>':'')
          +'</tbody></table></div></div>';
        // Wire confirm button
        setTimeout(function(){
          var btn=document.getElementById('confirm-import-clients-btn');
          if(btn)btn.onclick=function(){confirmClientImportRich(newClients);};
        },50);
      }
    }catch(err){
      const preview=document.getElementById('client-import-preview');
      if(preview)preview.innerHTML='<div style="color:var(--red);padding:10px">Error: '+err.message+'</div>';
    }
  };
  reader.readAsArrayBuffer(file);
  // Wire dropzone
  const zone=document.getElementById('client-import-zone');
  const inp=document.getElementById('client-import-input');
  if(zone&&inp){zone.onclick=function(){inp.click();};zone.ondragover=function(e){e.preventDefault();};zone.ondrop=function(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)handleClientImport(f);};}
}

function toggleWAProvider(v){var g=document.getElementById('wa-green-fields');var c=document.getElementById('wa-cb-fields');if(g)g.style.display=v==='greenapi'?'block':'none';if(c)c.style.display=v==='callmebot'?'block':'none';}

function sendWhatsApp(phone, message){
  if(!phone||!message)return;
  const cfg=WHATSAPP_CFG||{};
  if(!cfg.enabled)return;
  // Normalize phone: strip + and spaces, ensure starts with country code
  const cleanPhone=phone.replace(/[^0-9]/g,'');

  if(!cfg.provider||cfg.provider==='greenapi'){
    // Green-API: sends from YOUR registered WhatsApp number
    if(!cfg.instanceId||!cfg.instanceToken){console.warn('Green-API not configured');return;}
    const url='https://api.green-api.com/waInstance'+cfg.instanceId+'/sendMessage/'+cfg.instanceToken;
    fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chatId:cleanPhone+'@c.us',message:message})
    }).catch(function(e){console.warn('WhatsApp send error:',e);});
  } else if(cfg.provider==='callmebot'){
    const url='https://api.callmebot.com/whatsapp.php?phone='+encodeURIComponent(cleanPhone)+'&text='+encodeURIComponent(message)+'&apikey='+(cfg.apiKey||'');
    fetch(url,{mode:'no-cors'}).catch(()=>{});
  } else if(cfg.provider==='custom'&&cfg.apiUrl){
    fetch(cfg.apiUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:cleanPhone,message,apiKey:cfg.apiKey||''})}).catch(()=>{});
  }
}

function sendWhatsAppToTask(taskId, message){
  const t=TASKS.find(function(x){return x.id===taskId;});
  if(!t)return;
  const assignees=taskAssignees(t);
  assignees.forEach(function(u){
    const phone=u.whatsapp||u.mobile||'';
    if(phone)sendWhatsApp(phone, message);
  });
}

function sendTaskWhatsApp(){
  const msg=document.getElementById('wa-msg')?.value?.trim();
  if(!msg){toast('Enter a message');return;}
  const cbs=[...document.querySelectorAll('.wa-to-cb:checked')];
  let sent=0;
  cbs.forEach(function(cb){
    const parts=cb.value.split('_');
    const phone=parts[0];
    if(phone){sendWhatsApp(phone,msg);sent++;}
    else toast(parts.slice(1).join('_')+': No mobile number set');
  });
  if(sent)toast('Sent to '+sent+' contacts');
  closeModal();
}

// ── Digest email (daily)
async function sendDailyDigest(userId){
  const u=getUser(userId);
  if(!u||!u.email)return;
  const td=today();
  const week=new Date();week.setDate(week.getDate()+7);const weekStr=week.toISOString().slice(0,10);
  const uTasks=TASKS.filter(t=>isAssignedTo(t,u.id)&&!t.private&&!isTaskTerminal(t));
  const overdue=uTasks.filter(t=>dueStatus(t.dueDate,t.startDate)==='overdue');
  const dueToday=uTasks.filter(t=>t.dueDate===td);
  const upcoming=uTasks.filter(t=>t.dueDate>td&&t.dueDate<=weekStr);
  if(!overdue.length&&!dueToday.length&&!upcoming.length)return;
  const body=[
    overdue.length?`OVERDUE (${overdue.length}):\n`+overdue.map(t=>`• ${t.title} — was due ${fmtDate(t.dueDate)}`).join('\n'):'',
    dueToday.length?`DUE TODAY (${dueToday.length}):\n`+dueToday.map(t=>`• ${t.title}`).join('\n'):'',
    upcoming.length?`DUE THIS WEEK (${upcoming.length}):\n`+upcoming.map(t=>`• ${t.title} — ${fmtDate(t.dueDate)}`).join('\n'):'',
  ].filter(Boolean).join('\n\n');
  await sendEmail(u.email,`Daily Task Digest — ${fmtDate(td)}`,body,`${overdue.length} overdue, ${dueToday.length} due today`,u.name,td);
}

async function sendAllDigests(){
  const role=currentUser.role;
  let targets=[];
  if(role==='superadmin')targets=USERS.filter(u=>u.email);
  else if(role==='manager'){
    const myDepts=Array.isArray(currentUser.deptIds)?currentUser.deptIds:(currentUser.deptId?[currentUser.deptId]:[]);
    targets=USERS.filter(u=>u.email&&myDepts.includes(u.deptId));
  } else {
    targets=[currentUser];
  }
  let sent=0;
  for(const u of targets){await sendDailyDigest(u.id);sent++;}
  toast(`✓ Digest sent to ${sent} staff`);
}

async function doChangePin(){
  const cur=String(document.getElementById('pin-current')?.value||'');
  const nw=String(document.getElementById('pin-new')?.value||'');
  const cf=String(document.getElementById('pin-confirm')?.value||'');
  if(!cur||!nw||!cf){toast('All fields required');return}
  if(!/^\d{4}$/.test(nw)){toast('New PIN must be exactly 4 digits');return}
  if(nw!==cf){toast('New PINs do not match');return}
  const curHash=await hashPIN(cur);
  const storedHash=currentUser?.pinHash||SEED_PIN_HASH;
  if(curHash!==storedHash){toast('Current PIN incorrect');return}
  const newHash=await hashPIN(nw);
  await fbUpd('users/'+currentUser.id,{pinHash:newHash});
  currentUser={...currentUser,pinHash:newHash};LS.set('currentUser',{id:currentUser.id,name:currentUser.name,role:currentUser.role,email:currentUser.email,deptId:currentUser.deptId,deptIds:currentUser.deptIds,firmId:currentUser.firmId,active:currentUser.active,billingEnabled:currentUser.billingEnabled,photoUrl:currentUser.photoUrl||null}); // stripped of sensitive fields
  // Update Firebase Auth password
  try {
    const fbUser=auth.currentUser;
    if(fbUser) await fbUser.updatePassword(newHash);
  } catch(e){
    // Non-critical - PIN in DB is updated, auth password will sync on next login
    /* auth warn removed */
  }
  closeModal();toast('PIN updated ✓');
}

function handleImportFile(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array',cellDates:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      parseImportRows(rows);
    }catch(err){
      document.getElementById('import-preview').innerHTML='<div style="color:var(--red);padding:10px;font-size:12px">Could not read file: '+err.message+'</div>';
    }
  };
  reader.readAsArrayBuffer(file);
}

// Case-insensitive column name match
function colVal(row,names){
  var keys=Object.keys(row);
  for(var i=0;i<names.length;i++){
    var match=keys.find(function(k){return k.trim().toLowerCase()===names[i].toLowerCase();});
    if(match!==undefined&&row[match]!==undefined&&row[match]!=='')return String(row[match]).trim();
  }
  return '';
}

function parseImportRows(rawRows){
  _importRows=[];_importErrors=[];
  rawRows.forEach(function(row,idx){
    var title=colVal(row,['Title','Task Name','Task','Name']);
    var clientName=colVal(row,['Client','Client Name']);
    var deptName=colVal(row,['Department','Dept']);
    var sdName=colVal(row,['Sub-Department','Sub Department','SubDept','Sub-Dept','Sub Dept']);
    var assigneeStr=colVal(row,['Assignees','Assignee','Assigned To']);
    var priority=(colVal(row,['Priority'])||'medium').toLowerCase();
    var dueDate=colVal(row,['Due Date','DueDate','Due']);
    var startDate=colVal(row,['Start Date','StartDate','Start']);
    var status=colVal(row,['Status'])||'Not Started';
    var notes=colVal(row,['Notes','Note','Description']);

    var errors=[];
    if(!title)errors.push('Title is required');

    // Resolve dept
    var dept=deptName?DEPTS.find(function(d){return d.name.toLowerCase().includes(deptName.toLowerCase());}):DEPTS[0];
    if(deptName&&!dept)errors.push('Dept "'+deptName+'" not found');

    // Resolve sub-dept
    var sd=null;
    if(sdName&&dept){
      sd=SUBDEPTS.find(function(s){return s.deptId===dept.id&&s.name.toLowerCase().includes(sdName.toLowerCase());});
      if(!sd)errors.push('Sub-dept "'+sdName+'" not found in '+dept.name);
    }
    if(!sd&&dept)sd=SUBDEPTS.find(function(s){return s.deptId===dept.id;});

    // Resolve client
    var client=clientName?CLIENTS.find(function(c){return c.name.toLowerCase().includes(clientName.toLowerCase());}):null;
    if(clientName&&!client)errors.push('Client "'+clientName+'" not found (will skip client)');

    // Resolve assignees
    var assigneeIds=[];
    if(assigneeStr){
      var names=assigneeStr.split(/[,;]+/).map(function(n){return n.trim();}).filter(Boolean);
      names.forEach(function(name){
        var u=USERS.find(function(u2){return u2.name.toLowerCase().includes(name.toLowerCase());});
        if(u)assigneeIds.push(u.id);
        else errors.push('User "'+name+'" not found');
      });
    }
    if(!assigneeIds.length)assigneeIds=[currentUser.id];

    // Validate priority
    if(!['high','medium','low'].includes(priority)){errors.push('Priority must be high/medium/low, got "'+priority+'"');priority='medium';}

    // Validate date format
    function toDateStr(val){
      if(!val)return '';
      if(typeof val==='object'&&val instanceof Date){return val.toISOString().slice(0,10);}
      var s=String(val).trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
      var d=new Date(s);
      if(!isNaN(d.getTime()))return d.toISOString().slice(0,10);
      errors.push('Invalid date "'+s+'"');return '';
    }
    var dueDateStr=toDateStr(dueDate);
    var startDateStr=toDateStr(startDate);

    _importErrors.push(errors);
    _importRows.push({
      _idx:idx,_errors:errors,
      title,clientId:client?client.id:'',deptId:dept?dept.id:'',subDeptId:sd?sd.id:'',
      assignees:assigneeIds,priority,dueDate:dueDateStr,startDate:startDateStr,
      status,notes,
      _clientName:clientName,_deptName:deptName,_sdName:sdName,_assigneeStr:assigneeStr
    });
  });
  renderImportPreview();
}

function renderImportPreview(){
  var total=_importRows.length;
  var valid=_importRows.filter(function(r){return !r._errors.length;}).length;
  var invalid=total-valid;

  var html='<div style="margin-top:14px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<div style="font-size:13px;font-weight:600">Preview — '+total+' rows'
    +(invalid?'<span style="color:var(--amber);margin-left:8px;font-size:11px">⚠ '+invalid+' with warnings</span>':'')
    +'</div>'
    +(valid>0?'<button class="btn btn-primary btn-sm" onclick="confirmImport()">Import '+valid+' Valid Tasks</button>':'')
    +'</div>'
    +'<div style="overflow-x:auto;max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)">'
    +'<table style="width:100%;border-collapse:collapse;font-size:11px">'
    +'<thead><tr style="background:var(--bg3);position:sticky;top:0">'
    +'<th style="padding:7px 10px;text-align:left;white-space:nowrap">Status</th>'
    +'<th style="padding:7px 10px;text-align:left;min-width:160px">Title</th>'
    +'<th style="padding:7px 10px;text-align:left">Client</th>'
    +'<th style="padding:7px 10px;text-align:left">Dept</th>'
    +'<th style="padding:7px 10px;text-align:left">Sub-Dept</th>'
    +'<th style="padding:7px 10px;text-align:left">Assignees</th>'
    +'<th style="padding:7px 10px;text-align:left">Priority</th>'
    +'<th style="padding:7px 10px;text-align:left">Due Date</th>'
    +'<th style="padding:7px 10px;text-align:left">Task Status</th>'
    +'</tr></thead><tbody>';

  _importRows.forEach(function(r){
    var hasErr=r._errors.length>0;
    var rowBg=hasErr?'background:rgba(255,95,95,.06)':'';
    var dept=getDept(r.deptId);
    var sd=SUBDEPTS.find(function(s){return s.id===r.subDeptId;});
    var client=getClient(r.clientId);
    var assigneeNames=r.assignees.map(function(id){var u=getUser(id);return u?u.name.split(' ')[0]:'?';}).join(', ');

    var statusCell=hasErr
      ?'<td style="padding:7px 10px"><div title="'+r._errors.join('; ')+'"><span style="color:var(--amber);font-size:16px;cursor:help">⚠</span><div style="font-size:9px;color:var(--amber);max-width:100px">'+r._errors.join('<br>')+'</div></div></td>'
      :'<td style="padding:7px 10px;text-align:center;color:var(--accent)">✓</td>';

    html+='<tr style="border-bottom:1px solid var(--border);'+rowBg+'">'
      +statusCell
      +'<td style="padding:7px 10px;font-weight:500">'+r.title+'</td>'
      +'<td style="padding:7px 10px;font-size:10px;color:var(--text3)">'+(client?client.name:r._clientName||'—')+'</td>'
      +'<td style="padding:7px 10px">'+(dept?'<span style="color:'+dept.color+';font-size:10px;font-weight:600">'+dept.name.split(' ')[0]+'</span>':r._deptName||'—')+'</td>'
      +'<td style="padding:7px 10px;font-size:10px;color:var(--text3)">'+(sd?sd.name:r._sdName||'—')+'</td>'
      +'<td style="padding:7px 10px;font-size:10px">'+assigneeNames+'</td>'
      +'<td style="padding:7px 10px"><span style="font-size:10px;font-weight:600;color:'+priorityColor(r.priority)+'">'+r.priority+'</span></td>'
      +'<td style="padding:7px 10px;font-size:10px;font-family:var(--mono)">'+(r.dueDate||'—')+'</td>'
      +'<td style="padding:7px 10px"><span style="font-size:10px;background:'+statusColor(r.status)+'22;color:'+statusColor(r.status)+';padding:2px 6px;border-radius:99px">'+r.status+'</span></td>'
      +'</tr>';
  });

  html+='</tbody></table></div>';
  if(invalid){
    html+='<div style="margin-top:8px;font-size:11px;color:var(--text3)">⚠ Rows with warnings will be skipped. Fix the source file and re-upload to include them.</div>';
  }
  html+='</div>';

  var preview=document.getElementById('import-preview');
  if(preview)preview.innerHTML=html;
}

async function confirmImport(){
  var valid=_importRows.filter(function(r){return !r._errors.length;});
  if(!valid.length){toast('No valid rows to import');return;}
  var btn=document.querySelector('#import-preview .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Importing…';}

  var success=0,fail=0;
  for(var i=0;i<valid.length;i++){
    var r=valid[i];
    var id=uid();
    var task={
      id,title:r.title,deptId:r.deptId,subDeptId:r.subDeptId,
      clientId:r.clientId,firmId:FIRMS[0]?.id||'',
      assignees:r.assignees,startDate:r.startDate,dueDate:r.dueDate,
      status:r.status||'Not Started',priority:r.priority||'medium',
      notes:r.notes||'',seconds:0,createdAt:today(),
      billingStatus:'unbilled',billingAmount:0,approvalStatus:'none',
      recurringId:null,udins:[],private:false,ownerId:null
    };
    try{
      await fbSet('tasks/'+id,task);
      success++;
    }catch(e){fail++;}
  }
  closeModal();
  toast('✓ Imported '+success+' tasks'+(fail?' ('+fail+' failed)':''));
  if(btn){btn.disabled=false;}
}

// Wire up drag-and-drop on import dropzone after modal renders
function bindImportDropzone(){
  var zone=document.getElementById('import-dropzone');
  var inp=document.getElementById('import-file-input');
  if(!zone||!inp)return;
  zone.onclick=function(){inp.click();};
  zone.ondragover=function(e){e.preventDefault();zone.style.borderColor='var(--accent)';};
  zone.ondragleave=function(){zone.style.borderColor='';};
  zone.ondrop=function(e){
    e.preventDefault();zone.style.borderColor='';
    var f=e.dataTransfer.files[0];
    if(f)handleImportFile(f);
  };
}

async function createTask(){
  const title=document.getElementById('f-title')?.value?.trim();
  if(!title){toast('Title required');return;}

  // Require client selection
  const clientId=document.getElementById('f-client')?.value||'';
  if(!clientId){toast('Please select a client');return;}

  // Require due date
  const dueDate2=document.getElementById('f-due')?.value||'';
  if(!dueDate2){toast('Due date is required');return;}
  // ══ FIX 10: validate 15-day limit ══
  if(currentUser.role!=='superadmin'){
    const _maxD=new Date();_maxD.setDate(_maxD.getDate()+15);
    if(dueDate2>_maxD.toISOString().slice(0,10)){
      toast('⚠ Due date cannot exceed 15 days from today. Only Super Admin can set dates beyond this.');
      return;
    }
  }
  // Require at least one assignee
  const cbEls=[...document.querySelectorAll('.f-assignee-cb:checked')];
  if(!cbEls.length){toast('Please assign to at least one person');return;}

  const assignees=cbEls.map(el=>el.value);
  const startDate=document.getElementById('f-start')?.value||'';
  const id=uid();
  const isPrivate=document.getElementById('f-private')?.checked||false;
  const t={
    id,title,
    deptId:document.getElementById('f-dept')?.value||DEPTS[0]?.id,
    subDeptId:document.getElementById('f-sd')?.value||'',
    clientId,
    firmId:document.getElementById('f-firm')?.value||FIRMS[0]?.id||'',
    assignees,startDate,
    status:document.getElementById('f-status')?.value||'Not Started',
    priority:document.getElementById('f-priority')?.value||'medium',
    dueDate:document.getElementById('f-due')?.value||'',
    seconds:0,
    notes:document.getElementById('f-notes')?.value||'',
    createdAt:today(),
    billingStatus:'unbilled',billingAmount:0,
    approvalStatus:'none',recurringId:null,udins:[],
    checklist:(document.getElementById('f-checklist')?.value||'').split('\n').filter(s=>s.trim()).map(s=>({id:uid(),text:s.trim(),done:false})),
    batchMode:document.getElementById('f-batchmode')?.checked||false,
    unit:document.getElementById('f-unit')?.value?.trim()||'',
    private:isPrivate,
    ownerId:currentUser.id,
    dueDateChanges:0
  };
  await fbSet('tasks/'+id,t);
  // Notify assignees
  assignees.filter(uid2=>uid2!==currentUser.id).forEach(uid2=>{
    const u2=getUser(uid2);
    pushNotif(uid2,'task_assigned','📋 New task: '+title,
      (getClient(clientId)?.name||'')+' · '+(getDept(t.deptId)?.name||''),id);
    showDesktopNotif('📋 '+title,'Assigned to you',id);
    if(u2?.email){
      const client=getClient(clientId);
      const body=[
        'Hi '+u2.name+',',
        '',
        'A new task has been assigned to you:',
        'Task: '+title,
        client?'Client: '+client.name:'',
        t.dueDate?'Due: '+fmtDate(t.dueDate):'',
        t.priority?'Priority: '+t.priority:'',
        t.notes?'Notes: '+t.notes:'',
        '',
        'Login to TaskHub to view details.',
      ].filter(Boolean).join('\n');
      sendEmail(u2.email,'📋 New Task: '+title,body,title,u2.name,t.dueDate||'');
    }
  });
  logChange(t.id,'created','Task created by '+currentUser.name);
  // Create certificate if requested
  const createCertCb=document.getElementById('f-create-cert');
  if(createCertCb?.checked){
    const caFirmId=document.getElementById('f-cert-firm')?.value||'';
    const editedCertNo=document.getElementById('f-cert-no')?.value?.trim();
    const certNo=editedCertNo||(caFirmId?generateCertNo(caFirmId):'');
    const certId=uid();
    const certDate=document.getElementById('f-cert-date')?.value||today();
    const certPurpose=document.getElementById('f-cert-purpose')?.value||t.title;
    const certUdin=(document.getElementById('f-cert-udin')?.value||'').trim().toUpperCase();
    const certMember=(document.getElementById('f-cert-member')?.value||'').trim();
    const certNotes=(document.getElementById('f-cert-notes')?.value||'').trim();
    const newCert={
      id:certId, taskId:id, clientId:t.clientId,
      subDeptId:t.subDeptId||'', deptId:t.deptId,
      certDate, purpose:certPurpose,
      caFirmId, signingMember:certMember,
      udin:certUdin, certNo, notes:certNotes,
      createdAt:today(), createdByUserId:currentUser.id
    };
    await fbSet('certificates/'+certId, newCert);
    await fbUpd('tasks/'+id,{isCertificate:true, certId});
  }
  closeModal();
  render();
  if(!createCertCb?.checked) toast('Task created! ✓');
}

async function saveTaskStatus(id){
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  const newStatus=document.getElementById('edit-status')?.value;
  const newPriority=document.getElementById('edit-priority')?.value||t.priority;
  const sts=taskStatuses(t);const terminalSt=sts[sts.length-1];
  if(newStatus===terminalSt&&!(t.seconds>0)){toast('⚠ Cannot sign off with 0 time logged');return;}
  if(requiresUDIN(t)&&newStatus===terminalSt){
    // Check CERTIFICATES collection (primary) or legacy t.udins array
    // Use full task object for cert lookup (finds by clientId+subDept if no direct taskId link)
    const cert=getCert(t);
    const hasUDIN=(cert&&cert.udin&&validateUDIN(cert.udin))||
                  (Array.isArray(t.udins)&&t.udins[0]?.udin&&validateUDIN(t.udins[0].udin));
    if(!hasUDIN){
      toast('⚠ Enter valid UDIN in the Certificates module before closing this task');
      return;
    }
  }
  const updates={status:newStatus,priority:newPriority};
  // If task was approved and status changes away from terminal, reset approval
  if(t.approvalStatus==='approved'&&newStatus!==terminalSt){
    updates.approvalStatus='none';
    updates.billingStatus='unbilled';
    logChange(id,'approval_reset','Approval reset — status changed to: '+newStatus);
    toast('ℹ Approval reset — task must be re-approved after changes');
  }
  if(newStatus===terminalSt&&(t.approvalStatus==='none'||t.approvalStatus===undefined))updates.approvalStatus='pending';
  await fbUpd('tasks/'+id,updates);
  logChange(id,'status_change',t.status+' → '+newStatus);
  // Notify assignees of status change (push + email on terminal)
  const asgns2=Array.isArray(t.assignees)?t.assignees:(t.assigneeId?[t.assigneeId]:[]);
  const isTerminal=(newStatus===terminalSt);
  asgns2.filter(uid2=>uid2!==currentUser.id).forEach(uid2=>{
    pushNotif(uid2,'status_changed','🔄 Status updated: '+newStatus,t.title,id);
    showDesktopNotif('🔄 '+t.title,'Status: '+newStatus,id);
  });
  // Email notification on task close
  if(isTerminal){
    const client=getClient(t.clientId);
    asgns2.forEach(uid2=>{
      const u2=getUser(uid2);
      if(u2?.email){
        const body2=[
          'Hi '+u2.name+',',
          '',
          'A task you are assigned to has been completed:',
          '',
          'Task: '+t.title,
          client?'Client: '+client.name:'',
          'Closed by: '+currentUser.name,
          'Date: '+fmtDate(today()),
          t.seconds?'Time logged: '+fmtSec(t.seconds):'',
        ].filter(Boolean).join('\n');
        sendEmail(u2.email,'✅ Task Closed: '+t.title,body2,t.title,u2.name,today());
      }
    });
    // Also notify creator if different
    if(t.createdBy && t.createdBy!==currentUser.id && !asgns2.includes(t.createdBy)){
      const creator=getUser(t.createdBy);
      if(creator?.email) sendEmail(creator.email,'✅ Task Closed: '+t.title,
        'Task "'+t.title+'" has been completed by '+currentUser.name+'.',t.title,creator.name,today());
    }
  }
  toast('Status saved ✓');
}
async function saveTaskDates(id){
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  const role=currentUser.role;
  const newDue=document.getElementById('edit-due')?.value||'';
  const newStart=document.getElementById('edit-start')?.value||'';
  const dueDateChanging=newDue&&newDue!==t.dueDate;

  // Role check: employees cannot change dates
  if(currentUser.role==='employee'){toast('Only managers/admins can change dates');return;}

  // Due date change limit check
  if(dueDateChanging && currentUser.role!=='superadmin'){
    const changes=t.dueDateChanges||0;
    const isHigh=t.priority==='high';
    const limit=isHigh?1:3;
    if(changes>=limit){
      toast('⛔ Due date has already been changed '+changes+'× '+(isHigh?'(limit: 1 for high priority)':'(limit: 3)')+'. Only Super Admin can change it further.');
      return;
    }
  }

  // Check if assignees have approved leave on the new due date
  if(newDue&&newDue!==t.dueDate){
    const asgns=Array.isArray(t.assignees)?t.assignees:(t.assigneeId?[t.assigneeId]:[]);
    const onLeave=asgns.filter(uid=>{
      return LEAVES.some(l=>l.userId===uid&&l.date===newDue&&l.status==='approved'&&(l.type==='Full Day'||l.type==='Sick Leave'));
    });
    if(onLeave.length){
      const names=onLeave.map(uid=>getUser(uid)?.name||uid).join(', ');
      toast('⚠ '+names+' has approved leave on '+fmtDate(newDue)+'. Choose a different date or reassign the task.');
      return;
    }
  }
  const updates={dueDate:newDue,startDate:newStart};
  if(dueDateChanging) updates.dueDateChanges=(t.dueDateChanges||0)+1;
  await fbUpd('tasks/'+id,updates);
  logChange(id,'dates_changed',(newStart?'Start: '+newStart+' ':'')+'Due: '+newDue+(dueDateChanging?' (change #'+((t.dueDateChanges||0)+1)+')':''));
  await resetApprovalIfNeeded(id,'date change');
  toast('Dates saved ✓');
}

async function setApproval(id,status){
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  const updates={approvalStatus:status};
  if(status==='rejected'){
    // Send back to assignees - set status to 'Rejected' and log
    const sts=taskStatuses(t);
    updates.status='Rejected';
    updates.rejectedAt=Date.now();
    updates.rejectedBy=currentUser.id;
    // Add to task log
    const logEntry={ts:Date.now(),userId:currentUser.id,action:'rejected',note:'Task rejected by '+currentUser.name};
    const existingLog=Array.isArray(t.changeLog)?t.changeLog:[];
    updates.changeLog=[...existingLog,logEntry];
    // Notify all assignees
    const assignees=Array.isArray(t.assignees)?t.assignees:(t.assigneeId?[t.assigneeId]:[]);
    assignees.forEach(function(uid2){
      const u=getUser(uid2);
      if(u&&u.email)sendEmail(u.email,'Task Rejected: '+t.title,'Your task "'+t.title+'" has been rejected. Please review and resubmit.',t.title,u.name,t.dueDate||'');
    });
  }
  if(status==='approved'){
    const u=getUser(t.assignees?.[0]||t.assigneeId);
    if(u?.email)sendEmail(u.email,'Task Approved: '+t.title,'Your task "'+t.title+'" has been approved.',t.title,u.name,t.dueDate||'');
    const existingLog=Array.isArray(t.changeLog)?t.changeLog:[];
    updates.changeLog=[...existingLog,{ts:Date.now(),userId:currentUser.id,action:'approved',note:'Approved by '+currentUser.name}];
  }
  await fbUpd('tasks/'+id,updates);
  const t2=TASKS.find(x=>x.id===id);
  if(t2){
    const asgns=Array.isArray(t2.assignees)?t2.assignees:(t2.assigneeId?[t2.assigneeId]:[]);
    asgns.forEach(function(uid2){pushNotif(uid2,status==='approved'?'approval':'rejected',status==='approved'?'Task Approved ✓':'Task Rejected',t2.title,id);});
  }
  toast(status==='approved'?'Task approved ✓':'Task rejected — status set to Rejected');render();
}

async function addManualTime(){
  // Block time entry if user has overdue tasks (employees only)
  if(currentUser.role==='employee'){
    const myOverdueTasks=TASKS.filter(t=>
      !isTaskTerminal(t) &&
      taskAssignees(t).some(a=>a.id===currentUser.id) &&
      dueStatus(t.dueDate,t.startDate)==='overdue'
    );
    if(myOverdueTasks.length>0){
      toast('⚠ You have '+myOverdueTasks.length+' overdue task'+(myOverdueTasks.length>1?'s':'')+'. Please close or update them before logging time.');
      closeModal();
      return;
    }
  }

  // Time cap: total logged today cannot exceed hours elapsed since 9:30am
  if(currentUser.role==='employee'){
    const now=new Date();
    const workStart=new Date();workStart.setHours(9,30,0,0);
    const elapsedHours=Math.max(0,(now-workStart)/3600000);
    const maxSecs=Math.min(elapsedHours,9)*3600; // cap at 9 hours
    // Get today's existing entries for this user
    const todayEntries=TIME_ENTRIES.filter(e=>e.userId===currentUser.id&&e.date===today());
    const todaySecs=todayEntries.reduce((a,e)=>a+(e.seconds||0),0);
    // Get the hours being added now
    const addH=parseInt(document.getElementById('mt-h')?.value||0);
    const addM=parseInt(document.getElementById('mt-m')?.value||0);
    const addSecs=addH*3600+addM*60;
    if((todaySecs+addSecs)>maxSecs){
      const remainMins=Math.max(0,Math.floor((maxSecs-todaySecs)/60));
      const elapsedStr=elapsedHours<0.1?'not yet started':Math.floor(elapsedHours)+'h '+Math.round((elapsedHours%1)*60)+'m';
      toast('⏰ Time cap: '+Math.floor(elapsedHours)+'h elapsed since 9:30am. You can log max '+Math.floor(maxSecs/3600)+'h '+Math.round((maxSecs%3600)/60)+'m today. Remaining: '+Math.floor(remainMins/60)+'h '+remainMins%60+'m');
      return;
    }
  }

  const taskId=document.getElementById('mt-task')?.value;const h=parseInt(document.getElementById('mt-h')?.value)||0;const m=parseInt(document.getElementById('mt-m')?.value)||0;const seconds=h*3600+m*60;
  if(!taskId){toast('Select a task');return}if(seconds<=0){toast('Enter > 0');return}
  const date=document.getElementById('mt-date')?.value||today(),note=document.getElementById('mt-note')?.value||'Manual';
  const userId=document.getElementById('mt-user')?.value||currentUser.id;
  const eid=uid();await fbSet('time_entries/'+eid,{id:eid,taskId,userId,date,seconds,note});
  const task=TASKS.find(t=>t.id===taskId);if(task)await fbUpd('tasks/'+taskId,{seconds:(task.seconds||0)+seconds});
  closeModal();toast(`Added ${h}h ${m}m`);
}

async function createUser(){
  const name=document.getElementById('uf-name')?.value?.trim();
  if(!name){toast('Name required');return;}
  const email=(document.getElementById('uf-email')?.value||'').trim().toLowerCase();
  if(!email){toast('Email is required for login');return;}
  const password=document.getElementById('uf-password')?.value||'';
  const password2=document.getElementById('uf-password2')?.value||'';
  if(!password||password.length<6){toast('Password must be at least 6 characters');return;}
  if(password!==password2){toast('Passwords do not match');return;}
  const username=(document.getElementById('uf-username')?.value||'').trim().toLowerCase();
  // Check email not already used
  if(USERS.find(u=>(u.email||'').toLowerCase()===email)){toast('Email already in use by another user');return;}
  const id=uid();
  const newDeptCbs=[...document.querySelectorAll('.uf-dept-cb:checked')].map(el=>el.value);
  const firstNewDept=newDeptCbs[0]||null;
  const userData={
    id, name, email,
    username: username||'',
    role: document.getElementById('uf-role')?.value||'employee',
    deptId: firstNewDept,
    deptIds: newDeptCbs,
    billingEnabled: !!document.getElementById('uf-billing')?.checked,
    active: true
  };
  // Create Firebase Auth account with REAL email + password
  try {
    await auth.createUserWithEmailAndPassword(email, password);
    
  } catch(e){
    if(e.code==='auth/email-already-in-use'){
      toast('This email already has a Firebase account. Use a different email or reset password.');
    } else {
      toast('Auth error: '+e.code);
    }
    return;
  }
  await fbSet('users/'+id, userData);
  closeModal();
  toast('User "'+name+'" created ✓ — they can login with: '+email);
}

async function updateUser(id){
  const newPassVal=(document.getElementById('uf-new-password')?.value||'').trim();
  const deptCbs=[...document.querySelectorAll('.uf-dept-cb:checked')].map(el=>el.value);
  const firstDept=deptCbs[0]||null;
  const updates={
    name: document.getElementById('uf-name')?.value?.trim(),
    email: document.getElementById('uf-email')?.value?.trim()||'',
    username: (document.getElementById('uf-username')?.value||'').trim().toLowerCase(),
    role: document.getElementById('uf-role')?.value,
    deptId: firstDept,
    deptIds: deptCbs,
    billingEnabled: !!document.getElementById('uf-billing')?.checked,
    active: !!document.getElementById('uf-active')?.checked,
    whatsapp: document.getElementById('uf-mobile')?.value?.trim()||'',
    mobile: document.getElementById('uf-mobile')?.value?.trim()||''
  };
  if(!updates.name){toast('Name required');return;}
  await fbUpd('users/'+id, updates);
  // Handle password change
  if(newPassVal){
    if(newPassVal.length<6){toast('Password must be at least 6 characters');return;}
    // Store pending reset — applied when user logs in next (we have fresh auth then)
    await fbUpd('users/'+id,{pendingPasswordReset:newPassVal});
    const targetUser=USERS.find(u=>u.id===id);
    const targetEmail=targetUser?.email||'';
    // Also send Firebase reset email so user can self-activate if needed
    if(targetEmail){
      try {
        await auth.sendPasswordResetEmail(targetEmail);
        toast('✓ Password saved + reset email sent to '+targetEmail);
      } catch(_){
        toast('✓ Password saved for '+targetEmail+' — apply on next login');
      }
    } else {
      toast('✓ Password saved — will apply on next login');
    }
  } else {
    toast('User updated ✓');
  }
  closeModal();
}
async function delUser(id){if(USERS.filter(u=>u.role==='superadmin').length<=1&&USERS.find(u=>u.id===id)?.role==='superadmin'){toast('Cannot delete last super admin');return}await fbDel('users/'+id);closeModal();toast('Deleted')}

function settStatusesHTML(){return`${mHdr('Task Statuses')}<div style="font-size:12px;color:var(--text3);margin-bottom:16px">Last status = terminal (triggers approval + billing)</div>${DEPTS.map(d=>{const sds=SUBDEPTS.filter(s=>s.deptId===d.id);return`<div style="margin-bottom:16px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:${d.color}"></div><span style="font-size:13px;font-weight:600">${d.name}</span></div>${sds.map(sd=>{const sts=sdStatuses(sd.id,d.id);return`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px"><div class="flex-between mb-6"><span style="font-size:12px;font-weight:500">${sd.name}</span><button class="btn btn-ghost btn-xs" onclick="openModal('editStatuses',{subDeptId:'${sd.id}',deptId:'${d.id}'})">Edit</button></div><div style="display:flex;flex-wrap:wrap;gap:4px">${sts.map((s,i)=>`<span class="badge" style="background:${statusColor(s)}22;color:${statusColor(s)}">${s}${i===sts.length-1?' ★':''}</span>`).join('')}</div></div>`;}).join('')}</div>`;}).join('')}`}
function editStatusesHTML({subDeptId,deptId}){const sd=getSD(subDeptId),sts=sdStatuses(subDeptId,deptId);return`${mHdr('Statuses — '+(sd?.name||''))}<div style="font-size:12px;color:var(--text3);margin-bottom:4px">One per line · Last = terminal.</div><div style="font-size:11px;color:var(--accent);background:var(--accent-bg);border-radius:var(--r);padding:6px 10px;margin-bottom:12px">★ Last status triggers approval + billing</div><div id="sts-list" style="margin-bottom:12px">${sts.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><input class="form-input" value="${s}" style="flex:1"/><div style="width:8px;height:8px;border-radius:50%;background:${statusColor(s)};flex-shrink:0"></div><button onclick="this.closest('div').remove()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1">×</button></div>`).join('')}</div><button class="btn btn-ghost btn-sm mb-16" onclick="addStsRow()">+ Add</button><button class="btn btn-primary w-full" onclick="saveStatuses('${subDeptId}')">Save</button>`}
function addStsRow(){const list=document.getElementById('sts-list');if(!list)return;const div=document.createElement('div');div.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px';div.innerHTML=`<input class="form-input" value="" style="flex:1"/><div style="width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0"></div><button onclick="this.closest('div').remove()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1">×</button>`;list.appendChild(div);div.querySelector('input')?.focus()}
async function saveStatuses(subDeptId){const list=document.getElementById('sts-list');if(!list)return;const sts=Array.from(list.querySelectorAll('input')).map(inp=>inp.value.trim()).filter(Boolean);if(!sts.length){toast('At least one required');return}await fbSet('statuses/'+subDeptId,sts);closeModal();toast('Saved')}

// ── Clients ──
function settClientsHTML(){
  if(!window._settClientSearch) window._settClientSearch='';
  const q=(window._settClientSearch||'').toLowerCase();
  const filtered=q?CLIENTS.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.gstin||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q)):CLIENTS;
  return`${mHdr('Clients')}
  <div class="flex-between mb-10">
    <input class="form-input" id="sett-client-search" style="flex:1;max-width:260px" placeholder="Search name, GSTIN, email…"
      value="${window._settClientSearch||''}"
      onfocus="document.body.dataset.lastSearchFocus='sett-client-search'"
      oninput="window._settClientSearch=this.value;render()"/>
    <div style="display:flex;gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="openModal('importClients',{})">⬆ Import</button>
      ${currentUser.role==='superadmin'?'<button class="btn btn-primary btn-sm" onclick="openModal(\'newClient\',{})">+ New</button>':''}
    </div>
  </div>
  <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead><tr style="background:var(--bg3);border-bottom:2px solid var(--border)">
      <th style="padding:7px 10px;text-align:left">Name</th>
      <th style="padding:7px 10px;text-align:left">GSTIN</th>
      <th style="padding:7px 10px;text-align:left">WhatsApp</th>
      <th style="padding:7px 10px;text-align:left">Email</th>
      <th style="padding:7px 8px;text-align:center">Total Tasks</th>
      <th style="padding:7px 8px;text-align:center">Ongoing</th>
      <th style="padding:7px 8px;text-align:center">Completed</th>
      <th style="padding:7px 8px;text-align:right">Billed ₹</th>
      <th style="padding:7px 8px;text-align:right">Pending ₹</th>
      <th style="padding:7px 8px;text-align:right">Total Billable ₹</th>
      <th style="padding:7px 8px"></th>
    </tr></thead>
    <tbody>
      ${filtered.map((c,i)=>{
        const cTasks=TASKS.filter(t=>t.clientId===c.id);
        const ongoing=cTasks.filter(t=>!isTaskTerminal(t)).length;
        const completed=cTasks.filter(t=>isTaskTerminal(t)).length;
        const billed=cTasks.filter(t=>t.billingStatus==='invoiced').reduce((a,t)=>a+(t.billingAmount||0),0);
        const pending=cTasks.filter(t=>t.billingStatus!=='invoiced'&&isBillingReady(t)).reduce((a,t)=>a+(t.billingAmount||0),0);
        const total=cTasks.reduce((a,t)=>a+(t.billingAmount||0),0);
        return `<tr style="border-bottom:1px solid var(--border);background:${i%2===0?'transparent':'var(--bg2)'}">
          <td style="padding:6px 10px;font-weight:500">${c.name}</td>
          <td style="padding:6px 10px;font-family:var(--mono);font-size:10px">${c.gstin||'—'}</td>
          <td style="padding:6px 10px;font-size:11px">${c.whatsapp||c.mobile||'—'}</td>
          <td style="padding:6px 10px;font-size:11px;color:var(--text3)">${c.email||'—'}</td>
          <td style="padding:6px 8px;text-align:center">${cTasks.length}</td>
          <td style="padding:6px 8px;text-align:center;color:${ongoing>0?'var(--amber)':'var(--text3)'};font-weight:${ongoing>0?'600':'400'}">${ongoing}</td>
          <td style="padding:6px 8px;text-align:center;color:var(--green,#4ade80)">${completed}</td>
          <td style="padding:6px 8px;text-align:right;color:var(--green,#4ade80);font-family:var(--mono)">${billed>0?fmtMoney(billed):'—'}</td>
          <td style="padding:6px 8px;text-align:right;color:var(--amber);font-family:var(--mono)">${pending>0?fmtMoney(pending):'—'}</td>
          <td style="padding:6px 8px;text-align:right;font-weight:600;font-family:var(--mono)">${total>0?fmtMoney(total):'—'}</td>
          <td style="padding:6px 8px;white-space:nowrap">
            <button class="btn btn-ghost btn-xs" onclick="navigate('clients');setTimeout(()=>openModal('clientDetail',{id:'${c.id}'}),100)">View</button>
            ${currentUser.role==='superadmin'?`<button class="btn btn-ghost btn-xs" onclick="openModal('editClient',{id:'${c.id}'})">Edit</button>`:''}
          </td>
        </tr>`;
      }).join('')}
      ${filtered.length===0?'<tr><td colspan="11" style="padding:2rem;text-align:center;color:var(--text3)">No clients found</td></tr>':''}
    </tbody>
  </table></div>`;
}

function editClientHTML({id}){
  var c=CLIENTS.find(function(x){return x.id===id;});
  if(!c)return'';
  var phones=Array.isArray(c.phones)?c.phones.join('\n'):(c.phone||'');
  var emails=Array.isArray(c.emails)?c.emails.join('\n'):(c.email||'');
  var html=mHdr('Edit Client');
  html+='<div class="form-row"><label class="form-label">Client Name *</label>'
    +'<input class="form-input" id="cf-name" value="'+c.name.replace(/"/g,'&quot;')+'"/></div>';
  html+='<div class="form-row"><label class="form-label">GSTIN</label>'
    +'<input class="form-input" id="cf-gstin" value="'+(c.gstin||'')+'" maxlength="15" oninput="this.value=this.value.toUpperCase()" /></div>';
  html+='<div class="form-row"><label class="form-label">WhatsApp / Phone Numbers'
    +'<span style="font-size:10px;color:var(--text3);margin-left:5px">(one per line)</span></label>'
    +'<textarea class="form-textarea" id="cf-phones" rows="2">'+phones+'</textarea></div>';
  html+='<div class="form-row"><label class="form-label">Email IDs'
    +'<span style="font-size:10px;color:var(--text3);margin-left:5px">(one per line)</span></label>'
    +'<textarea class="form-textarea" id="cf-emails" rows="2">'+emails+'</textarea></div>';
  html+='<button class="btn btn-primary w-full" onclick="updClient(\''+id+'\')">Save Client</button>';
  return html;
}
async function createClient(){
  var name=document.getElementById('cf-name')?.value?.trim();
  if(!name){toast('Name required');return;}
  var gstin=(document.getElementById('cf-gstin')?.value||'').trim().toUpperCase();
  var phonesRaw=document.getElementById('cf-phones')?.value||'';
  var emailsRaw=document.getElementById('cf-emails')?.value||'';
  var phones=phonesRaw.split(/[\n,;]+/).map(function(p){return p.replace(/[^0-9+]/g,'').trim();}).filter(Boolean);
  var emails=emailsRaw.split(/[\n,;]+/).map(function(e){return e.trim().toLowerCase();}).filter(Boolean);
  var id=uid();
  await fbSet('clients/'+id,{id,name,gstin,phones,emails,createdAt:today()});
  closeModal();toast('Client added ✓');
}

async function updClient(id){
  var name=document.getElementById('cf-name')?.value?.trim();
  if(!name){toast('Name required');return;}
  var gstin=(document.getElementById('cf-gstin')?.value||'').trim().toUpperCase();
  var phonesRaw=document.getElementById('cf-phones')?.value||'';
  var emailsRaw=document.getElementById('cf-emails')?.value||'';
  var phones=phonesRaw.split(/[\n,;]+/).map(function(p){return p.replace(/[^0-9+]/g,'').trim();}).filter(Boolean);
  var emails=emailsRaw.split(/[\n,;]+/).map(function(e){return e.trim().toLowerCase();}).filter(Boolean);
  await fbUpd('clients/'+id,{name,gstin,phones,emails});
  closeModal();toast('Client saved ✓');
}

async function delClient(id){
  if(!confirm('Delete this client? Tasks linked to them will lose the client reference.'))return;
  await fbDel('clients/'+id);
  toast('Client deleted');
}

// Restore Firebase Auth session before starting listeners
(async function initWithAuth(){
  // Firebase Auth.Persistence.LOCAL means the session persists across page refreshes
  // auth.currentUser will be non-null if they were previously signed in
  // We just need to wait for the auth state to resolve, then start listeners
  await new Promise(resolve=>{
    const unsub=auth.onAuthStateChanged(fbUser=>{
      unsub(); // only need first event
      if(fbUser){
        // Restore currentUser from localStorage if auth session exists
        const stored=LS.get('currentUser',null);
        if(stored && stored.id){
          currentUser=stored;
          /* auth log removed */
          // Re-attach per-user timer listener
          db.ref('active_timers/'+currentUser.id).on('value',s=>{
            activeTimer=s.val()||null;
            clearInterval(timerInterval);timerInterval=null;
            if(activeTimer)timerInterval=setInterval(tickTimer,1000);
            rerender();
          });
        }
      } else {
        // Not signed in - clear any stale localStorage session
        currentUser=null;
        LS.set('currentUser',null);
      }
      resolve();
    });
  });
  startListeners();
})();
